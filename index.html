<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#faf5ee">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>TEMPO — Marathon München 2026</title>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* ===== TEMPO — Track-Club Identity ===== */
    --bg:#faf5ee;                 /* App-Hintergrund (warmes Cremeweiß) */
    --surface:#ffffff;            /* Karten */
    --surface-2:#f0e9da;          /* Bar-Tracks, Inset-Flächen */
    --surface-nav:#faf5ee;        /* Bottom-Nav */
    --line:#e8e1d2;               /* Karten-Borders, Hairlines (2px) */
    --line-strong:#d5cfc0;
    --txt:#16294d;                /* Navy: Primärtext & große Ziffern */
    --text-2:#69675c;             /* Sekundärtext */
    --mut:#93917e;                /* Labels, Eyebrows, Meta */
    --dim:#b6b4a4;                /* faint: Meta, inaktive Labels */
    --navy:#16294d; --navy-2:#20355c; --navy-3:#233a63;
    --navy-muted:#a8b3c7; --navy-dim:#465b85; --navy-label:#7d90b3;
    --orange-on-navy:#f0824e;
    --node-future:#e8e1d2;        /* Beige-Blöcke (Zukunft) */
    --node-future-bd:#d5cfc0;
    --dot-idle:#d5cfc0;
    --accent:#e05a1f;             /* Bahn-Orange: CTAs, aktiv, Bahn-Füllung */
    --accent-d:#c94e18;
    --accent-glow:transparent;    /* TEMPO: kein Glow */
    --accent-soft:rgba(224,90,31,.12);
    --accent-soft-bd:rgba(224,90,31,.3);
    --warn:#c98f14;
    --good:#1f9d63;
    --bad:#e0584f;
    --font:'Archivo',-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
    --mono:'Oswald','Archivo',sans-serif;   /* Labels/Eyebrows/Nav (laut) */
    --display:'Oswald','Archivo',sans-serif;/* Headlines & große Zahlen */
    --r:16px;
    /* Aliases für Altbestand */
    --bg2:#f0e9da; --card:#ffffff; --card-solid:#ffffff; --card2:#f0e9da;
    --line2:#d5cfc0; --mut2:#b6b4a4;
    --accent2:#e05a1f; --orange:#c98f14; --gold:#c98f14; --blue:#e05a1f;
    --glassblur:none; --shadow:none; --shadow-sm:none;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{background:var(--bg)}
  html,body{color:var(--txt);font-family:var(--font);font-size:16px;line-height:1.45;-webkit-font-smoothing:antialiased;touch-action:manipulation;-webkit-text-size-adjust:100%;-webkit-user-select:none;user-select:none;-webkit-overflow-scrolling:touch}
  /* THE LINE: flacher, near-black Hintergrund auf jeder Seite */
  body{background:var(--bg);min-height:100vh}
  input,textarea{-webkit-user-select:text;user-select:text}
  body{padding-bottom:calc(60px + env(safe-area-inset-bottom))}
  .wrap{max-width:440px;margin:0 auto;padding:calc(8px + env(safe-area-inset-top)) 22px 22px}
  /* ===== TEMPO — Primitives (für alle Screens) ===== */
  .eyebrow{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:1.5px;color:var(--mut);text-transform:uppercase}
  .mono{font-family:var(--mono);letter-spacing:.5px}
  /* TEMPO: zwei Bahn-Striche als Marke */
  .ln-line{display:inline-block;width:26px;height:4px;border-radius:99px;background:var(--accent);position:relative}
  .ln-line::after{content:"";position:absolute;left:0;top:7px;width:18px;height:4px;border-radius:99px;background:var(--accent)}
  .ln-title{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px}
  .ln-title b{font-family:var(--display);font-size:32px;font-weight:600;letter-spacing:.5px;color:var(--txt);text-transform:uppercase}
  .ln-title .ln-line{width:26px}
  .ln-card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px 20px 20px}
  h1{font-family:var(--display);font-size:1.9rem;font-weight:600;letter-spacing:.5px;color:var(--txt);text-transform:uppercase}
  h1 .sub{font-size:.78rem;font-weight:500;display:block;margin-top:3px;color:var(--mut);letter-spacing:0}
  h2{font-size:1.15rem;font-weight:700;margin:0 0 10px;letter-spacing:-.3px;color:var(--txt)}
  .sub{color:var(--mut);font-size:.82rem}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:20px;margin-bottom:16px}
  .card.solid{background:var(--surface)}
  .hero{background:var(--surface);border:1px solid var(--line);color:var(--txt);position:relative;overflow:hidden;padding:26px 22px;border-radius:24px}
  .hero::before{content:none}
  .hero > *{position:relative;z-index:1}
  .hero .ph{color:var(--accent);font-weight:700;font-size:.72rem;text-transform:uppercase;letter-spacing:1.6px}
  .hero .sub{color:var(--mut)}
  .hero-top{display:flex;align-items:center;gap:20px;margin-top:16px}
  .ring-wrap.hero-ring{width:112px;height:112px}
  .ring-wrap.hero-ring svg{width:112px;height:112px}
  .ring-wrap.hero-ring .rv{flex-direction:column;gap:0}
  .ring-wrap.hero-ring .rv b{font-size:1.7rem;font-weight:800;line-height:1;letter-spacing:-.5px;color:var(--txt)}
  .ring-wrap.hero-ring .rv span{font-size:.55rem;text-transform:uppercase;letter-spacing:1.4px;color:var(--mut);font-weight:700;margin-top:4px}
  .hero-meta{flex:1;min-width:0}
  .hero-meta .big{font-size:1.8rem;letter-spacing:-.8px;color:var(--txt);font-weight:800;line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* Status-Kacheln mit glühendem Balken (WHOOP-Stil) */
  .stiles{display:flex;gap:10px}
  .stile{flex:1;min-width:0;background:var(--card2);border-radius:18px;padding:14px 14px 17px;cursor:pointer;position:relative;overflow:hidden;transition:.15s;border:1px solid var(--line)}
  .stile:active{transform:scale(.97)}
  .stile .sl{font-size:.58rem;text-transform:uppercase;letter-spacing:1.2px;color:var(--mut);font-weight:700}
  .stile .sv{font-size:1.05rem;font-weight:800;margin-top:8px;letter-spacing:-.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .stile .sbar{position:absolute;left:0;right:0;bottom:0;height:4px;background:var(--c)}
  .hero .cd div{background:var(--card2);border:1px solid var(--line)}
  .hero .cd b{color:var(--txt)}
  .hero .cd span{color:var(--mut)}
  .hero .pill.run{background:rgba(242,98,10,.12);color:var(--accent);border-color:rgba(242,98,10,.28)}
  .runcard{background:var(--card2);border:1px solid var(--line)}
  .runcard.logged{border-color:rgba(31,157,99,.35);background:linear-gradient(135deg,var(--card2) 0%,rgba(31,157,99,.08) 100%)}
  .ring-wrap{position:relative;width:64px;height:64px;flex:0 0 auto}
  .ring-wrap svg{transform:rotate(-90deg)}
  .ring-wrap .rv{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem;color:var(--txt)}
  .row{display:flex;align-items:center;gap:12px}
  .between{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .pill{display:inline-block;padding:3px 11px;border-radius:999px;font-size:.7rem;font-weight:700;background:var(--card2);color:var(--mut);border:1px solid var(--line);letter-spacing:.2px}
  .pill.run{background:rgba(242,98,10,.12);color:var(--accent);border-color:rgba(242,98,10,.26)}
  .pill.str{background:rgba(47,107,255,.1);color:#2f6bff;border-color:rgba(47,107,255,.24)}
  .pill.pad{background:rgba(31,157,99,.1);color:var(--good);border-color:rgba(31,157,99,.24)}
  .pill.bike{background:rgba(224,165,59,.14);color:#a9781f;border-color:rgba(224,165,59,.3)}
  .pill.done{background:rgba(31,157,99,.12);color:var(--good);border-color:rgba(31,157,99,.28)}
  .pill.skip{background:rgba(224,88,79,.1);color:var(--bad);border-color:rgba(224,88,79,.24)}
  .pill.opt{background:var(--card2);color:var(--mut)}
  .hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
  .hd .ph{font-size:.7rem;text-transform:uppercase;letter-spacing:1.4px;font-weight:800}
  .big{font-size:1.8rem;font-weight:900;line-height:1.1;letter-spacing:-.5px}
  .cd{display:flex;gap:12px;text-align:center;margin-top:6px}
  .cd div{flex:1;background:var(--card2);border-radius:16px;padding:14px 4px}
  .cd b{display:block;font-size:1.6rem;font-weight:800;letter-spacing:-.5px}
  .cd span{font-size:.6rem;color:var(--mut);text-transform:uppercase;letter-spacing:.7px;font-weight:700}
  .day{background:var(--card-solid);border:1px solid var(--line);border-radius:18px;padding:15px 16px;margin-bottom:10px;transition:.18s ease;box-shadow:var(--shadow-sm)}
  .day:active{transform:scale(.99)}
  .day.today{border-color:var(--accent-soft-bd);}
  .day .dn{font-weight:700;font-size:.95rem;color:var(--txt)}
  .day .dd{color:var(--mut);font-size:.74rem}
  .day .ds{margin-top:8px;font-size:.86rem;color:#5d554c}
  .day.dim{opacity:.55}
  .acts{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  button,.btn{font:inherit;font-family:inherit;cursor:pointer;border:none;border-radius:999px;padding:11px 18px;font-size:.85rem;font-weight:600;background:var(--card2);color:var(--txt);border:1px solid var(--line)}
  button:active{transform:scale(.97)}
  .btn-p{background:var(--accent);color:#faf5ee;border-color:var(--accent);box-shadow:none;font-weight:700}
  .btn-p:hover{background:var(--accent-d);border-color:var(--accent-d)}
  .btn-sm{padding:7px 12px;font-size:.78rem}
  .btn-gh{background:transparent;border-color:transparent;color:var(--mut)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .stat{background:var(--card2);border-radius:18px;padding:16px}
  .stat .v{font-size:1.55rem;font-weight:800;letter-spacing:-.5px;color:var(--txt)}
  .stat .l{font-size:.66rem;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;margin-top:3px;font-weight:700}
  .stat .d{font-size:.74rem;margin-top:4px;font-weight:500}
  label{display:block;font-size:.74rem;color:var(--mut);margin:14px 0 6px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
  input,select,textarea{width:100%;background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:13px;padding:12px 14px;font:inherit;font-family:inherit;font-size:.95rem}
  textarea{resize:vertical;min-height:70px}
  input::placeholder,textarea::placeholder{color:#b6b4a4}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(224,90,31,.16)}
  .seg{display:flex;gap:6px;flex-wrap:wrap}
  .seg button{flex:1;min-width:auto;background:var(--card2);border-color:transparent}
  .seg button.on{background:var(--accent);color:#faf5ee;border-color:var(--accent)}
  input,select,textarea{border-radius:14px}
  .seg button{border-radius:999px}
  .ico{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex:0 0 auto}
  .nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface-nav);border-top:2px solid var(--navy);display:flex;align-items:center;padding:14px 10px calc(14px + env(safe-area-inset-bottom));z-index:50}
  .nav a{flex:1;color:var(--mut);text-decoration:none;display:flex;flex-direction:column;align-items:center;font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;transition:color .15s}
  .nav a .ni{display:none}
  .nav a.on{color:var(--accent)}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;z-index:100;overscroll-behavior:contain}
  .sheet{position:relative;background:var(--surface);border-radius:28px 28px 0 0;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;padding:10px 22px calc(26px + env(safe-area-inset-bottom));border-top:1px solid var(--line-strong);touch-action:pan-y;will-change:transform;border-top:3px solid var(--accent);box-shadow:0 -18px 44px -24px rgba(22,41,77,.35)}
  .sheet-close{position:absolute;top:10px;right:12px;width:36px;height:36px;border-radius:50%;background:var(--card2);color:var(--mut);border:none;font-size:1.4rem;font-weight:300;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;z-index:5;cursor:pointer}
  .sheet-close:active{background:var(--line);color:var(--txt)}
  body.locked{position:fixed;width:100%;overflow:hidden}
  .sheet h2{font-size:1.15rem}
  .grab{width:38px;height:4px;background:rgba(255,255,255,.18);border-radius:99px;margin:6px auto 18px}
  .bar{display:flex;align-items:flex-end;gap:5px;height:130px;margin-top:8px}
  .bar .b{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:3px;min-width:0}
  .bar .b small{font-size:.58rem;color:var(--mut);white-space:nowrap;overflow:hidden;font-weight:600}
  .legend{display:flex;gap:14px;font-size:.72rem;color:var(--mut);margin-top:10px;flex-wrap:wrap;font-weight:500}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:-1px}
  .flag{display:flex;gap:10px;padding:12px 14px;border-radius:14px;margin-bottom:8px;font-size:.85rem;align-items:flex-start}
  .flag.ok{background:rgba(31,157,99,.1);border:1px solid rgba(31,157,99,.28);color:#15734a}
  .flag.w{background:rgba(217,138,31,.1);border:1px solid rgba(217,138,31,.3);color:#9a6213}
  .flag.b{background:rgba(224,88,79,.1);border:1px solid rgba(224,88,79,.28);color:#b23a32}
  .flag b{display:block;font-size:.88rem;margin-bottom:2px;font-weight:700}
  .flag .fi{font-size:1.1rem;flex:0 0 auto}
  .ref dt{font-weight:700;font-size:.88rem;margin-top:12px;color:var(--txt)}
  .ref dd{color:var(--mut);font-size:.82rem;margin:3px 0 0}
  table{width:100%;border-collapse:collapse;font-size:.82rem;margin-top:6px}
  th,td{text-align:left;padding:8px 6px;border-bottom:1px solid var(--line)}
  th{color:var(--mut);font-weight:700;font-size:.68rem;text-transform:uppercase;letter-spacing:.6px}
  .muted{color:var(--mut)}
  .tiny{font-size:.74rem}
  .sp{height:6px}
  .center{text-align:center}
  ::-webkit-scrollbar{width:0;height:0}
  .toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%);background:var(--navy);color:#faf5ee;padding:13px 24px;border-radius:999px;font-size:.86rem;font-weight:600;z-index:200;opacity:0;transition:.25s;pointer-events:none;box-shadow:var(--shadow);border:1px solid var(--line)}
  .toast.show{opacity:1}
  .act{display:flex;align-items:center;gap:10px;padding:13px 0;border-bottom:1px solid var(--line)}
  .act:last-child{border-bottom:none}
  .act .an{flex:1;min-width:0}
  .act .an b{font-size:.95rem;font-weight:700;color:var(--txt)}
  .act .an .as{font-size:.72rem;color:var(--mut);margin-top:2px;font-weight:500}
  .act.done{opacity:.5;transition:opacity .25s}
  .act.done .an .as{color:var(--good)}
  @media (prefers-reduced-motion: no-preference){
    ::view-transition-old(root),::view-transition-new(root){animation-duration:.2s}
  }
  .step{display:flex;align-items:center;gap:0;border:1px solid var(--line);border-radius:13px;overflow:hidden;flex:0 0 auto;background:var(--card)}
  .step button{border:none;border-radius:0;background:var(--card2);width:40px;height:40px;padding:0;font-size:1.2rem;font-weight:700;color:var(--txt)}
  .step .sv{min-width:36px;text-align:center;font-weight:800;font-size:1rem;color:var(--txt)}
  .step button.acc{background:var(--accent);color:#fff}
  .dotline{display:flex;gap:4px;margin-top:6px}
  .dotline i{width:9px;height:9px;border-radius:50%;background:var(--card2);border:1px solid var(--line)}
  .dotline i.f{background:var(--good);border-color:var(--good);}
  a.lnk{color:var(--accent);text-decoration:none;font-weight:600}
  details{background:var(--card);border:1px solid var(--line);border-radius:18px;margin-bottom:12px;overflow:hidden}
  details summary{list-style:none;cursor:pointer;padding:16px 18px;font-weight:800;font-size:.95rem;display:flex;align-items:center;justify-content:space-between;color:var(--txt)}
  details summary::-webkit-details-marker{display:none}
  details summary::after{content:"▾";color:var(--mut);transition:.2s}
  details[open] summary::after{transform:rotate(180deg)}
  details .dc{padding:0 18px 16px;font-size:.85rem;color:#5d554c;line-height:1.55}
  details .dc p{margin:0 0 9px}
  details .dc ul{margin:4px 0 10px 18px}
  details .dc li{margin:3px 0}
  details .dc table{margin:4px 0 8px}
  details .dc h3{font-size:.84rem;margin:14px 0 5px;color:var(--txt);font-weight:700}
  .zone{display:inline-block;width:26px;text-align:center;border-radius:6px;font-weight:800;font-size:.7rem;padding:3px 0;color:#fff}
  /* Wochenübersicht */
  .wk{background:var(--card);border:1px solid var(--line);border-radius:16px;margin-bottom:10px;overflow:hidden;transition:opacity .2s}
  .wk-sum{list-style:none;cursor:pointer;padding:12px 14px 12px 12px;display:flex;align-items:center;gap:12px;user-select:none}
  .wk-sum::-webkit-details-marker{display:none}
  .wk-num{font-size:.85rem;font-weight:800;color:var(--mut);min-width:32px;letter-spacing:-.3px}
  .wk-info{flex:1;min-width:0}
  .wk-title{font-weight:700;font-size:.9rem;letter-spacing:-.2px}
  .wk-meta{font-size:.7rem;color:var(--mut);margin-top:1px}
  .wk-bar{height:4px;background:var(--card2);border-radius:2px;overflow:hidden;margin-top:7px}
  .wk-bar-fill{height:100%;border-radius:2px;transition:width .3s}
  .wk-stats{text-align:right;flex:0 0 auto;min-width:54px}
  .wk-km{font-size:.78rem;font-weight:600}
  .wk-km b{font-size:1.05rem;font-weight:800}
  .wk-pct{font-size:.7rem;color:var(--mut);margin-top:1px}
  .wk.cur{border-color:var(--accent);}
  .wk.cur .wk-num{color:var(--accent)}
  .wk.past{opacity:.7}
  .wk.future{opacity:.45}
  .wk.future:hover,.wk.past:hover{opacity:1}
  .wk[open] .wk-sum{border-bottom:1px solid var(--line)}
  .wk-body{padding:12px 14px 14px}
  #syncBadge{position:fixed;bottom:calc(90px + env(safe-area-inset-bottom));right:14px;width:42px;height:42px;border-radius:50%;background:var(--card-solid);border:1px solid var(--line);display:none;align-items:center;justify-content:center;font-size:.95rem;font-weight:700;cursor:pointer;z-index:30;transition:.2s;box-shadow:0 10px 26px -12px rgba(120,80,40,.4)}
  #syncBadge.show{display:flex}
  @keyframes spin{to{transform:rotate(360deg)}}
  #syncBadge.spin span{display:inline-block;animation:spin 1s linear infinite}
  .sbtn{cursor:pointer;width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#93917e;border:1px solid rgba(255,255,255,.08);background:#ffffff;flex:none}
  .sbtn.spin svg{animation:spin .9s linear infinite}
  /* ===== Coach-Chat Vollbild ===== */
  .cv{position:fixed;inset:0;z-index:120;background:var(--bg);display:flex;flex-direction:column;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
  .cv.show{transform:translateY(0)}
  .cv-head{flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:calc(12px + env(safe-area-inset-top)) 16px 12px;border-bottom:1px solid var(--line);background:var(--surface-nav)}
  .cv-back{width:36px;height:36px;border-radius:50%;background:var(--surface-2);border:none;color:var(--txt);display:flex;align-items:center;justify-content:center;font-size:1.3rem;cursor:pointer;flex:0 0 auto;padding:0}
  .cv-av{width:38px;height:38px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#faf5ee;flex:0 0 auto}
  .cv-ti{flex:1;min-width:0}
  .cv-ti b{font-size:1rem;display:block;line-height:1.1;color:var(--txt)}
  .cv-ti span{font-family:var(--mono);font-size:.66rem;letter-spacing:.5px;color:var(--accent);display:flex;align-items:center;gap:5px}

// WICHTIG: ISO-Strings ("YYYY-MM-DD") als LOKALE Mitternacht parsen (sonst UTC → Off-by-one)
function parseLocalDate(s){ if(s instanceof Date) return s; const m=String(s).match(/^(\d{4})-(\d{2})-(\d{2})/); return m? new Date(+m[1],+m[2]-1,+m[3]) : new Date(s); }
function planStart(){ return DEFAULT_START; }  // FIX verankert — verhindert Wochen-Verschiebung; nur das Renndatum ist flexibel
function raceDate(){  const c=DB&&DB.cfg; return c&&c.raceDate?  parseLocalDate(c.raceDate)  : DEFAULT_RACE; }
function goalSec(){   const c=DB&&DB.cfg; return (c&&c.goalSec)||DEFAULT_GOAL; }
function raceCity(){  const c=DB&&DB.cfg; return (c&&c.raceCity)||"München"; }
function raceLabel(){ return "Marathon "+raceCity(); }

 {w:19, dr:"14.09.–20.09.", ph:"Taper", km:50, lr:22, di:"6 km MP (5:40) + Ein/Aus", do:"12 km Z2 (5:55)", fr:"6 km Z1 (6:35)", so:"22 km · 8 km MP am Ende"},
 {w:20, dr:"21.09.–27.09.", ph:"Taper", km:38, lr:16, di:"4×1000m Z4 (4:55) Tp 2min + Ein/Aus", do:"10 km Z2 (6:00)", fr:"5 km Z1 (6:35)", so:"16 km · 4 km MP"},
 {w:21, dr:"28.09.–04.10.", ph:"Taper · Rennwoche", km:34, lr:14, di:"6 km Z2 + 4×100m Steigerungen", do:"8 km Z2 (6:00)", fr:"5 km Z1 (6:35)", so:"12 km Z2 locker · letzter längerer Lauf vor München (Marathon 11.10.)"},
];

const DOW = ["Mo","Di","Mi","Do","Fr","Sa","So"];
const DOWL = ["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];

// Fixed runs only — 4/Woche (Di Qualität, Do GA1, Fr Recovery, So Long Run)
const RUNS = [
 {slot:"di", day:1, kind:"quality",  label:"Lauf · Qualität"},
 {slot:"do", day:3, kind:"easy",     label:"Lauf · GA1 aerob"},
 {slot:"fr", day:4, kind:"recovery", label:"Lauf · Recovery"},
 {slot:"so", day:6, kind:"long",     label:"Long Run"},
];
function runIsRest(w,slot){ return (runContent(w,slot).det||"").trim()==="–"; }
const DEFAULT_ACTS = [
 {id:"padel",   name:"Padel",        type:"counter", target:1, optional:false},
 {id:"kr_back", name:"Kraft Rücken", type:"counter", target:1, optional:false},
 {id:"kr_chest",name:"Kraft Brust",  type:"counter", target:1, optional:false},
 {id:"kr_legs", name:"Kraft Beine",  type:"counter", target:1, optional:false},
 {id:"mobility",name:"Mobility",     type:"counter", target:2, optional:false},
 {id:"rad",     name:"Rad fahren",   type:"ride",    target:0, optional:true},
];

/* PPL-Vorlagen — der „Kern", den man einmal einrichtet und je Einheit frei anpasst.
   Jeder Tag hängt an einer freien Einheit (actId), damit ein abgeschlossenes
   Training deren Wochen-Zähler hochsetzt. */
const DEFAULT_GYM = {
 push:{ short:"Push", label:"Push · Brust/Schulter/Trizeps", actId:"kr_chest", ex:[
   {name:"Bankdrücken",           sets:4, reps:"6-10"},
   {name:"Schrägbank Kurzhantel", sets:3, reps:"8-12"},
   {name:"Schulterdrücken",       sets:3, reps:"8-10"},
   {name:"Seitheben",             sets:3, reps:"12-15"},
   {name:"Trizeps Pushdown",      sets:3, reps:"10-12"},
 ]},
 pull:{ short:"Pull", label:"Pull · Rücken/Bizeps", actId:"kr_back", ex:[
   {name:"Klimmzüge",             sets:4, reps:"6-10"},
   {name:"Latzug",                sets:3, reps:"10-12"},
   {name:"Rudern (Kabel)",        sets:3, reps:"8-12"},
   {name:"Reverse Flys",          sets:3, reps:"12-15"},
   {name:"Bizeps Curls",          sets:3, reps:"10-12"},
 ]},
 legs:{ short:"Beine", label:"Beine", actId:"kr_legs", ex:[
   {name:"Kniebeuge",             sets:4, reps:"5-8"},
   {name:"Beinpresse",            sets:3, reps:"10-12"},
   {name:"Rum. Kreuzheben",       sets:3, reps:"8-10"},

 ]},
};

/* ============ STATE / STORAGE ============ */
const LS="marathon_koeln_2026";
const BK_PREFIX="marathon_koeln_2026_bk_";
const BK_MAX=10;
function freshDB(){
  return {v:2, logs:{}, moves:{}, skips:{}, planEdits:{},
          activities:JSON.parse(JSON.stringify(DEFAULT_ACTS)),
          acts:{}, rides:[], weights:[], hrBase:null,
          gym:{templates:JSON.parse(JSON.stringify(DEFAULT_GYM)), sessions:[]}};
}
function migrateDB(d){
  // Niemals Daten wegwerfen — fehlende Felder auffüllen, Version setzen
  if(!d || typeof d!=="object") return freshDB();
  const base=freshDB();
  for(const k of Object.keys(base)){
    if(d[k]===undefined || d[k]===null) d[k]=base[k];
  }
  // Reparatur: früher konnte ein verschobener Trainingsstart gespeichert werden —
  // der schob "diese Woche" auf bereits absolvierte Wochen. Trainingsstart ist jetzt fix.
  if(d.cfg && d.cfg.planStart!==undefined) delete d.cfg.planStart;
  d.v=2;
  return d;
}
function listBackups(){
  const out=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k && k.startsWith(BK_PREFIX)) out.push(k);
  }
  return out.sort(); // chronologisch, ältestes zuerst (timestamp im key)
}
function hasContent(d){
  return d && (Object.keys(d.logs||{}).length || (d.rides||[]).length || (d.weights||[]).length || Object.keys(d.acts||{}).length);
}
function recoverFromBackup(){
  const keys=listBackups();
  while(keys.length){
    const k=keys.pop();
    try{ const d=JSON.parse(localStorage.getItem(k));
      if(hasContent(d)) return d;
    }catch(e){}
  }
  return null;
}
function makeBackup(){
  try{
    const raw=localStorage.getItem(LS);
    if(!raw) return;
    localStorage.setItem(BK_PREFIX+Date.now(), raw);
    const keys=listBackups();
    while(keys.length>BK_MAX) localStorage.removeItem(keys.shift());
  }catch(e){ console.warn("backup failed", e); }
}
let DB = load();
function load(){
  try{
    const raw=localStorage.getItem(LS);
    if(raw){
      const d=JSON.parse(raw);
      if(d && typeof d==="object") return migrateDB(d);
    }
  }catch(e){ console.error("load failed:", e); }
  // Hauptdaten leer/kaputt → versuche letztes Backup
  const rec=recoverFromBackup();
  if(rec){
    console.warn("Datenverlust erkannt — Wiederherstellung aus Backup");
    setTimeout(()=>toast("Daten aus Backup wiederhergestellt"),300);
    return migrateDB(rec);
  }
  return freshDB();
}
let _lastBk=0;
function save(){
  DB.lastModified=Date.now();
  const now=Date.now();
  // Backup höchstens 1× pro 5 min, aber immer wenn lange nicht
  if(now-_lastBk > 5*60*1000){
    const prev=localStorage.getItem(LS);
    if(prev){ localStorage.setItem(BK_PREFIX+now, prev);
      const ks=listBackups(); while(ks.length>BK_MAX) localStorage.removeItem(ks.shift());
      _lastBk=now;
    }
  }
  localStorage.setItem(LS, JSON.stringify(DB));
  schedulePush();
}

/* ============ CLOUD SYNC (private GitHub Gist) ============ */
const CK="marathon_koeln_2026_cloud";
let CLOUD = (()=>{ try{ return JSON.parse(localStorage.getItem(CK))||{}; }catch(e){ return {}; } })();
function saveCloud(){ localStorage.setItem(CK, JSON.stringify(CLOUD)); }
const GIST_FILE="marathon-koeln-2026.json";
let syncState="idle", syncMsg="", cloudBusy=false, _pushT=null;
function setSync(s,m){ syncState=s; syncMsg=m||""; updateBadge(); }
function updateBadge(){
  const b=document.getElementById("syncBadge"); if(!b) return;
  if(!CLOUD.token){ b.classList.remove("show"); return; }
  b.classList.add("show"); b.classList.toggle("spin", syncState==="syncing");
  const ic={idle:["○","var(--mut)"],syncing:["⟳","var(--blue)"],ok:["✓","var(--good)"],err:["⚠","var(--bad)"]}[syncState];
  b.innerHTML=`<span style="color:${ic[1]}">${ic[0]}</span>`;
  b.title= syncState==="ok"&&CLOUD.lastSync ? `Sync vor ${Math.max(0,Math.round((Date.now()-CLOUD.lastSync)/60000))} min` : syncState==="err"?("Sync-Fehler: "+syncMsg):"Cloud-Sync";
}
function schedulePush(){
  if(!CLOUD.token||!CLOUD.gistId) return;
  clearTimeout(_pushT); _pushT=setTimeout(()=>{ if(!cloudBusy) cloudPush(); }, 1500);
}
async function ghFetch(path, opts={}){
  const r=await fetch("https://api.github.com"+path, {...opts, headers:{
    "Authorization":"token "+CLOUD.token,"Accept":"application/vnd.github+json",
    "Content-Type":"application/json", ...(opts.headers||{})}});
  if(!r.ok){ const t=await r.text().catch(()=>""); throw new Error("HTTP "+r.status+(t?": "+t.slice(0,120):"")); }
  return r.json();
}
async function cloudPush(force){
  if(!CLOUD.token||!CLOUD.gistId||cloudBusy) return;
  // SCHUTZ: niemals leeres Lokal über gefülltes Remote pushen
  if(!force && !hasContent(DB)){
    try{
      const g=await ghFetch("/gists/"+CLOUD.gistId);
      const f=g.files&&g.files[GIST_FILE];
      if(f){ const r=JSON.parse(f.content); if(hasContent(r)){
        // Remote hat Daten, Lokal nicht — eher Daten ziehen statt zerstören
        cloudBusy=false; await cloudPull(); return;
      }}
    }catch(e){/* fail-safe: bei Fehler lieber gar nichts pushen */ setSync("err", e.message); return; }
  }
  cloudBusy=true; setSync("syncing");
  try{
    await ghFetch("/gists/"+CLOUD.gistId, {method:"PATCH",
      body:JSON.stringify({files:{[GIST_FILE]:{content:JSON.stringify(DB)}}})});
    CLOUD.lastSync=Date.now(); saveCloud(); setSync("ok");
  }catch(e){ setSync("err", e.message); }
  finally{ cloudBusy=false; updateBadge(); }
}
async function cloudPull(){
  if(!CLOUD.token||!CLOUD.gistId||cloudBusy) return;
  cloudBusy=true; setSync("syncing");
  try{
    const g=await ghFetch("/gists/"+CLOUD.gistId);
    const f=g.files&&g.files[GIST_FILE];
    if(!f) throw new Error("Datei im Gist fehlt");
    const remote=JSON.parse(f.content);
    const rT=remote.lastModified||0, lT=DB.lastModified||0;
    const rEmpty=!hasContent(remote), lEmpty=!hasContent(DB);
    // SCHUTZ: leeres Lokal überschreibt niemals ein gefülltes Remote
    if(lEmpty && !rEmpty){
      DB=remote; localStorage.setItem(LS, JSON.stringify(DB));

async function ensureStravaToken(){

    const d = await stravaTokenExchange({client_id:c.clientId, client_secret:c.clientSecret, refresh_token:c.refreshToken, grant_type:"refresh_token"});

    c.accessToken=d.access_token; c.refreshToken=d.refresh_token||c.refreshToken; c.expiresAt=d.expires_at*1000; save();

// Streams → Trackpoint-Array → computeDetails()
function streamsToDetails(streams, startDate){
  if(!streams?.time?.data || !streams?.distance?.data) return null;
  const T=streams.time.data, D=streams.distance.data, H=streams.heartrate?.data||[];
  const N=Math.min(T.length, D.length);
  if(N<4) return null;
  const start=new Date(startDate).getTime();
  const pts=[];
  for(let i=0;i<N;i++){
    pts.push({ t:new Date(start+T[i]*1000), cumM:D[i], hr:H[i]||null });
  }
  return computeDetails(pts);
}

    // Krafttraining? → mit live mitgeschriebener Gym-Einheit desselben Tages zusammenführen
    const isStrength=/Weight|Strength|Crossfit|HIIT|Workout/i.test(a.type);

  c.pending = (c.pending||[]).filter(x=>x.id!==a.id);
  save(); render(); toast(resultMsg);
}

const VAPID_PUBLIC = "BOxhwsmGSntoJZ5sR0NNjjePiVFAAYyxfZHAEouIQI94p1NlkvS3dQWqJy-ok14BKLPohOkUS5IhKTE0kkNVPJo";

function urlBase64ToUint8Array(b){
  const padding='='.repeat((4-b.length%4)%4);
  const base64=(b+padding).replace(/-/g,'+').replace(/_/g,'/');
  const raw=atob(base64); const arr=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i);
  return arr;
}

async function pushEnable(){

  if(!window.matchMedia('(display-mode: standalone)').matches && !window.navigator.standalone){
    toast("Bitte vom Home-Bildschirm öffnen (PWA-Modus), nicht aus Safari"); return;
  }

  let step="Start";
  try{
    step="Service-Worker registrieren";
    const reg=await navigator.serviceWorker.register("./sw.js");
    step="auf SW warten";
    await navigator.serviceWorker.ready;
    step="Permission anfordern";
    const perm=await Notification.requestPermission();
    if(perm!=="granted"){ toast("Permission "+perm); return; }

    let sub=await reg.pushManager.getSubscription();

      step="bei Apple Push-Service abonnieren";
      sub=await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey:urlBase64ToUint8Array(VAPID_PUBLIC) });
    }
    step="Subscription an Worker senden";
    const r=await fetch(c.workerUrl+"/subscribe", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(sub) });
    if(!r.ok){ const t=await r.text().catch(()=>""); throw new Error("Worker HTTP "+r.status+" "+t.slice(0,60)); }
    c.subscription=sub.toJSON(); save();
    toast("Push aktiv ✓"); render();

    const msg = e && e.message ? e.message : String(e);
    alert("Push-Setup gescheitert\n\nSchritt: "+step+"\nFehler: "+msg+"\n\n(Bitte diesen Text dem Entwickler schicken.)");

/* ============ DATE HELPERS ============ */
const MS=86400000;
function today(){ const n=new Date(); return new Date(n.getFullYear(),n.getMonth(),n.getDate()); }
function dkey(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function addDays(d,n){ return new Date(d.getTime()+n*MS); }
function dateOf(weekNum,dayIdx){ const s=planStart(); return new Date(s.getFullYear(),s.getMonth(),s.getDate()+(weekNum-1)*7+dayIdx); }
function fmtD(d){ return DOW[(d.getDay()+6)%7]+" "+String(d.getDate()).padStart(2,"0")+"."+String(d.getMonth()+1).padStart(2,"0")+"."; }
function locate(d){
  const ps=planStart(), rd=raceDate();
  const du=Date.UTC(d.getFullYear(),d.getMonth(),d.getDate());
  const diff=Math.round((du-Date.UTC(ps.getFullYear(),ps.getMonth(),ps.getDate()))/MS);
  if(diff<0) return {pre:true};
  if(du>Date.UTC(rd.getFullYear(),rd.getMonth(),rd.getDate())) return {post:true}; // erst NACH dem Rennen "beendet"
  let w=Math.floor(diff/7)+1, day=diff%7;
  if(w>21) w=21;   // Tage zwischen Plan-Ende (W21) und Rennen als Renn-Woche (W21) zeigen
  return {week:w, dayIdx:day};
}

/* ============ RUN / PLAN RESOLUTION ============ */
function runId(w,slot){ return `W${w}-${slot}`; }
function runContent(w,slot){
  const W=WEEKS[w-1], R=RUNS.find(r=>r.slot===slot);
  const def={title:R.label, det:W[slot]};
  const e=DB.planEdits[runId(w,slot)];
  return e? {title:e.title||def.title, det:(e.det!=null?e.det:def.det), edited:true} : def;
}
function effDay(w,slot){ const id=runId(w,slot); return DB.moves[id]!=null?DB.moves[id]:RUNS.find(r=>r.slot===slot).day; }
function isSkipped(id){ return !!DB.skips[id]; }
function runDoneKm(w){ let k=0; RUNS.forEach(R=>{ const L=DB.logs[runId(w,R.slot)]; if(L&&L.dist)k+=L.dist; }); return k; }
function totalRunKm(){ let k=0; Object.entries(DB.logs).forEach(([id,L])=>{ if(L&&L.dist)k+=L.dist; }); return k; }


/* ============ COACHING-ENGINE: TRIMP, ATL/CTL/TSB, Zonen, Drift ============ */
const HR_MAX=195, HR_REST=50;
const HR_Z = [140, 150, 160, 172]; // Z1<140, Z2 140-149, Z3 150-159, Z4 160-171, Z5 >=172
function hrToZone(hr){ if(!hr) return null;
  if(hr<HR_Z[0]) return 1; if(hr<HR_Z[1]) return 2; if(hr<HR_Z[2]) return 3; if(hr<HR_Z[3]) return 4; return 5; }
function trimpFor(L){
  if(!L?.sec) return 0;
  const min=L.sec/60;
  if(L.hr && L.hr>HR_REST){
    const hrr=Math.max(0,Math.min(1,(L.hr-HR_REST)/(HR_MAX-HR_REST)));
    return min*hrr*(0.64+1.92*hrr);
  }
  return min*0.7;
}
function dailyTrimpMap(){
  const map={};
  WEEKS.forEach(W=>RUNS.forEach(R=>{
    const id=runId(W.w,R.slot), L=DB.logs[id];
    if(!L?.sec) return;
    const dt=dateOf(W.w,effDay(W.w,R.slot)), k=dkey(dt);
    map[k]=(map[k]||0)+trimpFor(L);
  }));
  (DB.rides||[]).forEach(r=>{ if(!r?.sec) return; map[r.date]=(map[r.date]||0)+trimpFor(r)*0.85; });
  // Krafttraining zählt mit in die Belastung: HF-basiert (gemergt) abgewertet,
  // sonst grob aus der Anzahl Arbeitssätze geschätzt.
  ((DB.gym&&DB.gym.sessions)||[]).forEach(s=>{
    if(!s||!s.date||!s.ex) return;
    let t;
    if(s.hr && s.sec) t=trimpFor({hr:s.hr,sec:s.sec})*0.7;
    else { const sets=s.ex.reduce((n,e)=>n+e.sets.filter(x=>x.kg||x.done).length,0); t=sets*2.2; }
    if(t) map[s.date]=(map[s.date]||0)+t;
  });
  return map;
}
function loadSeries(){
  const tm=dailyTrimpMap(), start=planStart(), td=today();
  const days=Math.max(1, Math.floor((td-start)/MS)+1);
  let atl=0, ctl=0;
  const dA=Math.exp(-1/7), dC=Math.exp(-1/42);
  const out=[];
  for(let i=0;i<days;i++){
    const d=addDays(start,i), t=tm[dkey(d)]||0;
    atl=atl*dA+t*(1-dA); ctl=ctl*dC+t*(1-dC);
    out.push({d,t,atl,ctl,tsb:ctl-atl});
  }
  return out;
}
function currentForm(){ const s=loadSeries(); return s.length?s[s.length-1]:{atl:0,ctl:0,tsb:0,t:0}; }
function formLabel(tsb){
  if(tsb>=25) return {label:"sehr frisch",color:"var(--good)"};
  if(tsb>=5)  return {label:"frisch",color:"var(--good)"};
  if(tsb>=-10) return {label:"normal",color:"var(--mut)"};
  if(tsb>=-25) return {label:"müde",color:"var(--warn)"};
  return {label:"überlastet",color:"var(--bad)"};
}

// Zonen-Verteilung: nutzt details.zones wenn vorhanden, sonst Schätzung aus Plan-Text
function zoneAllocation(kind,det){
  const d=det||"";
  if(kind==="long" && /MP\b/.test(d)){
    const totalKm=parseFloat(d)||0;
    const m=d.match(/(\d+)\s*km\s*MP/);
    const mpKm=m?parseFloat(m[1]):0;
    const f=totalKm>0?Math.min(1,mpKm/totalKm):0;
    return {z2:1-f, z3:f};
  }
  switch(kind){
    case "quality":
      if(/Z5/.test(d)) return {z1:.35, z5:.65};
      return {z1:.30, z4:.70};
    case "easy": return {z2:1};
    case "recovery": return {z1:1};
    case "long": return {z2:1};
  }
  return {z2:1};
}
function weekZoneSec(w){
  const out={z1:0,z2:0,z3:0,z4:0,z5:0};
  RUNS.forEach(R=>{
    const id=runId(w,R.slot), L=DB.logs[id];
    if(!L?.sec) return;
    if(L.details?.zones){
      Object.entries(L.details.zones).forEach(([k,v])=>{ out[k]=(out[k]||0)+v; });
      return;
    }
    const a=zoneAllocation(R.kind, runContent(w,R.slot).det);
    Object.entries(a).forEach(([k,v])=>{ out[k]=(out[k]||0)+v*L.sec; });
  });
  return out;
}
function recentZoneRatio(){
  const loc=locate(today()), cur=loc.week||1;
  const sum={z1:0,z2:0,z3:0,z4:0,z5:0};
  for(let w=Math.max(1,cur-1); w<=cur; w++){
    const z=weekZoneSec(w); Object.keys(z).forEach(k=>sum[k]+=z[k]||0);
  }
  const tot=Object.values(sum).reduce((a,b)=>a+b,0);
  if(!tot) return null;
  return { easyPct:(sum.z1+sum.z2)/tot*100, grayPct:sum.z3/tot*100, hardPct:(sum.z4+sum.z5)/tot*100, total:tot };
}

// Cardiac Drift / Aerobic Decoupling
function driftFor(L){
  const d=L?.details;
  if(!d) return null;
  if(d.hr1 && d.hr2){
    if(d.pace1 && d.pace2){
      const sp1=1/d.pace1, sp2=1/d.pace2; // speed = 1/pace
      const ef1=sp1/d.hr1, ef2=sp2/d.hr2;
      return ((ef1-ef2)/ef1)*100;
    }
    return (d.hr2-d.hr1)/d.hr1*100;
  }
  return null;
}
function lastLongRunDrift(){
  const longs=runLogs().filter(r=>r.kind==="long");
  for(let i=longs.length-1;i>=0;i--){
    const dr=driftFor(longs[i]);
    if(dr!=null) return {drift:dr, dist:longs[i].dist, date:longs[i].date};
  }
  return null;
}


function runLogs(){
  const out=[];
  WEEKS.forEach(W=>{ RUNS.forEach(R=>{
    const id=runId(W.w,R.slot), L=DB.logs[id];
    if(!L||!L.dist||!L.sec) return;
    out.push({...L, id, kind:R.kind, week:W.w, date:dateOf(W.w,effDay(W.w,R.slot)),
      pace:L.sec/L.dist, speed:L.dist*1000/(L.sec/60)});
  });});
  return out.sort((a,b)=>a.date-b.date);
}

/* ============ FORMAT ============ */
function pace(s){ if(!s||!isFinite(s))return "–"; const m=Math.floor(s/60),x=Math.round(s%60); return m+":"+String(x).padStart(2,"0"); }
function hms(sec){ sec=Math.round(sec); const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60; return (h?h+":":"")+String(m).padStart(h?2:1,"0")+":"+String(s).padStart(2,"0"); }
function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),1900); }

/* ============ ACTIVITY FILE PARSER (Strava GPX / Garmin·Strava TCX) ============ */
function haversine(la1,lo1,la2,lo2){
  const R=6371000, t=Math.PI/180;
  const dLa=(la2-la1)*t, dLo=(lo2-lo1)*t;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*t)*Math.cos(la2*t)*Math.sin(dLo/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}
// Berechnet Details (Splits, Hälften, Zonen, Bestleistungen) aus einer Trackpoint-Serie.
// pts: [{lat?, lon?, t:Date, hr:number|null, cumM:number}]
function computeDetails(pts){
  if(!pts || pts.length<4) return null;
  const tFirst=pts[0].t, tLast=pts[pts.length-1].t;
  const totalSec=(tLast-tFirst)/1000;
  const totalM=pts[pts.length-1].cumM;
  if(!totalM||totalSec<60) return null;

  // Splits pro km
  const splits=[];
  let next=1000, lastIdx=0;
  for(let i=0;i<pts.length;i++){
    while(pts[i].cumM>=next){
      const t1=pts[lastIdx].t.getTime(), t2=pts[i].t.getTime();
      const segSec=(t2-t1)/1000, segM=pts[i].cumM-pts[lastIdx].cumM;
      const pace=segM>0?segSec/(segM/1000):0;
      const slice=pts.slice(lastIdx,i+1).map(p=>p.hr).filter(h=>h);
      splits.push({ km:+(next/1000).toFixed(0), pace:Math.round(pace), hr:slice.length?Math.round(slice.reduce((a,b)=>a+b,0)/slice.length):null });
      lastIdx=i; next+=1000;
      if(splits.length>80) break;
    }
  }

  // Hälften (zeitlich geteilt)
  const midT=tFirst.getTime()+(tLast-tFirst)/2;
  const idxMid=pts.findIndex(p=>p.t.getTime()>=midT);
  const slice=(a,b)=>{
    const arr=pts.slice(a,b+1); if(arr.length<2) return null;
    const hrs=arr.map(p=>p.hr).filter(h=>h);
    const sec=(arr[arr.length-1].t-arr[0].t)/1000;
    const m=arr[arr.length-1].cumM-arr[0].cumM;
    return { hr:hrs.length?Math.round(hrs.reduce((a,b)=>a+b,0)/hrs.length):null,
             pace:m>0?Math.round(sec/(m/1000)):null };
  };
  const h1=slice(0, Math.max(1,idxMid)), h2=slice(Math.max(1,idxMid), pts.length-1);

  // Zonenzeit (pro Trackpoint-Sample)
  const zones={z1:0,z2:0,z3:0,z4:0,z5:0};
  for(let i=1;i<pts.length;i++){
    const dt=(pts[i].t-pts[i-1].t)/1000;
    if(dt<0||dt>30) continue;
    const z=hrToZone(pts[i].hr);
    if(z) zones["z"+z]+=dt;
  }

  // Beste 1k/5k (rollende Distanz-Fenster)
  function bestFor(windowM){
    if(totalM<windowM) return null;
    let best=Infinity, bestSec=null, j=0;
    for(let i=0;i<pts.length;i++){
      while(j<pts.length-1 && pts[j].cumM-pts[i].cumM<windowM) j++;
      if(pts[j].cumM-pts[i].cumM<windowM) break;
      const sec=(pts[j].t-pts[i].t)/1000;
      if(sec<best){ best=sec; bestSec=sec; }
    }
    return best===Infinity?null:{pace:Math.round(bestSec/(windowM/1000)), sec:Math.round(bestSec)};
  }

  // Downsampled Kurve für Flächen-Charts (~110 Punkte, gleitendes Pace-Fenster)
  const CN=Math.min(110, Math.max(20, Math.floor(pts.length/3)));
  const curve=[];
  const stepM=totalM/CN;
  let ci=0;
  for(let i=1;i<=CN;i++){
    const targetM=i*stepM;
    while(ci<pts.length-1 && pts[ci].cumM<targetM) ci++;
    let cj=ci;
    while(cj>0 && pts[ci].cumM-pts[cj].cumM<stepM*0.8) cj--;
    const dm=pts[ci].cumM-pts[cj].cumM, dts=(pts[ci].t-pts[cj].t)/1000;
    const p=dm>5 ? dts/(dm/1000) : null;
    curve.push({ m:Math.round(pts[ci].cumM), pace:p?Math.round(p):null, hr:pts[ci].hr||null });
  }

  return {
    splits, zones, curve,
    hr1:h1?.hr||null, hr2:h2?.hr||null, pace1:h1?.pace||null, pace2:h2?.pace||null,
    best1k:bestFor(1000), best5k:bestFor(5000), best10k:bestFor(10000),
    totalM:Math.round(totalM), totalSec:Math.round(totalSec)
  };
}

/* ============ STRAVA-STYLE CHART HELPERS ============ */
// Flächen-Chart: Pace (invertiert — schneller = höher) oder HF
function svgAreaChart(curve, key, opts={}){
  const data=curve.filter(c=>c[key]!=null && isFinite(c[key]));
  if(data.length<5) return "";
  const W=340, H=120, padL=34, padB=18, padT=6;
  let vals=data.map(d=>d[key]);
  // Pace: Ausreißer clampen (Stehenbleiben etc.)
  if(key==="pace"){
    const med=[...vals].sort((a,b)=>a-b)[Math.floor(vals.length/2)];
    vals=vals.map(v=>Math.min(v, med*1.8));
  }
  const mn=Math.min(...vals), mx=Math.max(...vals);
  const rg=(mx-mn)||1;
  const inv=key==="pace"; // schnell = oben
  const X=i=>padL+(data[i].m/(data[data.length-1].m))*(W-padL-6);
  const Y=v=>{ const t=(v-mn)/rg; return padT+(inv?t:(1-t))*(H-padT-padB); };
  let path=`M${X(0).toFixed(1)} ${Y(vals[0]).toFixed(1)}`;
  for(let i=1;i<data.length;i++) path+=` L${X(i).toFixed(1)} ${Y(vals[i]).toFixed(1)}`;
  const area=path+` L${X(data.length-1).toFixed(1)} ${H-padB} L${X(0).toFixed(1)} ${H-padB} Z`;
  const col=opts.color||"var(--accent)";
  // y-Achse: 3 Ticks
  const ticks=[mn, mn+rg/2, mx].map(v=>({v, y:Y(v)}));
  const fmtTick=v=> key==="pace" ? paceFmt(Math.round(v)) : Math.round(v);
  // x-Achse: km-Marken
  const totKm=data[data.length-1].m/1000;
  const kmStep=totKm>20?5:(totKm>8?2:1);
  let xticks="";
  for(let k=kmStep;k<totKm;k+=kmStep){
    const x=padL+(k*1000/data[data.length-1].m)*(W-padL-6);

      </div>
      <span class="tiny muted" style="text-align:right;min-width:86px">${ranges[k]}</span>

  }).join("");
}

// → {dist (km), sec, hr (avg bpm|null), date (Date|null), kind:'run'|'ride', details?:object} | null
function parseActivity(text){
  let doc; try{ doc=new DOMParser().parseFromString(text,"application/xml"); }catch(e){ return null; }
  if(doc.querySelector("parsererror")) return null;
  const g=t=>[...doc.getElementsByTagName(t)];
  // ---- TCX ----
  if(doc.getElementsByTagName("TrainingCenterDatabase").length || g("Lap").length){
    let sec=0, dist=0, hrs=[], date=null, sport=null;
    const act=doc.getElementsByTagName("Activity")[0];
    if(act) sport=(act.getAttribute("Sport")||"").toLowerCase();
    g("Lap").forEach(l=>{
      const tt=l.getElementsByTagName("TotalTimeSeconds")[0];
      const dm=l.getElementsByTagName("DistanceMeters")[0];
      if(tt) sec+=parseFloat(tt.textContent)||0;
      if(dm) dist+=parseFloat(dm.textContent)||0;
      const st=l.getAttribute("StartTime"); if(st&&!date) date=new Date(st);
    });
    // Trackpoints für Details
    const tps=[];
    g("Trackpoint").forEach(tp=>{
      const tEl=tp.getElementsByTagName("Time")[0];
      const dmEl=tp.getElementsByTagName("DistanceMeters")[0];
      const hEl=tp.getElementsByTagName("HeartRateBpm")[0];
      const t=tEl?new Date(tEl.textContent):null;
      const cum=dmEl?parseFloat(dmEl.textContent):null;
      let hr=null;
      if(hEl){ const v=hEl.getElementsByTagName("Value")[0]; const n=parseFloat((v||hEl).textContent); if(n>0){ hr=n; hrs.push(n); } }
      if(t && cum!=null) tps.push({t, cumM:cum, hr});
    });
    if(!dist && tps.length){ dist=tps[tps.length-1].cumM; }
    if(!sec && tps.length>=2){ sec=(tps[tps.length-1].t-tps[0].t)/1000; }
    if(!date){ const id=doc.getElementsByTagName("Id")[0]; if(id)date=new Date(id.textContent); }
    if(!sec||!dist) return null;
    const details = tps.length>=4 ? computeDetails(tps) : null;
    return {dist:+(dist/1000).toFixed(2), sec:Math.round(sec), hr:hrs.length?Math.round(hrs.reduce((a,b)=>a+b,0)/hrs.length):null,
      date:date&&!isNaN(date)?date:null, kind:/bik|cycl|ride/.test(sport)?"ride":"run", details};
  }
  // ---- GPX ----
  const pts=g("trkpt");
  if(pts.length){
    let dist=0, hrs=[], lastLa=null,lastLo=null;
    const tps=[]; // {t, cumM, hr}
    pts.forEach(p=>{
      const la=parseFloat(p.getAttribute("lat")), lo=parseFloat(p.getAttribute("lon"));
      if(lastLa!=null) dist+=haversine(lastLa,lastLo,la,lo);
      lastLa=la; lastLo=lo;
      const tEl=p.getElementsByTagName("time")[0];
      const t=tEl?new Date(tEl.textContent):null;
      let hr=null;
      const ext=p.getElementsByTagName("*");
      for(const e of ext){ if(/(^|:)hr$/i.test(e.tagName)){ const n=parseFloat(e.textContent); if(n>0){ hr=n; hrs.push(n); break; } } }
      if(t) tps.push({t, cumM:dist, hr});
    });
    let sec=0;
    if(tps.length>=2){ sec=Math.round((tps[tps.length-1].t-tps[0].t)/1000); }
    else { const tg=g("time"); if(tg.length>=2){ const ts=tg.map(t=>new Date(t.textContent)).sort((a,b)=>a-b); sec=Math.round((ts[ts.length-1]-ts[0])/1000); } }
    if(!dist||!sec) return null;
    const typ=(g("type")[0]||{}).textContent||"";
    const details = tps.length>=4 ? computeDetails(tps) : null;
    return {dist:+(dist/1000).toFixed(2), sec, hr:hrs.length?Math.round(hrs.reduce((a,b)=>a+b,0)/hrs.length):null,
      date:tps.length?tps[0].t:null, kind:/bik|cycl|ride|^1$|^17$/i.test(typ)?"ride":"run", details};
  }
  return null;
}
// Strava bulk activities.csv → array of {dist,sec,hr,date,kind}
function parseStravaCSV(text){
  const lines=text.split(/\r?\n/).filter(x=>x.trim());
  if(lines.length<2) return [];
  const split=l=>{ const o=[]; let c="",q=false; for(const ch of l){ if(ch==='"')q=!q; else if(ch===","&&!q){o.push(c);c="";} else c+=ch; } o.push(c); return o.map(s=>s.trim().replace(/^"|"$/g,"")); };
  const H=split(lines[0]).map(h=>h.toLowerCase());
  const ci=(...k)=>H.findIndex(h=>k.some(x=>h.includes(x)));
  const iDate=ci("activity date","date"), iType=ci("activity type","type"),
        iDist=ci("distance"), iEl=ci("elapsed time"), iMov=ci("moving time"), iHr=ci("average heart");
  const out=[];
  for(let i=1;i<lines.length;i++){
    const r=split(lines[i]); if(r.length<3) continue;
    const type=(r[iType]||"").toLowerCase();
    const kind=/ride|bike|cycl/.test(type)?"ride":(/run|lauf/.test(type)?"run":null);
    if(!kind) continue;
    let d=new Date(r[iDate]); if(isNaN(d)) continue;
    let dist=parseFloat((r[iDist]||"").replace(",", ".")); if(!dist) continue;
    if(dist>400) dist=dist/1000; // meters → km
    const toSec=v=>{ if(!v) return 0; if(/:/.test(v)){ const p=v.split(":").map(Number); return p.length===3?p[0]*3600+p[1]*60+p[2]:p[0]*60+p[1]; } return Math.round(parseFloat(v)); };
    const sec=toSec(r[iMov])||toSec(r[iEl]); if(!sec) continue;
    const hr=iHr>=0?Math.round(parseFloat((r[iHr]||"").replace(",","."))||0)||null:null;
    out.push({dist:+dist.toFixed(2), sec, hr, date:d, kind});
  }
  return out;
}
function matchRunSlot(date){
  const k=dkey(date);
  for(let w=1;w<=21;w++) for(const R of RUNS){
    if(runIsRest(w,R.slot)) continue;
    if(dkey(dateOf(w,effDay(w,R.slot)))===k) return {w,slot:R.slot};
  }
  return null;
}

    if(pn){
      const pct=Math.round(dn/pn*100);
      const col=pct>=90?"var(--good)":pct>=70?"var(--warn)":"var(--bad)";
      items.push({ key:"compliance", icon:"check-circle", main:`Vorwoche ${dn}/${pn} Läufe (${pct}%)`, color:col, data:{pn,dn,pct} });
    }
  }

  const zr=recentZoneRatio();
  if(zr && zr.total>1200){
    if(zr.grayPct>12) items.push({ key:"zones", icon:"alert-triangle", main:`Z3-Grauzone ${zr.grayPct.toFixed(0)}% (Ziel <10%)`,
      sub:"Easy-Läufe noch lockerer, Quality bewusster hart", color:"var(--warn)", data:zr });
    else items.push({ key:"zones", icon:"chart", main:`Easy ${zr.easyPct.toFixed(0)}% · Hart ${zr.hardPct.toFixed(0)}%`,
      sub:"polarisiert sauber", color:"var(--good)", data:zr });
  }

  const lr=lastLongRunDrift();
  if(lr?.drift!=null){
    const dv=lr.drift;
    if(dv>6) items.push({ key:"drift", icon:"heart", main:`Letzter LR Drift +${dv.toFixed(1)}%`,
      sub:"aerob noch nicht stabil — heute lockerer starten", color:"var(--warn)", data:lr });
    else items.push({ key:"drift", icon:"heart", main:`Letzter LR Drift ${dv>=0?"+":""}${dv.toFixed(1)}%`,
      sub:"aerobe Stabilität gut", color:"var(--good)", data:lr });
  }

  const SLOTS={1:"di",3:"do",4:"fr",6:"so"};
  const slot=SLOTS[d];
  if(slot && !runIsRest(w,slot)){
    const c=runContent(w,slot);
    const kind=RUNS.find(r=>r.slot===slot).kind;
    items.push({ key:"today", icon:"target", main:`Heute: ${c.title}`, sub:c.det, data:{c,kind,w,slot} });
    const tipp=todayCoachTip(kind, c.det, form.tsb, lr?.drift);
    if(tipp) items.push({ key:"tip", icon:"bulb", main:"Coach-Tipp", sub:tipp, data:{kind, tsb:form.tsb, drift:lr?.drift} });
  } else if(slot===undefined || runIsRest(w,slot)){
    items.push({ key:"rest", icon:"moon", main:"Heute kein fixer Lauf", sub:"freie Einheiten nach Lust — Recovery zählt mit." });
  }
  // Recovery-Signal (Garmin) — nur wenn auffällig
  const rec=latestWellness();
  if(rec){
    const hv=hrvTrend();
    if(hv && hv.diff < -5) items.push({ key:"recovery", icon:"heart", main:`HRV niedrig (${rec.hrvLastNight} ms)`, sub:`${Math.round(hv.diff)} unter 7-Tage-Ø — harte Einheit ggf. verschieben`, color:"var(--warn)" });
    else if(rec.sleepSeconds && rec.sleepSeconds<6.5*3600) items.push({ key:"recovery", icon:"moon", main:`Wenig Schlaf (${fmtH(rec.sleepSeconds)})`, sub:"Regeneration heute priorisieren", color:"var(--warn)" });
    else if(rec.sleepScore && rec.sleepScore>=85) items.push({ key:"recovery", icon:"heart", main:`Gut erholt (Schlaf-Score ${rec.sleepScore})`, sub:"grünes Licht für Qualität", color:"var(--good)" });
  }
  return items;
}
function todayCoachTip(kind, det, tsb, lastDrift){
  if(kind==="long"){
    let s = /MP\b/.test(det)
      ? "MP-Block in der zweiten Hälfte — vorher strikt Z2. Erste 30 min HF unter 150."
      : "Z2-Wohlfühltempo: HF 140–150, lieber 10s/km lockerer als hektisch.";
    if(lastDrift!=null && lastDrift>6) s += " Letzten LR drift, also bewusst konservativ starten.";
    if(tsb<-15) s += " Form müde — bei Bein-Schwere Distanz kürzen statt durchbeißen.";
    return s;
  }
  if(kind==="quality"){
    if(tsb<-15) return "Form müde — eher Intervall-Anzahl reduzieren als Tempo opfern. Wenn Bein schwer: 1 Tag schieben.";
    return "3 km Ein-, 2 km Auslaufen Z1 ernst nehmen. Quality-Block sauber durchziehen, letzte Intervalle nicht abfallen lassen.";
  }
  if(kind==="recovery") return "Recovery heißt Recovery: HF strikt unter 140. Kurz, langsam, freundlich. Im Zweifel lieber zu langsam.";
  if(kind==="easy") return "GA1 = 5:55–6:05/km bei HF unter 150. Wenn HF zieht: Pace drosseln, nicht durchhalten.";
  return null;
}

// Einfache, verständliche Tages-Übersicht statt technischer Briefing-Liste.
// Ein Klartext-Satz + 2–3 farbcodierte Status-Kacheln (Klick → Detail-Sheet).
function statusTile(label,value,color,onclick){
  return `<div class="stile" style="--c:${color}" onclick="${onclick}">
    <div class="sl">${label}</div><div class="sv" style="color:${color}">${value}</div><div class="sbar"></div></div>`;
}
function kindWordLong(k){ return ({long:"ein ruhiger langer Lauf",quality:"eine harte Tempo-Einheit",easy:"ein lockerer Dauerlauf",recovery:"ein kurzer Regenerationslauf"})[k]||"ein Lauf"; }
function kindWordShort(k){ return ({long:"Long Run",quality:"Tempo",easy:"GA1 locker",recovery:"Recovery"})[k]||"Lauf"; }
function homeSummary(hasRun,c,kind,form,score){
  const lead = hasRun ? `Heute: <b>${kindWordLong(kind)}</b> · ${c.det}.` : "Heute kein fixer Lauf — freie Einheit nach Lust.";
  const tsb=form.tsb;
  const formS = tsb>=5?"frisch":tsb>=-10?"normal":tsb>=-25?"müde":"überlastet";
  const formTired = formS==="müde"||formS==="überlastet";
  let read;
  if(score==null){
    // Nur Trainingsform (kein Garmin-Recovery)
    read = formS==="frisch" ? "Du bist ausgeruht — guter Tag, um Qualität zu setzen."
      : formS==="normal" ? "Trainingsstand normal — Einheit wie geplant."
      : formS==="müde" ? "Trainingsstand müde — heute bewusst dosieren statt reinhängen."
      : "Stark belastet — ein lockerer Tag oder eine Pause bringt jetzt mehr.";
  } else {
    const recGood=score>=67, recLow=score<34;
    if(recGood && formTired)
      read = "Interessanter Mix: dein Körper ist erholt (Schlaf & HRV gut), aber dein Trainingsstand ist müde von der Last der letzten Tage. Locker bis moderat läuft super — die ganz harten Reize aber noch aufsparen.";
    else if(recGood && formS==="frisch")
      read = "Alles grün — Körper erholt und Trainingsstand frisch. Idealer Tag für eine harte Einheit oder einen Test.";
    else if(recGood)
      read = "Gut erholt und solider Trainingsstand — grünes Licht für die geplante Einheit.";
    else if(recLow && formS==="frisch")
      read = "Dein Trainingsstand ist frisch, aber heute meldet der Körper Erholungsbedarf (Schlaf/HRV niedrig). Lieber locker halten, als die Frische zu verbrennen.";
    else if(recLow)
      read = "Körper beansprucht und Trainingsstand müde — heute klar auf Erholung setzen, Hartes ggf. schieben.";
    else // Recovery mittel
      read = formTired ? "Halb erholt und trainingsmüde — heute nach Gefühl, im Zweifel die ruhigere Variante."
                       : "Solide erholt — Einheit wie geplant, Intensität nach Gefühl.";
  }
  return `${lead} ${read}`;
}

function openRecoveryDetail(){

  const sleepScore=d.sleepScore!=null?d.sleepScore:null;
  const lab = score>=67?"Gut erholt" : score>=34?"Solide erholt" : "Beansprucht";
  const sub = score>=67?"grünes Licht für Qualität" : score>=34?"Einheit nach Gefühl" : "heute eher locker";
  const adv = score>=67?"Körper erholt, HRV im grünen Bereich — idealer Tag für die geplante Tempo-Einheit. Wenn die Pace leicht fällt, ruhig die Schwelle suchen."
            : score>=34?"Solide erholt — Einheit nach Gefühl steuern, Intensität dosieren."
            : "Beansprucht — heute klar auf Erholung setzen, harte Reize ggf. verschieben.";

  const battery = d.bodyBatteryLast!=null?d.bodyBatteryLast:0;
  const hrvDiff = hv?Math.round(hv.diff):null;

  const rtile=(v,l,acc)=>`<div style="flex:1;text-align:center;background:#f0e9da;border-radius:12px;padding:12px 6px;"><div style="font-size:16px;font-weight:700;color:${acc?"#e05a1f":"#16294d"};">${v}</div><div style="font-family:var(--mono);font-size:8px;color:#93917e;margin-top:3px;">${l}</div></div>`;
  sheet(`
    <div style="font-family:var(--mono);font-size:10px;letter-spacing:1.5px;color:#e05a1f;text-transform:uppercase;">Recovery · Garmin · Stand ${d.date}</div>
    <div style="display:flex;align-items:flex-end;gap:12px;margin-top:10px;margin-bottom:18px;">

    </div>
    <div style="display:flex;flex-direction:column;gap:11px;margin-bottom:18px;">
      ${bar("SCHLAF-SCORE", sleepScore!=null?sleepScore+" / 100":fmtH(d.sleepSeconds), sleepPct, true)}
      ${bar("HRV vs. 7-TAGE-Ø", hrvDiff!=null?(hrvDiff>=0?"+":"")+hrvDiff+" ms":(d.hrvLastNight?d.hrvLastNight+" ms":"—"), hrvPct, true)}
      ${bar("BODY BATTERY", battery+" / 100", battery, false)}
    </div>
    <div style="background:#f0e9da;border-radius:14px;padding:14px 16px;font-size:13px;color:#69675c;line-height:1.5;margin-bottom:18px;">${adv}</div>
    <div style="display:flex;gap:8px;margin-bottom:22px;">
      ${rtile(fmtH(d.sleepSeconds),"SCHLAF",false)}
      ${rtile(d.hrvLastNight||"–","HRV ms",true)}
      ${rtile(d.restingHr||"–","RHR bpm",false)}
      ${rtile(d.bodyBatteryLast!=null?d.bodyBatteryLast:"–","BATTERY",false)}
    </div>
    <div onclick="closeModal()" style="cursor:pointer;text-align:center;background:#f0e9da;border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:15px;font-size:15px;font-weight:700;color:#16294d;">Schließen</div>`);
}

// Kompakter Trainingszustand als Text für den Coach
function buildCoachContext(){
  const loc=locate(today()); const L=[];
  if(loc.week){
    const W=WEEKS[loc.week-1];
    L.push(`Datum: ${fmtD(today())} (${DOWL[loc.dayIdx]}), Woche ${loc.week}/21 — Phase ${W.ph}.`);
    L.push(`Diese Woche: Di ${W.di} | Do ${W.do} | Fr ${W.fr} | So ${W.so}. Soll-Umfang ${W.km} km, Long Run ${W.lr} km.`);
    let pn=0,dn=0; RUNS.forEach(R=>{ if(runIsRest(loc.week,R.slot))return; const dt=dateOf(loc.week,effDay(loc.week,R.slot)); if(dt>today())return; pn++; if(DB.logs[runId(loc.week,R.slot)])dn++; });
    if(pn) L.push(`Diese Woche bisher ${dn}/${pn} fällige Läufe erledigt.`);
  } else if(loc.pre){ L.push(`Trainingsstart ist erst am 11.05.2026.`); }
  else if(loc.post){ L.push(`Der Marathon (${raceDateStr()}) ist bereits vorbei.`); }
  const f=currentForm();
  L.push(`Form/TSB: ${f.tsb>=0?"+":""}${Math.round(f.tsb)} (${formLabel(f.tsb).label}) — Fitness CTL ${Math.round(f.ctl)}, Müdigkeit ATL ${Math.round(f.atl)}.`);
  const zr=recentZoneRatio();
  if(zr&&zr.total>600) L.push(`Zonen-Verteilung (14 Tage): Easy ${zr.easyPct.toFixed(0)}%, Grauzone Z3 ${zr.grayPct.toFixed(0)}%, Hart ${zr.hardPct.toFixed(0)}%.`);
  const lr=lastLongRunDrift();
  if(lr&&lr.drift!=null) L.push(`Letzter ausgewerteter Long Run: ${lr.dist} km, Cardiac Drift ${lr.drift>=0?"+":""}${lr.drift.toFixed(1)}%.`);
  const runs=runLogs().slice(-6);
  if(runs.length){
    L.push(`Letzte ${runs.length} Läufe:`);
    runs.forEach(r=>L.push(`  • ${fmtD(r.date)} ${r.kind}: ${r.dist} km · ${hms(r.sec)} · ${pace(r.pace)}/km${r.hr?" · "+r.hr+" bpm":""}${r.rpe?" · RPE "+r.rpe:""}${r.pain?" · ⚠ Schmerz":""}`));
  } else L.push("Noch keine Läufe erfasst.");
  const lo=runLogs().filter(r=>r.kind==="long"); const maxLR=Math.max(0,...lo.map(r=>r.dist));
  if(maxLR) L.push(`Längster Long Run bisher: ${maxLR} / 32 km.`);
  const ws=[...(DB.weights||[])].sort((a,b)=>new Date(a.d)-new Date(b.d));
  if(ws.length) L.push(`Aktuelles Gewicht: ${ws[ws.length-1].kg} kg (Ziel 81 kg).`);
  const rec=latestWellness();
  if(rec){
    const hv=hrvTrend();
    L.push(`Recovery (Garmin, ${rec.date}): Schlaf ${fmtH(rec.sleepSeconds)}${rec.sleepScore?" (Score "+rec.sleepScore+")":""}, HRV ${rec.hrvLastNight||"?"} ms${hv?" ("+(hv.diff>=0?"+":"")+Math.round(hv.diff)+" vs 7-Tage-Ø)":""}, Ruhepuls ${rec.restingHr||"?"} bpm${rec.bodyBatteryLast!=null?", Body Battery "+rec.bodyBatteryLast:""}.`);
  }
  const cs=calorieStats();
  if(cs) L.push(`Kalorienverbrauch (Garmin): Ø ${cs.avg} kcal/Tag (TDEE)${cs.avgBmr?", Grundumsatz Ø "+cs.avgBmr:""}${cs.avgSteps?", Ø "+cs.avgSteps+" Schritte":""}.`);
  const wo=[...(DB.workouts||[])].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);
  if(wo.length){ L.push(`Letzte Workouts (Padel etc.): `+wo.map(x=>`${x.date} ${x.label||x.type} ${hms(x.sec)}${x.hr?"/"+x.hr+"bpm":""}`).join("; ")+"."); }
  const gs=[...gymSessions()].sort((a,b)=>String(b.date).localeCompare(String(a.date))).slice(0,4);
  if(gs.length){
    L.push(`Letzte Krafteinheiten:`);
    gs.forEach(s=>{
      const top=s.ex.map(e=>{ const best=e.sets.reduce((m,x)=>(+x.kg||0)>(m?+m.kg||0:0)?x:m,null); return best&&best.kg?`${e.name} ${best.kg}kg×${best.reps||"?"}`:null; }).filter(Boolean).slice(0,4).join(", ");
      const vol=s.ex.reduce((v,e)=>v+e.sets.reduce((vv,x)=>vv+((+x.kg||0)*(+x.reps||0)),0),0);
      L.push(`  • ${s.date} ${s.label.split("·")[0].trim()}: ${top||"—"}${vol?` (Vol. ${Math.round(vol)} kg)`:""}${s.hr?" · "+s.hr+" bpm":""}`);
    });
  }
  // Marathon-Prognose (stabiler Schätzwert aus besten Efforts der letzten 6 Wochen)
  const pred=marathonEstimate(predictionSeries(runLogs()));
  if(pred){ L.push(`Aktuelle Marathon-Hochrechnung: ${hms(Math.round(pred))} (Ziel Sub-4:00) — aus Quality-/Long-Run-Efforts, lockere Läufe fließen nicht ein.`); }
  return L.join("\n");
}

function buildPlanEditContext(){
  const L=[];
  L.push("ROLLE: Du bist der Trainingsplan-Editor der Lauf-App SUB4 (Marathon Köln, Ziel Sub 4:00). Der Nutzer beschreibt auf Deutsch, was er am Plan ändern möchte. Antworte kurz, freundlich und konkret auf Deutsch.");
  L.push("AUSGABE: Wenn — und nur wenn — eine konkrete Änderung gewünscht ist, hänge ans ENDE deiner Antwort GENAU EINEN Code-Block an:");
  L.push("```json\n{\"changes\":[{\"week\":9,\"slot\":\"di\",\"title\":\"Lauf · Qualität\",\"det\":\"10 km: 3 km Z1 + 5×1000m Z5 (4:40) Tr 90s + 2 km Z1\",\"day\":1}]}\n```");
  L.push("FELDER (changes): week=1–21, slot=di(Qualität)|do(GA1)|fr(Recovery)|so(Long Run), det=Beschreibung der Einheit (km + Inhalt + Zielpace in /km), title optional, day optional (0=Mo … 6=So, nur zum Verschieben). Für einen Ruhetag det=\"–\".");
  L.push("ECKDATEN ändern: Für Renndatum, Renn-Ort oder Zielzeit gib im selben json zusätzlich ein \"config\"-Objekt an, z. B. {\"config\":{\"raceDate\":\"2026-11-15\",\"raceCity\":\"Berlin\",\"goalTime\":\"3:45:00\"}}. raceDate=YYYY-MM-DD, goalTime=H:MM:SS, raceCity=Stadt.");
  L.push("RENNDATUM-LOGIK: Der Trainingsstart ist fix — die Wochen-Nummerierung und alle bereits eingetragenen/absolvierten Läufe bleiben immer exakt ausgerichtet, ein Renndatum-Wechsel ändert nur den Countdown (und schiebt die Wochen NICHT). Einzelne Einheiten passt du über \"changes\" an.");
  L.push("REGELN: Ändere ausschließlich das ausdrücklich Gewünschte. Bei Unklarheit frage nach (dann KEIN json-Block). Nenne im Text kurz, was du änderst.");
  const _ps=planStart(); const psISO=`${_ps.getFullYear()}-${String(_ps.getMonth()+1).padStart(2,"0")}-${String(_ps.getDate()).padStart(2,"0")}`;
  L.push(`\nAKTUELLE ECKDATEN: ${raceLabel()} am ${raceDateStr()} · Zielzeit ${goalStr()} · Trainingsstart ${psISO} (aktuelle Woche ${locate(today()).week||"–"}).`);
  L.push("\nAKTUELLER PLAN (W = Woche · Phase · Di | Do | Fr | So · Umfang/LongRun):");
  for(let w=1; w<=21; w++){ const W=WEEKS[w-1]; const g=s=>runContent(w,s).det;
    L.push(`W${w} ${W.ph}: Di=${g("di")} | Do=${g("do")} | Fr=${g("fr")} | So=${g("so")} · ${W.km}km LR${W.lr}`); }
  const loc=locate(today()); if(loc.week) L.push(`\nAktuelle Woche: ${loc.week}.`);
  const done=Object.keys(DB.logs||{}).filter(id=>DB.logs[id]&&DB.logs[id].dist);
  if(done.length) L.push(`Bereits absolvierte Läufe (Ergebnisse bleiben erhalten): ${done.join(", ")}.`);
  return L.join("\n");
}
function applyPlanChangesFromText(text){
  const applied=[];
  let obj=null;
  let m=text.match(/```json\s*([\s\S]*?)```/i) || text.match(/```\s*([\s\S]*?)```/);
  if(m){ try{ obj=JSON.parse(m[1].trim()); }catch(e){} }
  if(!obj){ const m2=text.match(/\{[\s\S]*?"(changes|config)"[\s\S]*\}/); if(m2){ try{ obj=JSON.parse(m2[0]); }catch(e){} } }
  if(!obj) return applied;
  if(Array.isArray(obj.changes)) obj.changes.forEach(ch=>{
    const w=+ch.week, slot=String(ch.slot||"").toLowerCase();
    if(!(w>=1&&w<=21) || !["di","do","fr","so"].includes(slot)) return;
    const id=runId(w,slot), cur=runContent(w,slot);
    const title=(ch.title!=null&&String(ch.title).trim())?String(ch.title).trim():cur.title;
    const det=(ch.det!=null&&String(ch.det).trim())?String(ch.det).trim():cur.det;
    DB.planEdits[id]={title,det};                 // ändert NUR die Vorgabe — DB.logs bleibt unberührt
    if(ch.day!=null && ch.day>=0 && ch.day<=6) DB.moves[id]=+ch.day;
    applied.push(`W${w} ${slot.toUpperCase()}: ${det}`);
  });
  // Eckdaten (Renndatum/Ort/Zielzeit) — verschiebt nur Kalender, Logs hängen an Woche+Slot
  if(obj.config && typeof obj.config==="object"){
    if(!DB.cfg) DB.cfg={};
    const cf=obj.config;
    if(cf.raceCity){ DB.cfg.raceCity=String(cf.raceCity).trim(); applied.push("Ort: "+DB.cfg.raceCity); }
    const gt = cf.goalTime!=null?parseTimeStr(cf.goalTime):(cf.goalSec!=null?+cf.goalSec:0);
    if(gt>0){ DB.cfg.goalSec=gt; applied.push("Zielzeit: "+hms(gt)); }
    if(cf.raceDate){ const rd=parseLocalDate(cf.raceDate);
      if(!isNaN(+rd)){ DB.cfg.raceDate=cf.raceDate; applied.push("Renndatum: "+raceDateStr()); }
      // Trainingsstart bleibt fix → Wochen-Nummerierung & absolvierte Läufe bleiben ausgerichtet
    }
  }
  if(applied.length){ save(); viewWoche._scrolled=false; }
  return applied;
}
async function planEditSend(){
  if(window._coachThinking) return;
  const el=document.getElementById("cvInput");
  const text=(el?el.value:"").trim(); if(!text) return;
  const url=coachWorkerUrl(); if(!url){ openCoachSetup(); return; }
  if(!DB.planChat) DB.planChat=[];
  const msgs=document.getElementById("cvMsgs");
  if(msgs && !DB.planChat.length) msgs.innerHTML="";
  const um={role:"user",text,time:nowHM()}; DB.planChat.push(um); save(); coachAppend(bubbleHtml(um));
  if(el){ el.value=""; el.style.height="auto"; }
  window._coachThinking=true; const sendBtn=document.getElementById("cvSend"); if(sendBtn) sendBtn.disabled=true;
  coachAppend(`<div class="typing" id="cvTyping"><i></i><i></i><i></i></div>`);
  try{
    const apiMessages=DB.planChat.map(m=>({role:m.role==="user"?"user":"assistant",content:m.text}));
    const r=await fetch(url+"/coach",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ messages:apiMessages, context:buildPlanEditContext() })});
    const data=await r.json().catch(()=>({}));
    const t=document.getElementById("cvTyping"); if(t&&t.parentNode) t.parentNode.remove();
    let am;
    if(!r.ok||data.error){ am={role:"assistant",text:(data.error||("Fehler "+r.status))+(data.detail?"\n"+data.detail:""),err:true,time:nowHM()}; }
    else{
      const raw=data.text||"(keine Antwort)";
      const applied=applyPlanChangesFromText(raw);
      if(applied.length) render();   // Eckdaten/Plan im Hintergrund aktualisieren
      let shown=raw.replace(/```[\s\S]*?```/g,"").trim();
      if(applied.length) shown=(shown?shown+"\n\n":"")+"✓ Übernommen:\n• "+applied.join("\n• ");
      else if(!shown) shown="(keine Antwort)";
      am={role:"assistant",text:shown,time:nowHM()};
    }
    DB.planChat.push(am); save(); coachAppend(bubbleHtml(am));
  }catch(e){
    const t=document.getElementById("cvTyping"); if(t&&t.parentNode) t.parentNode.remove();
    const am={role:"assistant",text:"Verbindungsfehler: "+e.message,err:true,time:nowHM()};
    DB.planChat.push(am); save(); coachAppend(bubbleHtml(am));
  }finally{
    window._coachThinking=false; const sb=document.getElementById("cvSend"); if(sb) sb.disabled=false;
  }
}

function findMissed(){

function findMoveTarget(m){
  // moves verschieben innerhalb der eigenen Woche — nur anbieten, wenn die Einheit aus der aktuellen Woche stammt
  const loc=locate(today()); if(!loc.week||m.w!==loc.week)return null;
  const hardAt=(w,d)=>RUNS.some(r=>{const rid=runId(w,r.slot);return effDay(w,r.slot)===d&&!runIsRest(w,r.slot)&&(r.kind==="quality"||r.kind==="long")&&!DB.skips[rid]&&rid!==m.id;});
  for(let d=loc.dayIdx; d<7; d++){
    const w=loc.week;
    const occ=RUNS.find(r=>effDay(w,r.slot)===d&&!runIsRest(w,r.slot)&&!DB.skips[runId(w,r.slot)]);
    if(occ){ const oid=runId(w,occ.slot); if(DB.logs[oid])continue; if(occ.kind!=="easy"&&occ.kind!=="recovery")continue; }
    if(m.kind==="quality"||m.kind==="long"){ if(d>0&&hardAt(loc.week,d-1))continue; if(d<6&&hardAt(loc.week,d+1))continue; }
    return {day:d,occ:occ||null,w:loc.week};
  }

}

  // ----- Heute-Karte: Navy (TEMPO) -----

        <div style="font-size:13px;color:#a8b3c7;margin-top:5px;">${c.det}</div>
        <div onclick="openLog(${loc.week},'${todayRun.slot}')" style="display:inline-block;cursor:pointer;margin-top:16px;font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#faf5ee;background:#e05a1f;padding:12px 38px;border-radius:10px;">Start</div>

  const tile=(v,l,acc,click)=>`<div ${click?`onclick="${click}" `:""}style="flex:1;background:#ffffff;border:1px solid #e8e1d2;border-radius:16px;padding:13px 12px;${click?"cursor:pointer;":""}"><div style="font-size:21px;font-weight:700;color:${acc?"#e05a1f":"#16294d"};letter-spacing:-.5px;">${v}</div><div style="font-family:var(--mono);font-size:8px;letter-spacing:1px;color:#93917e;margin-top:2px;">${l}</div></div>`;
  const tilesRow=`<div style="display:flex;gap:9px;">

    ${tile(rec!=null?rec:"–","RECOVERY",rec!=null,"openRecoveryDetail()")}
  </div>`;

  // ----- Coach (Daily Read + Einstieg in den Chat) -----
  const c2=todayRun?runContent(loc.week,todayRun.slot):null;
  const read=homeSummary(!!todayRun, c2, todayRun?todayRun.kind:null, currentForm(), rec);
  const coach=`<div onclick="openCoachChat()" style="background:#ffffff;border:1px solid rgba(224,90,31,.25);border-radius:20px;padding:16px 18px;cursor:pointer;">
