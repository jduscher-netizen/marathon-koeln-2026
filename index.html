<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#faf6f1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Marathon Köln 2026</title>
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#faf6f1;        /* warmes Cream */
    --card:#ffffff;
    --card2:#f5efe5;
    --line:#ebe3d4;
    --txt:#1a1a1f;
    --mut:#7a766f;
    --accent:#e25d4d;    /* lebendiges Coral */
    --accent-d:#c63d2e;
    --accent2:#7a1620;
    --orange:#f59e3c;
    --gold:#fbbf24;
    --good:#10b981;
    --warn:#f59e0b;
    --bad:#dc2626;
    --blue:#3b82f6;
    --r:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--txt);font-family:'Outfit',-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif;font-size:16px;line-height:1.45;-webkit-font-smoothing:antialiased}
  body{padding-bottom:calc(70px + env(safe-area-inset-bottom))}
  .wrap{max-width:560px;margin:0 auto;padding:calc(18px + env(safe-area-inset-top)) 16px 8px}
  h1{font-size:1.5rem;font-weight:800;letter-spacing:-.5px;color:var(--txt)}
  h1 .sub{font-size:.78rem;font-weight:500;display:block;margin-top:2px;color:var(--mut)}
  h2{font-size:1.05rem;font-weight:800;margin:0 0 10px;letter-spacing:-.2px;color:var(--txt)}
  .sub{color:var(--mut);font-size:.82rem}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 14px rgba(120,80,60,.07)}
  .hero{background:linear-gradient(135deg,#ff6f5b 0%,#ff8e4a 50%,#ffb84a 100%);border:none;color:#fff;position:relative;overflow:hidden;padding:22px 20px}
  .hero::before{content:"";position:absolute;top:-80px;right:-50px;width:240px;height:240px;background:radial-gradient(circle,rgba(255,255,255,.28),transparent 65%);pointer-events:none}
  .hero::after{content:"";position:absolute;bottom:-110px;left:-40px;width:240px;height:240px;background:radial-gradient(circle,rgba(255,80,40,.4),transparent 70%);pointer-events:none}
  .hero > *{position:relative;z-index:1}
  .hero .ph{color:rgba(255,255,255,.75)}
  .hero .sub{color:rgba(255,255,255,.85)}
  .hero .big{font-size:2.3rem;letter-spacing:-.5px;color:#fff}
  .hero .cd div{background:rgba(255,255,255,.22);backdrop-filter:blur(6px)}
  .hero .cd b{color:#fff}
  .hero .cd span{color:rgba(255,255,255,.85)}
  .hero .pill.run{background:rgba(255,255,255,.28);color:#fff;border-color:rgba(255,255,255,.4)}
  .runcard{background:#fff;border:1px solid var(--line)}
  .runcard.logged{border-color:rgba(16,185,129,.3);background:linear-gradient(135deg,#fff 0%,rgba(16,185,129,.05) 100%)}
  .ring-wrap{position:relative;width:64px;height:64px;flex:0 0 auto}
  .ring-wrap svg{transform:rotate(-90deg)}
  .ring-wrap .rv{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem;color:var(--txt)}
  .row{display:flex;align-items:center;gap:12px}
  .between{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:.7rem;font-weight:700;background:var(--card2);color:var(--mut);border:1px solid var(--line);letter-spacing:.2px}
  .pill.run{background:rgba(226,93,77,.12);color:#c63d2e;border-color:rgba(226,93,77,.25)}
  .pill.str{background:rgba(59,130,246,.12);color:#1d4ed8;border-color:rgba(59,130,246,.25)}
  .pill.pad{background:rgba(16,185,129,.12);color:#047857;border-color:rgba(16,185,129,.25)}
  .pill.bike{background:rgba(245,158,60,.14);color:#b45309;border-color:rgba(245,158,60,.3)}
  .pill.done{background:rgba(16,185,129,.15);color:#047857;border-color:rgba(16,185,129,.3)}
  .pill.skip{background:rgba(220,38,38,.1);color:#b91c1c;border-color:rgba(220,38,38,.25)}
  .pill.opt{background:var(--card2);color:var(--mut)}
  .hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
  .hd .ph{font-size:.7rem;color:var(--mut);text-transform:uppercase;letter-spacing:1.2px;font-weight:700}
  .big{font-size:1.75rem;font-weight:800;line-height:1.1;letter-spacing:-.4px}
  .cd{display:flex;gap:12px;text-align:center;margin-top:6px}
  .cd div{flex:1;background:var(--card2);border-radius:12px;padding:11px 4px}
  .cd b{display:block;font-size:1.55rem;font-weight:800;letter-spacing:-.4px}
  .cd span{font-size:.6rem;color:var(--mut);text-transform:uppercase;letter-spacing:.6px;font-weight:600}
  .day{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:10px;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.03)}
  .day.today{border-color:var(--accent);box-shadow:0 0 0 2px rgba(226,93,77,.18),0 1px 3px rgba(0,0,0,.04)}
  .day .dn{font-weight:700;font-size:.95rem;color:var(--txt)}
  .day .dd{color:var(--mut);font-size:.74rem}
  .day .ds{margin-top:8px;font-size:.86rem;color:#3d3a35}
  .day.dim{opacity:.6}
  .acts{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  button,.btn{font:inherit;font-family:inherit;cursor:pointer;border:none;border-radius:12px;padding:10px 16px;font-size:.85rem;font-weight:700;background:var(--card);color:var(--txt);border:1px solid var(--line)}
  button:active{transform:scale(.97)}
  .btn-p{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 8px rgba(226,93,77,.3)}
  .btn-p:hover{background:var(--accent-d);border-color:var(--accent-d)}
  .btn-sm{padding:7px 12px;font-size:.78rem}
  .btn-gh{background:transparent;border-color:transparent;color:var(--mut)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .stat{background:var(--card2);border-radius:14px;padding:14px}
  .stat .v{font-size:1.5rem;font-weight:800;letter-spacing:-.4px;color:var(--txt)}
  .stat .l{font-size:.68rem;color:var(--mut);text-transform:uppercase;letter-spacing:.6px;margin-top:2px;font-weight:700}
  .stat .d{font-size:.74rem;margin-top:4px;font-weight:500}
  label{display:block;font-size:.76rem;color:var(--mut);margin:14px 0 6px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
  input,select,textarea{width:100%;background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:12px;padding:12px 14px;font:inherit;font-family:inherit;font-size:.95rem}
  textarea{resize:vertical;min-height:70px}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(226,93,77,.12)}
  .seg{display:flex;gap:6px;flex-wrap:wrap}
  .seg button{flex:1;min-width:auto;background:var(--card2);border-color:transparent}
  .seg button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .ico{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex:0 0 auto}
  .nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,253,250,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--line);display:flex;padding:8px 6px calc(8px + env(safe-area-inset-bottom));z-index:50}
  .nav a{flex:1;text-align:center;color:var(--mut);font-size:.62rem;font-weight:700;text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px;letter-spacing:.2px}
  .nav a .ni{font-size:1.3rem;line-height:1}
  .nav a.on{color:var(--accent)}
  .modal{position:fixed;inset:0;background:rgba(20,15,10,.45);display:flex;align-items:flex-end;justify-content:center;z-index:100;overscroll-behavior:contain}
  .sheet{position:relative;background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;padding:20px 18px calc(28px + env(safe-area-inset-bottom));border:1px solid var(--line);touch-action:pan-y;will-change:transform;box-shadow:0 -8px 30px rgba(0,0,0,.12)}
  .sheet-close{position:absolute;top:10px;right:12px;width:36px;height:36px;border-radius:50%;background:var(--card2);color:var(--mut);border:none;font-size:1.4rem;font-weight:300;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;z-index:5;cursor:pointer}
  .sheet-close:active{background:var(--line);color:var(--txt)}
  body.locked{position:fixed;width:100%;overflow:hidden}
  .sheet h2{font-size:1.1rem}
  .grab{width:42px;height:5px;background:var(--line);border-radius:3px;margin:-6px auto 14px}
  .bar{display:flex;align-items:flex-end;gap:5px;height:130px;margin-top:8px}
  .bar .b{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:3px;min-width:0}
  .bar .b small{font-size:.58rem;color:var(--mut);white-space:nowrap;overflow:hidden;font-weight:600}
  .legend{display:flex;gap:14px;font-size:.72rem;color:var(--mut);margin-top:10px;flex-wrap:wrap;font-weight:500}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:-1px}
  .flag{display:flex;gap:10px;padding:12px 14px;border-radius:13px;margin-bottom:8px;font-size:.85rem;align-items:flex-start}
  .flag.ok{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.22);color:#065f46}
  .flag.w{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.28);color:#92400e}
  .flag.b{background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.25);color:#991b1b}
  .flag b{display:block;font-size:.88rem;margin-bottom:2px;font-weight:700}
  .flag .fi{font-size:1.1rem;flex:0 0 auto}
  .ref dt{font-weight:700;font-size:.88rem;margin-top:12px;color:var(--txt)}
  .ref dd{color:var(--mut);font-size:.82rem;margin:3px 0 0}
  table{width:100%;border-collapse:collapse;font-size:.82rem;margin-top:6px}
  th,td{text-align:left;padding:8px 6px;border-bottom:1px solid var(--line)}
  th{color:var(--mut);font-weight:700;font-size:.7rem;text-transform:uppercase;letter-spacing:.5px}
  .muted{color:var(--mut)}
  .tiny{font-size:.74rem}
  .sp{height:6px}
  .center{text-align:center}
  ::-webkit-scrollbar{width:0;height:0}
  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:var(--txt);color:#fff;padding:12px 22px;border-radius:999px;font-size:.86rem;font-weight:600;z-index:200;opacity:0;transition:.25s;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.18)}
  .toast.show{opacity:1}
  .act{display:flex;align-items:center;gap:10px;padding:13px 0;border-bottom:1px solid var(--line)}
  .act:last-child{border-bottom:none}
  .act .an{flex:1;min-width:0}
  .act .an b{font-size:.95rem;font-weight:700;color:var(--txt)}
  .act .an .as{font-size:.72rem;color:var(--mut);margin-top:2px;font-weight:500}
  .act.done{opacity:.55;transition:opacity .25s}
  .act.done .an .as{color:var(--good)}
  @media (prefers-reduced-motion: no-preference){
    ::view-transition-old(root),::view-transition-new(root){animation-duration:.2s}
  }
  .step{display:flex;align-items:center;gap:0;border:1px solid var(--line);border-radius:12px;overflow:hidden;flex:0 0 auto;background:var(--card)}
  .step button{border:none;border-radius:0;background:var(--card2);width:40px;height:40px;padding:0;font-size:1.2rem;font-weight:700;color:var(--txt)}
  .step .sv{min-width:36px;text-align:center;font-weight:800;font-size:1rem;color:var(--txt)}
  .step button.acc{background:var(--accent);color:#fff}
  .dotline{display:flex;gap:4px;margin-top:6px}
  .dotline i{width:9px;height:9px;border-radius:50%;background:var(--card2);border:1px solid var(--line)}
  .dotline i.f{background:var(--good);border-color:var(--good)}
  a.lnk{color:var(--accent);text-decoration:none;font-weight:600}
  details{background:var(--card);border:1px solid var(--line);border-radius:16px;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.03)}
  details summary{list-style:none;cursor:pointer;padding:16px 18px;font-weight:800;font-size:.95rem;display:flex;align-items:center;justify-content:space-between;color:var(--txt)}
  details summary::-webkit-details-marker{display:none}
  details summary::after{content:"▾";color:var(--mut);transition:.2s}
  details[open] summary::after{transform:rotate(180deg)}
  details .dc{padding:0 18px 16px;font-size:.85rem;color:#3d3a35;line-height:1.55}
  details .dc p{margin:0 0 9px}
  details .dc ul{margin:4px 0 10px 18px}
  details .dc li{margin:3px 0}
  details .dc table{margin:4px 0 8px}
  details .dc h3{font-size:.84rem;margin:14px 0 5px;color:var(--txt);font-weight:700}
  .zone{display:inline-block;width:26px;text-align:center;border-radius:6px;font-weight:800;font-size:.7rem;padding:3px 0;color:#fff}
  #syncBadge{position:fixed;bottom:calc(86px + env(safe-area-inset-bottom));right:14px;width:40px;height:40px;border-radius:50%;background:var(--card);border:1px solid var(--line);display:none;align-items:center;justify-content:center;font-size:.95rem;font-weight:700;cursor:pointer;z-index:30;transition:.2s;box-shadow:0 4px 14px rgba(0,0,0,.15)}
  #syncBadge.show{display:flex}
  @keyframes spin{to{transform:rotate(360deg)}}
  #syncBadge.spin span{display:inline-block;animation:spin 1s linear infinite}
</style>
</head>
<body>
<div id="app"></div>
<div class="nav" id="nav"></div>
<div id="modalRoot"></div>
<div id="syncBadge" onclick="go('mehr')"><span>○</span></div>
<div class="toast" id="toast"></div>

<script>
"use strict";

/* ============ PLAN DATA ============ */
const PLAN_START = new Date(2026,4,11); // Mo 11.05.2026 (W1 day0)
const RACE_DATE  = new Date(2026,9,4);  // 04.10.2026
const GOAL_SEC   = 4*3600;
const MP_SEC     = 5*60+40;

// v2 — 4 Läufe/Woche, polarisiert, kalibrierte HF-Zonen (Plan-Stand 13.05.2026)
const WEEKS = [
 {w:1, dr:"11.05.–17.05.", ph:"Regeneration", km:18, lr:8, di:"Ruhe oder 5 km Z1 (6:45)", do:"5 km Z1 (6:30)", fr:"–", so:"8 km Z2 (6:10)"},
 {w:2, dr:"18.05.–24.05.", ph:"Base I", km:36, lr:17, di:"6×400m Z5 (4:35) Tp 90s + Ein/Aus", do:"8 km Z2 (6:05)", fr:"5 km Z1 (6:40)", so:"17 km Z2 (6:00)"},

 {w:4, dr:"01.06.–07.06.", ph:"Base I", km:48, lr:22, di:"3×2000m Z4 (5:05) Tp 3min + Ein/Aus", do:"10 km Z2 (5:55)", fr:"6 km Z1 (6:40)", so:"22 km Z2 (5:55)"},
 {w:5, dr:"08.06.–14.06.", ph:"Base I · Entlastung", km:34, lr:14, di:"5×600m Z5 (4:40) Tp 90s + Ein/Aus", do:"7 km Z2 (6:05)", fr:"5 km Z1 (6:40)", so:"14 km Z2 (6:00)"},
 {w:6, dr:"15.06.–21.06.", ph:"Base II", km:50, lr:23, di:"5 km Tempo-DL Z4 (5:15) + Ein/Aus", do:"10 km Z2 (5:55)", fr:"6 km Z1 (6:35)", so:"23 km Z2 (5:55)"},
 {w:7, dr:"22.06.–28.06.", ph:"Base II", km:54, lr:25, di:"7 km Tempo-DL Z4 (5:15) + Ein/Aus", do:"11 km Z2 (5:55)", fr:"6 km Z1 (6:35)", so:"25 km Z2 (5:55)"},

 {w:9, dr:"06.07.–12.07.", ph:"Base II · Entlastung", km:38, lr:16, di:"4×1000m Z4 (4:55) Tp 2min + Ein/Aus", do:"8 km Z2 (6:00)", fr:"5 km Z1 (6:40)", so:"16 km Z2 (5:55)"},
 {w:10, dr:"13.07.–19.07.", ph:"Build", km:60, lr:24, di:"10 km Tempo-DL Z4 (5:15) + Ein/Aus", do:"12 km Z2 (5:55)", fr:"6 km Z1 (6:35)", so:"24 km · 8 km MP (5:40) am Ende"},
 {w:11, dr:"20.07.–26.07.", ph:"Build", km:64, lr:27, di:"4×2000m Z4 (5:00) Tp 2:30 + Ein/Aus", do:"13 km Z2 (5:55)", fr:"7 km Z1 (6:35)", so:"27 km · 10 km MP am Ende"},

 {w:13, dr:"03.08.–09.08.", ph:"Build · Entlastung", km:44, lr:18, di:"5×1000m Z4 (4:55) Tp 2min + Ein/Aus", do:"9 km Z2 (6:00)", fr:"6 km Z1 (6:40)", so:"18 km Z2 (5:55)"},
 {w:14, dr:"10.08.–16.08.", ph:"Build", km:70, lr:28, di:"3×3000m Z4 (5:05) Tp 3min + Ein/Aus", do:"14 km Z2 (5:55)", fr:"7 km Z1 (6:30)", so:"28 km · 12 km MP Mitte"},
 {w:15, dr:"17.08.–23.08.", ph:"Peak", km:72, lr:30, di:"14 km Tempo-DL Z4 (5:15) + Ein/Aus", do:"14 km Z2 (5:55)", fr:"7 km Z1 (6:30)", so:"30 km · 15 km MP am Ende"},
 {w:16, dr:"24.08.–30.08.", ph:"Peak · Königswoche", km:75, lr:32, di:"5×2000m Z4 (4:55) Tp 2min + Ein/Aus", do:"15 km Z2 (5:55)", fr:"8 km Z1 (6:30)", so:"32 km Z2 · 8 km MP Mitte"},
 {w:17, dr:"31.08.–06.09.", ph:"Peak", km:70, lr:28, di:"16 km Tempo-DL Z4 (5:15) + Ein/Aus", do:"14 km Z2 (5:55)", fr:"7 km Z1 (6:30)", so:"28 km · 18 km MP am Ende"},
 {w:18, dr:"07.09.–13.09.", ph:"Peak · Entlastung", km:48, lr:20, di:"4×1000m Z4 (4:50) Tp 2min + Ein/Aus", do:"10 km Z2 (5:55)", fr:"6 km Z1 (6:35)", so:"20 km Z2 (5:55)"},
 {w:19, dr:"14.09.–20.09.", ph:"Taper", km:50, lr:22, di:"6 km MP (5:40) + Ein/Aus", do:"12 km Z2 (5:55)", fr:"6 km Z1 (6:35)", so:"22 km · 8 km MP am Ende"},
 {w:20, dr:"21.09.–27.09.", ph:"Taper", km:38, lr:16, di:"4×1000m Z4 (4:55) Tp 2min + Ein/Aus", do:"10 km Z2 (6:00)", fr:"5 km Z1 (6:35)", so:"16 km · 4 km MP"},
 {w:21, dr:"28.09.–04.10.", ph:"Wettkampf", km:55, lr:42, di:"5 km Z2 + 4×100m Steigerungen", do:"6 km Z1 (6:30)", fr:"–", so:"🏁 04.10. MARATHON KÖLN"},
];

const DOW = ["Mo","Di","Mi","Do","Fr","Sa","So"];
const DOWL = ["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];

// Fixed runs only — 4/Woche (Di Qualität, Do GA1, Fr Recovery, So Long Run)
const RUNS = [
 {slot:"di", day:1, kind:"quality",  label:"Lauf · Qualität"},
 {slot:"do", day:3, kind:"easy",     label:"Lauf · GA1 aerob"},
 {slot:"fr", day:4, kind:"recovery", label:"Lauf · Recovery"},
 {slot:"so", day:6, kind:"long",     label:"Long Run"},
];
function runIsRest(w,slot){ return (runContent(w,slot).det||"").trim()==="–"; }
const DEFAULT_ACTS = [
 {id:"padel",   name:"Padel",        type:"counter", target:1, optional:false},
 {id:"kr_back", name:"Kraft Rücken", type:"counter", target:1, optional:false},
 {id:"kr_chest",name:"Kraft Brust",  type:"counter", target:1, optional:false},
 {id:"kr_legs", name:"Kraft Beine",  type:"counter", target:1, optional:false},
 {id:"mobility",name:"Mobility",     type:"counter", target:2, optional:false},
 {id:"rad",     name:"Rad fahren",   type:"ride",    target:0, optional:true},
];

/* ============ STATE / STORAGE ============ */
const LS="marathon_koeln_2026";
const BK_PREFIX="marathon_koeln_2026_bk_";
const BK_MAX=10;
function freshDB(){
  return {v:2, logs:{}, moves:{}, skips:{}, planEdits:{},
          activities:JSON.parse(JSON.stringify(DEFAULT_ACTS)),
          acts:{}, rides:[], weights:[], hrBase:null};
}
function migrateDB(d){
  // Niemals Daten wegwerfen — fehlende Felder auffüllen, Version setzen
  if(!d || typeof d!=="object") return freshDB();
  const base=freshDB();
  for(const k of Object.keys(base)){
    if(d[k]===undefined || d[k]===null) d[k]=base[k];
  }
  d.v=2;
  return d;
}
function listBackups(){
  const out=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k && k.startsWith(BK_PREFIX)) out.push(k);
  }
  return out.sort(); // chronologisch, ältestes zuerst (timestamp im key)
}
function hasContent(d){
  return d && (Object.keys(d.logs||{}).length || (d.rides||[]).length || (d.weights||[]).length || Object.keys(d.acts||{}).length);
}
function recoverFromBackup(){
  const keys=listBackups();
  while(keys.length){
    const k=keys.pop();
    try{ const d=JSON.parse(localStorage.getItem(k));
      if(hasContent(d)) return d;
    }catch(e){}
  }
  return null;
}
function makeBackup(){
  try{
    const raw=localStorage.getItem(LS);
    if(!raw) return;
    localStorage.setItem(BK_PREFIX+Date.now(), raw);
    const keys=listBackups();
    while(keys.length>BK_MAX) localStorage.removeItem(keys.shift());
  }catch(e){ console.warn("backup failed", e); }
}
let DB = load();
function load(){
  try{
    const raw=localStorage.getItem(LS);
    if(raw){
      const d=JSON.parse(raw);
      if(d && typeof d==="object") return migrateDB(d);
    }
  }catch(e){ console.error("load failed:", e); }
  // Hauptdaten leer/kaputt → versuche letztes Backup
  const rec=recoverFromBackup();
  if(rec){
    console.warn("Datenverlust erkannt — Wiederherstellung aus Backup");
    setTimeout(()=>toast("Daten aus Backup wiederhergestellt"),300);
    return migrateDB(rec);
  }
  return freshDB();
}
let _lastBk=0;
function save(){
  DB.lastModified=Date.now();
  const now=Date.now();
  // Backup höchstens 1× pro 5 min, aber immer wenn lange nicht
  if(now-_lastBk > 5*60*1000){
    const prev=localStorage.getItem(LS);
    if(prev){ localStorage.setItem(BK_PREFIX+now, prev);
      const ks=listBackups(); while(ks.length>BK_MAX) localStorage.removeItem(ks.shift());
      _lastBk=now;
    }
  }
  localStorage.setItem(LS, JSON.stringify(DB));
  schedulePush();
}

/* ============ CLOUD SYNC (private GitHub Gist) ============ */
const CK="marathon_koeln_2026_cloud";
let CLOUD = (()=>{ try{ return JSON.parse(localStorage.getItem(CK))||{}; }catch(e){ return {}; } })();
function saveCloud(){ localStorage.setItem(CK, JSON.stringify(CLOUD)); }
const GIST_FILE="marathon-koeln-2026.json";
let syncState="idle", syncMsg="", cloudBusy=false, _pushT=null;
function setSync(s,m){ syncState=s; syncMsg=m||""; updateBadge(); }
function updateBadge(){
  const b=document.getElementById("syncBadge"); if(!b) return;
  if(!CLOUD.token){ b.classList.remove("show"); return; }
  b.classList.add("show"); b.classList.toggle("spin", syncState==="syncing");
  const ic={idle:["○","var(--mut)"],syncing:["⟳","var(--blue)"],ok:["✓","var(--good)"],err:["⚠","var(--bad)"]}[syncState];
  b.innerHTML=`<span style="color:${ic[1]}">${ic[0]}</span>`;
  b.title= syncState==="ok"&&CLOUD.lastSync ? `Sync vor ${Math.max(0,Math.round((Date.now()-CLOUD.lastSync)/60000))} min` : syncState==="err"?("Sync-Fehler: "+syncMsg):"Cloud-Sync";
}
function schedulePush(){
  if(!CLOUD.token||!CLOUD.gistId) return;
  clearTimeout(_pushT); _pushT=setTimeout(()=>{ if(!cloudBusy) cloudPush(); }, 1500);
}
async function ghFetch(path, opts={}){
  const r=await fetch("https://api.github.com"+path, {...opts, headers:{
    "Authorization":"token "+CLOUD.token,"Accept":"application/vnd.github+json",
    "Content-Type":"application/json", ...(opts.headers||{})}});
  if(!r.ok){ const t=await r.text().catch(()=>""); throw new Error("HTTP "+r.status+(t?": "+t.slice(0,120):"")); }
  return r.json();
}
async function cloudPush(){
  if(!CLOUD.token||!CLOUD.gistId||cloudBusy) return;
  cloudBusy=true; setSync("syncing");
  try{
    await ghFetch("/gists/"+CLOUD.gistId, {method:"PATCH",
      body:JSON.stringify({files:{[GIST_FILE]:{content:JSON.stringify(DB)}}})});
    CLOUD.lastSync=Date.now(); saveCloud(); setSync("ok");
  }catch(e){ setSync("err", e.message); }
  finally{ cloudBusy=false; updateBadge(); }
}
async function cloudPull(){
  if(!CLOUD.token||!CLOUD.gistId||cloudBusy) return;
  cloudBusy=true; setSync("syncing");
  try{
    const g=await ghFetch("/gists/"+CLOUD.gistId);
    const f=g.files&&g.files[GIST_FILE];
    if(!f) throw new Error("Datei im Gist fehlt");
    const remote=JSON.parse(f.content);
    const rT=remote.lastModified||0, lT=DB.lastModified||0;
    if(rT>lT){
      DB=remote; localStorage.setItem(LS, JSON.stringify(DB));
      CLOUD.lastSync=Date.now(); saveCloud();
      cloudBusy=false; render(); setSync("ok"); toast("Aus Cloud aktualisiert ✓"); return;
    } else if(lT>rT){
      cloudBusy=false; await cloudPush(); return;
    }
    CLOUD.lastSync=Date.now(); saveCloud(); setSync("ok");
  }catch(e){ setSync("err", e.message); }
  finally{ cloudBusy=false; updateBadge(); }
}
async function cloudSetup(token, existingId){
  setSync("syncing");
  try{
    // verify token
    const me=await fetch("https://api.github.com/user",{headers:{Authorization:"token "+token}});
    if(!me.ok) throw new Error("Token ungültig (HTTP "+me.status+")");
    const user=(await me.json()).login;
    if(existingId){
      CLOUD={token, gistId:existingId, user};
      const v=await fetch("https://api.github.com/gists/"+existingId,{headers:{Authorization:"token "+token}});
      if(!v.ok) throw new Error("Gist nicht erreichbar (HTTP "+v.status+")");
    } else {
      CLOUD={token};
      const g=await ghFetch("/gists",{method:"POST",body:JSON.stringify({
        description:"Marathon Köln 2026 — Trainings-Daten (privat)", public:false,
        files:{[GIST_FILE]:{content:JSON.stringify(DB)}}})});
      CLOUD={token, gistId:g.id, user};
    }
    saveCloud();
    await cloudPull();
    render(); toast("Cloud-Sync aktiv ✓");
  }catch(e){ CLOUD={}; saveCloud(); setSync("err", e.message); toast("Setup fehlgeschlagen: "+e.message); render(); }
}
function cloudDisconnect(){
  if(!confirm("Cloud-Sync trennen? Der Gist bleibt online (löschbar via gist.github.com).")) return;
  CLOUD={}; localStorage.removeItem(CK); setSync("idle"); render(); toast("Cloud-Sync getrennt");
}
function doCloudSetup(){
  const tok=document.getElementById("c_tok").value.trim();
  const gid=document.getElementById("c_gid").value.trim();
  if(!tok){ toast("Token nötig"); return; }
  cloudSetup(tok, gid||null);
}
setInterval(()=>{ if(CLOUD.token) updateBadge(); }, 30000);

/* ============ STRAVA SYNC ============ */
function sCfg(){ if(!DB.strava) DB.strava={}; return DB.strava; }
function stravaConnected(){ return !!(DB.strava && DB.strava.refreshToken); }

async function stravaTokenExchange(body){
  const r = await fetch("https://www.strava.com/oauth/token", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify(body)
  });
  if(!r.ok) throw new Error("Strava /oauth/token "+r.status);
  return r.json();
}
async function checkStravaCallback(){
  const u = new URL(location.href);
  const code = u.searchParams.get("code");
  if(!code) return;
  const c = sCfg();
  if(!c.clientId || !c.clientSecret){
    history.replaceState({}, "", u.pathname); toast("Strava-Auth ohne Client gestartet"); return;
  }
  try{
    const d = await stravaTokenExchange({client_id:c.clientId, client_secret:c.clientSecret, code, grant_type:"authorization_code"});
    if(!d.access_token) throw new Error(d.message||"keine Tokens");
    c.accessToken=d.access_token; c.refreshToken=d.refresh_token; c.expiresAt=d.expires_at*1000;
    c.athlete=d.athlete?(d.athlete.firstname+" "+d.athlete.lastname).trim():null;
    save();
    history.replaceState({}, "", u.pathname);
    toast("Strava verknüpft ✓");
    await stravaFetchActivities();
  }catch(e){ history.replaceState({},"",u.pathname); toast("Strava-Auth Fehler: "+e.message); }
  render();
}
async function ensureStravaToken(){
  const c = sCfg();
  if(!c.refreshToken) return false;
  if(c.expiresAt && c.expiresAt - Date.now() > 60000 && c.accessToken) return true;
  try{
    const d = await stravaTokenExchange({client_id:c.clientId, client_secret:c.clientSecret, refresh_token:c.refreshToken, grant_type:"refresh_token"});
    if(!d.access_token) return false;
    c.accessToken=d.access_token; c.refreshToken=d.refresh_token||c.refreshToken; c.expiresAt=d.expires_at*1000; save();
    return true;
  }catch(e){ console.warn("Strava refresh fail", e); return false; }
}
async function stravaFetchActivities(){
  if(!await ensureStravaToken()) return;
  const c = sCfg();
  const STRAVA_DAYS = 2;
  const after = Math.floor((Date.now() - STRAVA_DAYS*86400000)/1000);
  try{
    const r = await fetch(`https://www.strava.com/api/v3/athlete/activities?after=${after}&per_page=30`, {
      headers:{"Authorization":"Bearer "+c.accessToken}
    });
    if(!r.ok){ toast("Strava-Abruf Fehler "+r.status); return; }
    const acts = await r.json();
    const types = /^(Run|VirtualRun|TrailRun|Ride|VirtualRide|GravelRide|MountainBikeRide)$/;
    const ignored = new Set(c.importedIds||[]);
    c.pending = acts.filter(a=>types.test(a.type) && !ignored.has(a.id)).map(a=>({
      id:a.id, type:a.type, name:a.name, distance:a.distance, moving_time:a.moving_time,
      average_heartrate:a.average_heartrate, start_date:a.start_date
    }));
    c.lastFetch = Date.now(); save();
    if(c.pending.length) toast(`${c.pending.length} neue Strava-Aktivität(en)`);
  }catch(e){ toast("Strava-Abruf Fehler: "+e.message); }
}
function stravaConnect(){
  const cid=(document.getElementById("s_cid")||{}).value?.trim();
  const cs=(document.getElementById("s_cs")||{}).value?.trim();
  if(!cid||!cs){ toast("Client-ID + Secret nötig"); return; }
  const c = sCfg(); c.clientId=cid; c.clientSecret=cs; save();
  const redirect = location.origin + location.pathname;
  location.href = `https://www.strava.com/oauth/authorize?client_id=${encodeURIComponent(cid)}&response_type=code&redirect_uri=${encodeURIComponent(redirect)}&approval_prompt=auto&scope=activity:read_all`;
}
function stravaDisconnect(){
  if(!confirm("Strava-Verknüpfung trennen? Importierte Aktivitäten bleiben erhalten.")) return;
  delete DB.strava; save(); render(); toast("Strava getrennt");
}
function stravaImport(actId){
  const c = sCfg();
  const a = (c.pending||[]).find(x=>x.id===actId);
  if(!a){ toast("Aktivität nicht mehr in der Liste"); return; }
  const isRide = /Ride/.test(a.type);
  const date = new Date(a.start_date);
  const dist = +(a.distance/1000).toFixed(2);
  const sec = a.moving_time;
  const hr = a.average_heartrate ? Math.round(a.average_heartrate) : null;
  if(isRide){
    DB.rides.push({id:"R"+Date.now()+Math.random().toString(36).slice(2,5),
      date:dkey(date), w:(locate(date).week||0), dist, sec, hr, rpe:null, note:"Strava: "+(a.name||"")});
  } else {
    const m = matchRunSlot(date);
    if(!m){ toast("Kein passender Lauf-Slot am "+dkey(date)); return; }
    const id = runId(m.w, m.slot);
    if(DB.logs[id]){ toast("Bereits erfasst – übersprungen"); }
    else DB.logs[id] = {dist, sec, hr, rpe:null, feel:null, pain:false, note:"Strava: "+(a.name||"")};
  }
  c.importedIds = (c.importedIds||[]).concat([a.id]);
  c.pending = (c.pending||[]).filter(x=>x.id!==a.id);
  save(); render(); toast(isRide?"Fahrt importiert ✓":"Lauf importiert ✓");
}
function stravaImportAll(){
  const list = ((DB.strava||{}).pending||[]).slice();
  list.forEach(a => stravaImport(a.id));
}
function stravaDismiss(actId){
  const c = sCfg();
  c.importedIds = (c.importedIds||[]).concat([actId]);
  c.pending = (c.pending||[]).filter(x=>x.id!==actId);
  save(); render();
}
function stravaDismissAll(){
  const c = sCfg();
  const ids = (c.pending||[]).map(a=>a.id);
  c.importedIds = (c.importedIds||[]).concat(ids);
  c.pending = [];
  save(); render(); toast("Alle vom Vorschlag entfernt");
}

  const rows=keys.map(k=>{

function restoreBackup(k){
  if(!confirm("Diesen Backup-Stand wiederherstellen? Der aktuelle Stand wird überschrieben.")) return;
  try{
    const d=JSON.parse(localStorage.getItem(k));
    if(!d) throw new Error("Backup nicht lesbar");
    // current als Notfall-Backup ablegen
    const cur=localStorage.getItem(LS); if(cur) localStorage.setItem(BK_PREFIX+Date.now(), cur);
    DB=migrateDB(d); localStorage.setItem(LS, JSON.stringify(DB));
    render(); toast("Wiederhergestellt ✓");
    if(CLOUD.token&&CLOUD.gistId) cloudPush();
  }catch(e){ toast("Wiederherstellen fehlgeschlagen: "+e.message); }
}

/* ============ DATE HELPERS ============ */
const MS=86400000;
function today(){ const n=new Date(); return new Date(n.getFullYear(),n.getMonth(),n.getDate()); }
function dkey(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function addDays(d,n){ return new Date(d.getTime()+n*MS); }
function dateOf(weekNum,dayIdx){ return addDays(PLAN_START,(weekNum-1)*7+dayIdx); }
function fmtD(d){ return DOW[(d.getDay()+6)%7]+" "+String(d.getDate()).padStart(2,"0")+"."+String(d.getMonth()+1).padStart(2,"0")+"."; }
function locate(d){
  const diff=Math.floor((d-PLAN_START)/MS);
  if(diff<0) return {pre:true};
  const w=Math.floor(diff/7)+1, day=diff%7;
  if(w>21) return {post:true};
  return {week:w, dayIdx:day};
}

/* ============ RUN / PLAN RESOLUTION ============ */
function runId(w,slot){ return `W${w}-${slot}`; }
function runContent(w,slot){
  const W=WEEKS[w-1], R=RUNS.find(r=>r.slot===slot);
  const def={title:R.label, det:W[slot]};
  const e=DB.planEdits[runId(w,slot)];
  return e? {title:e.title||def.title, det:(e.det!=null?e.det:def.det), edited:true} : def;
}
function effDay(w,slot){ const id=runId(w,slot); return DB.moves[id]!=null?DB.moves[id]:RUNS.find(r=>r.slot===slot).day; }
function isSkipped(id){ return !!DB.skips[id]; }
function runDoneKm(w){ let k=0; RUNS.forEach(R=>{ const L=DB.logs[runId(w,R.slot)]; if(L&&L.dist)k+=L.dist; }); return k; }
function totalRunKm(){ let k=0; Object.entries(DB.logs).forEach(([id,L])=>{ if(L&&L.dist)k+=L.dist; }); return k; }

function runLogs(){
  const out=[];
  WEEKS.forEach(W=>{ RUNS.forEach(R=>{
    const id=runId(W.w,R.slot), L=DB.logs[id];
    if(!L||!L.dist||!L.sec) return;
    out.push({...L, id, kind:R.kind, week:W.w, date:dateOf(W.w,effDay(W.w,R.slot)),
      pace:L.sec/L.dist, speed:L.dist*1000/(L.sec/60)});
  });});
  return out.sort((a,b)=>a.date-b.date);
}

/* activities */
function actCount(w,id){
  const a=DB.activities.find(x=>x.id===id);
  if(a&&a.type==="ride") return DB.rides.filter(r=>r.w===w).length;
  return DB.acts[`${w}::${id}`]||0;
}
function actInc(w,id,delta){
  const k=`${w}::${id}`; const v=Math.max(0,(DB.acts[k]||0)+delta);
  if(v===0) delete DB.acts[k]; else DB.acts[k]=v; save();
  if(document.startViewTransition){ document.startViewTransition(()=>render()); } else { render(); }
}

/* ============ FORMAT ============ */
function pace(s){ if(!s||!isFinite(s))return "–"; const m=Math.floor(s/60),x=Math.round(s%60); return m+":"+String(x).padStart(2,"0"); }
function hms(sec){ sec=Math.round(sec); const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60; return (h?h+":":"")+String(m).padStart(h?2:1,"0")+":"+String(s).padStart(2,"0"); }
function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),1900); }

/* ============ ACTIVITY FILE PARSER (Strava GPX / Garmin·Strava TCX) ============ */
function haversine(la1,lo1,la2,lo2){
  const R=6371000, t=Math.PI/180;
  const dLa=(la2-la1)*t, dLo=(lo2-lo1)*t;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*t)*Math.cos(la2*t)*Math.sin(dLo/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}
// → {dist (km), sec, hr (avg bpm|null), date (Date|null), kind:'run'|'ride'} | null
function parseActivity(text){
  let doc; try{ doc=new DOMParser().parseFromString(text,"application/xml"); }catch(e){ return null; }
  if(doc.querySelector("parsererror")) return null;
  const g=t=>[...doc.getElementsByTagName(t)];
  // ---- TCX ----
  if(doc.getElementsByTagName("TrainingCenterDatabase").length || g("Lap").length){
    let sec=0, dist=0, hrs=[], date=null, sport=null;
    const act=doc.getElementsByTagName("Activity")[0];
    if(act) sport=(act.getAttribute("Sport")||"").toLowerCase();
    g("Lap").forEach(l=>{
      const tt=l.getElementsByTagName("TotalTimeSeconds")[0];
      const dm=l.getElementsByTagName("DistanceMeters")[0];
      if(tt) sec+=parseFloat(tt.textContent)||0;
      if(dm) dist+=parseFloat(dm.textContent)||0;
      const st=l.getAttribute("StartTime"); if(st&&!date) date=new Date(st);
    });
    g("Trackpoint").forEach(tp=>{
      const h=tp.getElementsByTagName("HeartRateBpm")[0];
      if(h){ const v=h.getElementsByTagName("Value")[0]; const n=parseFloat((v||h).textContent); if(n>0)hrs.push(n); }
    });
    if(!dist){ const dms=g("DistanceMeters").map(d=>parseFloat(d.textContent)||0); if(dms.length)dist=Math.max(...dms); }
    if(!date){ const id=doc.getElementsByTagName("Id")[0]; if(id)date=new Date(id.textContent); }
    if(!sec||!dist) return null;
    return {dist:+(dist/1000).toFixed(2), sec:Math.round(sec), hr:hrs.length?Math.round(hrs.reduce((a,b)=>a+b,0)/hrs.length):null,
      date:date&&!isNaN(date)?date:null, kind:/bik|cycl|ride/.test(sport)?"ride":"run"};
  }
  // ---- GPX ----
  const pts=g("trkpt");
  if(pts.length){
    let dist=0, hrs=[], times=[], lastLa=null,lastLo=null;
    pts.forEach(p=>{
      const la=parseFloat(p.getAttribute("lat")), lo=parseFloat(p.getAttribute("lon"));
      if(lastLa!=null) dist+=haversine(lastLa,lastLo,la,lo);
      lastLa=la; lastLo=lo;
      const tEl=p.getElementsByTagName("time")[0]; if(tEl)times.push(new Date(tEl.textContent));
      const ext=p.getElementsByTagName("*");
      for(const e of ext){ if(/(^|:)hr$/i.test(e.tagName)){ const n=parseFloat(e.textContent); if(n>0)hrs.push(n); } }
    });
    if(!times.length){ const tg=g("time"); if(tg.length)times=tg.map(t=>new Date(t.textContent)); }
    let sec=0; if(times.length>=2){ times.sort((a,b)=>a-b); sec=Math.round((times[times.length-1]-times[0])/1000); }
    if(!dist||!sec) return null;
    const typ=(g("type")[0]||{}).textContent||"";
    return {dist:+(dist/1000).toFixed(2), sec, hr:hrs.length?Math.round(hrs.reduce((a,b)=>a+b,0)/hrs.length):null,
      date:times.length?times[0]:null, kind:/bik|cycl|ride|^1$|^17$/i.test(typ)?"ride":"run"};
  }
  return null;
}
// Strava bulk activities.csv → array of {dist,sec,hr,date,kind}
function parseStravaCSV(text){
  const lines=text.split(/\r?\n/).filter(x=>x.trim());
  if(lines.length<2) return [];
  const split=l=>{ const o=[]; let c="",q=false; for(const ch of l){ if(ch==='"')q=!q; else if(ch===","&&!q){o.push(c);c="";} else c+=ch; } o.push(c); return o.map(s=>s.trim().replace(/^"|"$/g,"")); };
  const H=split(lines[0]).map(h=>h.toLowerCase());
  const ci=(...k)=>H.findIndex(h=>k.some(x=>h.includes(x)));
  const iDate=ci("activity date","date"), iType=ci("activity type","type"),
        iDist=ci("distance"), iEl=ci("elapsed time"), iMov=ci("moving time"), iHr=ci("average heart");
  const out=[];
  for(let i=1;i<lines.length;i++){
    const r=split(lines[i]); if(r.length<3) continue;
    const type=(r[iType]||"").toLowerCase();
    const kind=/ride|bike|cycl/.test(type)?"ride":(/run|lauf/.test(type)?"run":null);
    if(!kind) continue;
    let d=new Date(r[iDate]); if(isNaN(d)) continue;
    let dist=parseFloat((r[iDist]||"").replace(",", ".")); if(!dist) continue;
    if(dist>400) dist=dist/1000; // meters → km
    const toSec=v=>{ if(!v) return 0; if(/:/.test(v)){ const p=v.split(":").map(Number); return p.length===3?p[0]*3600+p[1]*60+p[2]:p[0]*60+p[1]; } return Math.round(parseFloat(v)); };
    const sec=toSec(r[iMov])||toSec(r[iEl]); if(!sec) continue;
    const hr=iHr>=0?Math.round(parseFloat((r[iHr]||"").replace(",","."))||0)||null:null;
    out.push({dist:+dist.toFixed(2), sec, hr, date:d, kind});
  }
  return out;
}
function matchRunSlot(date){
  const k=dkey(date);
  for(let w=1;w<=21;w++) for(const R of RUNS){
    if(runIsRest(w,R.slot)) continue;
    if(dkey(dateOf(w,effDay(w,R.slot)))===k) return {w,slot:R.slot};
  }
  return null;
}

      <button class="btn-sm" onclick="openMove(${w},'${slot}')">Verschieben</button>
      ${!L?`<button class="btn-sm btn-gh" onclick="toggleSkip('${id}')">${sk?"Doch laufen":"Überspringen"}</button>`:""}
    </div></div>`;
}
function actPanel(w){
  // Sortieren: offene oben (Original-Reihenfolge), abgeschlossene unten
  const items = DB.activities.map((a,i)=>{
    const c=actCount(w,a.id);
    const tgt=a.target||0;
    const done = a.type!=="ride" && tgt>0 && c>=tgt;
    return {a, c, tgt, done, i};
  }).sort((x,y)=>(x.done?1:0)-(y.done?1:0) || x.i-y.i);

  const rows = items.map(({a,c,tgt,done})=>{
    let ctrl;
    if(a.type==="ride"){
      ctrl=`<button class="btn-sm btn-p" onclick="openRide(${w},'${a.id}')">+ Fahrt</button>`;
    } else {
      ctrl=`<div class="step">
        <button onclick="actInc(${w},'${a.id}',-1)">−</button>
        <span class="sv">${c}</span>
        <button class="${done?'':'acc'}" onclick="actInc(${w},'${a.id}',1)">+</button></div>`;
    }
    let dots="";
    if(tgt>0){ dots=`<div class="dotline">${Array.from({length:Math.max(tgt,c)}).map((_,i)=>`<i class="${i<c?'f':''}"></i>`).join("")}</div>`; }
    const tag = done ? ` <span class="pill done">✓</span>` : "";
    const over = (c>tgt && tgt>0) ? " <span class=\"tiny\" style=\"color:var(--good)\">· Überperformance!</span>" : "";
    return `<div class="act${done?' done':''}" style="view-transition-name:act-${a.id}">
      <div class="an"><b>${a.name}</b>${tag}${a.optional?` <span class="pill opt">optional</span>`:""}
        <div class="as">${a.type==="ride"?`${c} Fahrt(en) diese Woche`:(tgt>0?`${c}/${tgt} diese Woche${over}`:`${c}× erledigt`)}</div>
        ${dots}</div>${ctrl}</div>`;
  }).join("");
  return `<div class="card"><div class="between" style="margin-bottom:6px"><h2 style="margin:0">Freie Einheiten · Woche ${w}</h2>
    <button class="btn-sm btn-gh" onclick="go('mehr')">verwalten</button></div>${rows}
    ${DB.rides.filter(r=>r.w===w).length?`<div style="margin-top:12px" class="tiny muted">Rad: `+
      DB.rides.filter(r=>r.w===w).map(r=>`<a class="lnk" onclick="openRideEdit('${r.id}')">${r.dist}km/${hms(r.sec)}</a>`).join(" · ")+`</div>`:""}
    </div>`;
}

  let open=[], done=[];
  for(let w=1; w<=Math.min(21,cur); w++){
    RUNS.forEach(R=>{
      if(runIsRest(w,R.slot))return;
      const dt=dateOf(w,effDay(w,R.slot)); if(dt>today())return;
      const id=runId(w,R.slot), L=DB.logs[id], c=runContent(w,R.slot);

function cardPrognose(runs){
  const cand=runs.filter(r=>r.dist>=12);
  let src=cand.length?cand[cand.length-1]:runs.filter(r=>r.dist>=8).slice(-1)[0]||runs.slice(-1)[0];
  if(!src) return `<div class="card"><h2>Sub-4:00 Prognose</h2><div class="sub">Noch kein Lauf ≥ 8 km erfasst — Prognose folgt nach den ersten Einheiten.</div></div>`;
  const pred=src.sec*Math.pow(42.195/src.dist,1.06), diff=pred-GOAL_SEC, onTrack=diff<=0, predPace=pred/42.195;
  const maxLR=Math.max(0,...runs.filter(r=>r.kind==="long").map(r=>r.dist));
  const lrScore=Math.min(1,maxLR/32), timeScore=Math.max(0,Math.min(1,1-diff/(40*60)));
  const score=Math.round((0.55*timeScore+0.45*lrScore)*100);
  const lbl=score>=80?"Auf Kurs":score>=55?"Knapp dran":"Hinterher";
  const col=score>=80?"var(--good)":score>=55?"var(--warn)":"var(--bad)";
  const deg=(score/100)*180;
  return `<div class="card"><h2>Sub-4:00 Prognose</h2>
    <div class="grid2">
      <div class="stat"><div class="v">${hms(pred)}</div><div class="l">Prognose Finish</div>
        <div class="d" style="color:${onTrack?'var(--good)':'var(--bad)'}">${onTrack?"▼ "+hms(-diff)+" unter Ziel":"▲ "+hms(diff)+" über Ziel"}</div></div>
      <div class="stat"><div class="v">${pace(predPace)}</div><div class="l">Prog. Pace /km</div><div class="d muted">Ziel-MP ${pace(MP_SEC)}</div></div></div>
    <div class="center" style="margin:18px 0 4px">
      <svg width="170" height="100" viewBox="0 0 170 100">
        <path d="M15 90 A70 70 0 0 1 155 90" fill="none" stroke="var(--card2)" stroke-width="13" stroke-linecap="round"/>

function cardHR(runs){
  const easy=runs.filter(r=>(r.kind==="easy"||r.kind==="long")&&r.hr);
  let chart=`<div class="sub">Erfasse Distanz + Ø-HF bei lockeren Läufen / Long Runs für die Effizienz-Kurve.</div>`;
  if(easy.length>=2){
    const eff=easy.map(r=>r.speed/r.hr), mn=Math.min(...eff),mx=Math.max(...eff),rg=(mx-mn)||1;
    const W=320,H=90,p=6;
    const pts=eff.map((v,i)=>[p+i*((W-2*p)/(eff.length-1)),H-p-((v-mn)/rg)*(H-2*p)]);
    const line=pts.map((q,i)=>(i?"L":"M")+q[0].toFixed(1)+" "+q[1].toFixed(1)).join(" ");
    const tr=eff[eff.length-1]>=eff[0];
    chart=`<svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="margin:8px 0">
      <path d="${line}" fill="none" stroke="var(--blue)" stroke-width="2.5"/>
      ${pts.map(q=>`<circle cx="${q[0].toFixed(1)}" cy="${q[1].toFixed(1)}" r="2.6" fill="var(--blue)"/>`).join("")}</svg>
      <div class="tiny muted">Effizienz = Geschwindigkeit ÷ HF. <b style="color:${tr?'var(--good)':'var(--warn)'}">${tr?"steigend ▲ — Aerobik verbessert sich":"fallend ▼ — beobachten"}</b></div>`;
  }
  const eHR=runs.filter(r=>r.kind==="easy"&&r.hr).map(r=>r.hr);
  const base=DB.hrBase||(eHR.length?Math.round(eHR.slice(0,3).reduce((a,b)=>a+b,0)/Math.min(3,eHR.length)):null);
  return `<div class="card"><h2>HF-Effizienz</h2>${chart}
    ${base?`<div class="grid2" style="margin-top:12px">
      <div class="stat"><div class="v">${base}</div><div class="l">Baseline locker</div></div>
      <div class="stat"><div class="v">${eHR.length?eHR[eHR.length-1]:"–"}</div><div class="l">letzter locker</div>
        <div class="d" style="color:${eHR.length&&eHR[eHR.length-1]>base+5?'var(--bad)':'var(--good)'}">${eHR.length?(eHR[eHR.length-1]>base+5?"⚠ +"+(eHR[eHR.length-1]-base)+" bpm":"im Rahmen"):""}</div></div></div>`:""}</div>`;
}

function cardWeight(){

    const pts=ws.map((w,i)=>[p+(ws.length===1?(W-2*p)/2:i*((W-2*p)/(ws.length-1))),H-p-((w.kg-mn)/rg)*(H-2*p)]);

/* ============ RED FLAGS ============ */
function computeFlags(){
  const F=[], runs=runLogs();
  const easy=runs.filter(r=>r.kind==="easy"&&r.hr);
  if(easy.length>=4){ const b=easy.slice(0,3).reduce((a,c)=>a+c.hr,0)/3, rec=easy.slice(-2).reduce((a,c)=>a+c.hr,0)/2;
    if(rec>b+5) F.push(["b","HF im lockeren DL erhöht",`Ø zuletzt ${Math.round(rec)} vs. Baseline ${Math.round(b)} bpm. Mehr Schlaf, evtl. Defizit pausieren.`]); }
  const lo=runs.filter(r=>r.kind==="long");
  if(lo.length>=2 && lo.slice(-2).filter(r=>r.rpe&&r.rpe>=8).length>=2)
    F.push(["w","Long Runs zwei Wochen zäh","RPE ≥ 8 in beiden letzten Long Runs. Pace 10s/km drosseln, ggf. Defizit raus."]);
  const loc=locate(today());
  if(loc.week) for(let w=2;w<loc.week;w++){ const id=runId(w,"so"); if(!DB.logs[id]&&!DB.skips[id]){
    F.push(["w","Long Run W"+w+" nicht erfasst","Wichtigste Einheit der Woche fehlt. Nachtragen oder bewusst überspringen."]); break; } }
  if(runs.some(r=>r.pain)) F.push(["b","Schmerz markiert","Bei einer Einheit Schmerz vermerkt. >2 Tage anhaltend → Pause, nicht durchbeißen."]);
  if(!F.length) F.push(["ok","Keine Red Flags","Alles im grünen Bereich — Plan halten."]);
  return F;
}
function redFlagsBlock(compact){
  const F=computeFlags();
  if(compact && F.length===1 && F[0][0]==="ok") return "";
  return `<h2 style="margin-top:18px">Red Flags</h2>${F.map(f=>`<div class="flag ${f[0]}">
    <span class="fi">${f[0]==='ok'?'✓':f[0]==='w'?'⚠':'⛔'}</span><div><b>${f[1]}</b>${f[2]}</div></div>`).join("")}`;
}

      <h3>Statisches Dehnen nach dem Lauf (5–10 min)</h3><ul>
      <li>Hüftbeuger-Lunge — 45 s/Bein (Becken nach vorne kippen)</li>
      <li>Wadenstretch an Wand — 45 s/Bein (auch Variante gebeugtes Knie)</li>
      <li>Hamstring-Dehnung — 45 s/Bein (gerader Rücken)</li>
      <li>Pigeon Pose — 60 s/Seite (Glutes/Piriformis)</li>
      <li>Quadrizeps stehend — 30 s/Bein</li></ul>
      <h3>Faszienrolle (essentiell!)</h3>
      <p>5–10 min nach jedem Lauf. Reihenfolge: 1) Waden 2) IT-Band außen 3) Quadrizeps 4) Glutes — je 60–90 s, Schmerzpunkte 20 s halten. Verklebte Waden = Achilles-Probleme ab W12.</p>
    </div></details>

    <details><summary>Ernährung &amp; Gewicht</summary><div class="dc">
      <p>Bedarf bei 85 kg + 4 Läufen ~2.800–3.100 kcal. <b>Empfehlung 2.500–2.700 kcal</b> (Defizit 300–500) → 0,3–0,5 kg/Woche. 86→81 kg in 10–14 Wochen, fertig vor Peak.</p>
      <h3>Makros / Tag</h3><ul>
      <li>Eiweiß 150–170 g (Hähnchen, Pute, Magerquark, Skyr, Eier, Whey)</li>
      <li>Kohlenhydrate 300–380 g (Hafer, Reis, Kartoffeln, Obst)</li>
      <li>Fett 70–85 g (Olivenöl, Avocado, Nüsse, Eigelb)</li>
      <li>Carb-Cycling: Lauftage 350–400 g KH, Ruhetage 200–250 g · Eiweiß konstant</li></ul>
      <h3>Um die Läufe herum</h3><ul>
      <li>Morgens Do/Fr: nüchtern oder Banane + Kaffee</li>
      <li>Vor Di (hart): 60–90 min vorher ~40 g KH (Banane + Riegel)</li>
      <li>Vor Long Run &gt;20 km: 90 min vorher 60–80 g KH</li>
      <li>Long Run &gt;90 min: Gel alle 25–30 min + Wasser (ab W8 Pflicht)</li>
      <li>Nach jedem Lauf (30 min): 30 g Eiweiß + KH</li></ul>
      <h3>Tipps</h3><ul>
      <li>Volumenreich essen (Gemüse), Eiweiß zuerst</li>
      <li>Alkohol minimieren · Schlaf &gt;7 h · 1×/Woche nüchtern wiegen</li>
      <li>Long-Run-Tage NICHT unterkalorisieren (So/Mo 3.000+ kcal)</li></ul>
      <h3>Defizit pausieren wenn</h3>
      <p>Long Run 2 Wochen zäh · HF im Easy +5–10 höher · Schlafprobleme/kein Drive · Verletzungs-Anzeichen → 1–2 Wochen Erhalt (2.800 kcal). Taper W19–21: kein Defizit, Glykogen laden.</p>
    </div></details>

    <details><summary>Padel, Rennrad &amp; Red Flags</summary><div class="dc">
      <p><b>Padel</b> Mo bleibt. W16 (Königswoche) &amp; W21 aussetzen/locker — Stop-and-Go belastet Achilles.</p>
      <p><b>Rennrad</b> Sa optional, streng GA1 (HF &lt;130), max 2–3 h. Bei großer Tour: Long Run &amp; Bike tauschen (Bike So, LR Sa).</p>
      <p><b>Long Run</b> nach HF steuern: HF im Z2-LR über 155 trotz Pace = zu müde → langsamer/kürzen. Letzte 8 km eines MP-Blocks sind die wichtigsten.</p>
      <h3>Red Flags im Training</h3><ul>
      <li>Müde trotz HF &lt;150 → Plan halten, mehr Schlaf</li>
      <li>HF im Long Run kriecht hoch → 10 s/km drosseln, evtl. kürzen</li>
      <li>Schmerz &gt;2 Tage → Pause, nicht durchbeißen</li>
      <li>Erkältung mit Fieber → Stopp bis 3 Tage symptomfrei</li>
      <li>Optional: 10er-Test in W12 oder W17 (ersetzt Di)</li></ul>
    </div></details>

    <details><summary>Wettkampf-Strategie Köln 04.10.</summary><div class="dc">
      <p><b>Pacing:</b> 1. Hälfte 5:42–5:45/km (zurückhaltend), 2. Hälfte 5:38/km. Negativer Split. Letzte 7 km nach Gefühl.</p>
      <p><b>HF:</b> erste 30 min unter 155 halten (auch wenn langsam wirkt), ab km 20 bis 160 okay.</p>
      <p><b>Verpflegung:</b> alle 30 min ein Gel, ab km 35 Koffein-Gel. Trinken alle 5 km, auch ohne Durst.</p>
      <p><b>Logistik:</b> Carb-Loading Fr/Sa (~70% KH), Sa Abend gewohnte Mahlzeit (nichts Neues!). So 3 h vor Start 80–100 g KH.</p>

/* ============ MODALS ============ */
let _scrollY=0;
function lockBody(){
  if(document.body.classList.contains("locked")) return;
  _scrollY = window.scrollY || document.documentElement.scrollTop || 0;
  document.body.style.top = "-"+_scrollY+"px";
  document.body.classList.add("locked");
}
function unlockBody(){
  if(!document.body.classList.contains("locked")) return;
  document.body.classList.remove("locked");
  document.body.style.top = "";
  window.scrollTo(0, _scrollY);
}
function closeModal(){ document.getElementById("modalRoot").innerHTML=""; unlockBody(); }
function sheet(h){
  lockBody();
  document.getElementById("modalRoot").innerHTML=`<div class="modal" onclick="if(event.target===this)closeModal()"><div class="sheet"><button class="sheet-close" onclick="closeModal()" aria-label="Schließen">×</button><div class="grab"></div>${h}</div></div>`;
  attachSheetGestures();
}
function attachSheetGestures(){
  const s=document.querySelector(".sheet"); if(!s) return;
  let startY=0, dy=0, dragging=false;
  const start=e=>{ if(s.scrollTop>2) return;
    const t=e.touches?e.touches[0]:e; startY=t.clientY; dy=0; dragging=true; s.style.transition="none"; };
  const move=e=>{ if(!dragging) return;
    const t=e.touches?e.touches[0]:e; const d=t.clientY-startY;
    if(d<0){ dy=0; s.style.transform=""; return; }
    dy=d; s.style.transform=`translateY(${d}px)`; };
  const end=()=>{ if(!dragging) return; dragging=false; s.style.transition="transform .22s ease-out";
    if(dy>110){ s.style.transform="translateY(100%)"; setTimeout(closeModal,220); }
    else { s.style.transform=""; } dy=0; };
  s.addEventListener("touchstart",start,{passive:true});
  s.addEventListener("touchmove",move,{passive:true});
  s.addEventListener("touchend",end);
  s.addEventListener("touchcancel",end);
}
window._seg={};
function selSeg(g,b,v){ b.parentNode.querySelectorAll("button").forEach(x=>x.classList.remove("on")); b.classList.add("on"); window._seg[g]=v; }

function saveRun(w,slot){
  const id=runId(w,slot), L=DB.logs[id]||{};

function runImportFile(ev){
  const f=ev.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    const a=parseActivity(r.result);
    if(!a){ toast("Datei nicht lesbar (GPX/TCX?)"); return; }
    const D=document.getElementById("f_dist"), H=document.getElementById("f_h"),
          M=document.getElementById("f_m"), S=document.getElementById("f_s"), HR=document.getElementById("f_hr");

    toast(`Übernommen: ${a.dist} km · ${hms(a.sec)}${a.hr?" · "+a.hr+" bpm":""}`);
  };
  r.readAsText(f); ev.target.value="";
}

function importData(ev){
  const f=ev.target.files[0]; if(!f)return; const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); if(d&&d.v){ if(!d.activities)d.activities=JSON.parse(JSON.stringify(DEFAULT_ACTS)); if(!d.acts)d.acts={}; if(!d.rides)d.rides=[]; if(!d.planEdits)d.planEdits={}; DB=d; DB.v=2; save(); render(); toast("Import erfolgreich ✓"); } else toast("Ungültige Datei"); }catch(e){ toast("Import fehlgeschlagen"); } };
  r.readAsText(f);
}
function bulkImport(ev){
  const files=[...ev.target.files]; if(!files.length) return;
  let runs=0, rides=0, skip=0, fail=0, pending=files.length;
  const finish=()=>{ if(--pending>0) return;
    save(); render(); ev.target.value="";
    toast(`${runs} Läufe · ${rides} Fahrten importiert${skip?` · ${skip} schon erfasst`:""}${fail?` · ${fail} unlesbar`:""}`);
  };
  const addActivity=a=>{
    if(!a||!a.dist||!a.sec){ fail++; return; }
    if(a.kind==="ride"){
      const key=a.date?dkey(a.date):"";
      if(DB.rides.some(x=>x.date===key && Math.abs(x.dist-a.dist)<0.3)){ skip++; return; }
      const loc=a.date?locate(a.date):{};
      DB.rides.push({id:"R"+Date.now()+Math.random().toString(36).slice(2,6), date:key||dkey(today()),
        w:loc.week||0, dist:a.dist, sec:a.sec, hr:a.hr||null, rpe:null, note:"Import"});
      rides++; return;
    }
    if(!a.date){ fail++; return; }
    const m=matchRunSlot(a.date);
    if(!m){ skip++; return; }
    const id=runId(m.w,m.slot);
    if(DB.logs[id]){ skip++; return; }
    DB.logs[id]={dist:a.dist, sec:a.sec, hr:a.hr||null, rpe:null, feel:null, pain:false, note:"Import (Strava/Garmin)"};
    delete DB.skips[id]; runs++;
  };
  files.forEach(f=>{
    const r=new FileReader();
    r.onload=()=>{ try{
      if(/\.csv$/i.test(f.name)) parseStravaCSV(r.result).forEach(addActivity);
      else addActivity(parseActivity(r.result));
    }catch(e){ fail++; } finish(); };
    r.onerror=()=>{ fail++; finish(); };
    r.readAsText(f);
  });
}
function resetData(){ if(confirm("Wirklich ALLE Daten löschen? Vorher exportieren!")){ localStorage.removeItem(LS); DB=load(); save(); render(); toast("Zurückgesetzt"); } }

/* ============ RENDER ============ */
function render(){
  const v={heute:viewHeute,woche:viewWoche,track:viewTrack,stats:viewStats,mehr:viewMehr}[route]||viewHeute;
  document.getElementById("app").innerHTML=v(); renderNav(); updateBadge();
}
render();
// auto-pull on app start if configured
if(CLOUD.token && CLOUD.gistId){ cloudPull(); }
// Strava OAuth callback + initial fetch
checkStravaCallback();
if(stravaConnected()){ stravaFetchActivities(); }
</script>
