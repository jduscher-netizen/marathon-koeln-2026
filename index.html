/* ============ VIEW: WOCHE ============ */
function weekDaysHtml(w, todayIdx){
  let days="";
  for(let d=0; d<7; d++){
    const dt=dateOf(w,d);
    const rs=RUNS.filter(R=>effDay(w,R.slot)===d&&!runIsRest(w,R.slot));
    const isToday=d===todayIdx;
    days+=`<div class="day ${isToday?'today':''}">
      <div class="between"><div><span class="dn">${DOWL[d]}</span> <span class="dd">${fmtD(dt)}</span></div>
        ${isToday?`<span class="pill run">heute</span>`:""}</div>
      ${rs.length? rs.map(R=>{ const id=runId(w,R.slot),c=runContent(w,R.slot),L=DB.logs[id],sk=isSkipped(id);
        return `<div class="ds" style="cursor:pointer" onclick="openRun(${w},'${R.slot}')">
          ${c.title} ${L?`<span class="pill done">✓ ${L.dist}km</span>`:sk?`<span class="pill skip">skip</span>`:`<span class="pill run">Lauf</span>`}
          <div class="tiny muted" style="margin-top:2px">${c.det}${c.edited?" · angepasst":""}</div></div>`;
      }).join('<div class="sp"></div>') : `<div class="ds muted">— frei —</div>`}
    </div>`;
  }
  return days;
}
let wocheOpen;
function wocheToggle(w){ wocheOpen=(wocheOpen===w?null:w); render(); if(wocheOpen===w){ setTimeout(()=>{ const el=document.getElementById("wk"+w); if(el) el.scrollIntoView({block:"start",behavior:"smooth"}); },60); } }
function viewWoche(){
  const loc=locate(today()), curW=loc.week||1;
  if(wocheOpen===undefined) wocheOpen=curW;
  const DOWS=["Mo","Di","Mi","Do","Fr","Sa","So"];

  // Tagesliste (Mo–So) — dark=true für die Navy-Karte der aktuellen Woche
  const dayList=(w,dark)=>{ let out="";
    const cDay=dark?"#f0824e":"#93917e", cDayFree=dark?"#465b85":"#b6b4a4";
    const cTxt=dark?"#e9edf5":"#69675c", cFree=dark?"#465b85":"#b6b4a4";
    for(let d=0; d<7; d++){
      const dt=dateOf(w,d);
      const rs=RUNS.filter(R=>effDay(w,R.slot)===d && !runIsRest(w,R.slot));
      const isToday=(w===curW && d===loc.dayIdx);
      const dayLabel=`${DOWS[d]} ${dt.getDate()}.`;
      let txt, col=cTxt, weight="400";
      if(rs.length){ const R=rs[0], c=runContent(w,R.slot), L=DB.logs[runId(w,R.slot)];
        const short=c.title.replace(/^Lauf · /,"");
        const detShort=(c.det||"").split(/[:(]/)[0].trim();
        txt=`${short}${detShort&&detShort!=="–"?" · "+detShort:""}${L?' <span style="color:'+(dark?"#f0824e":"#e05a1f")+'">✓</span>':""}`;
        if(R.kind==="long") weight="600";
      } else { txt="— frei —"; col=cFree; }
      if(isToday){
        out+=`<div onclick="${rs.length?`openRun(${w},'${rs[0].slot}')`:""}" style="display:flex;align-items:center;gap:10px;background:rgba(224,90,31,${dark?".18":".12"});border-radius:8px;padding:8px 10px;margin:0 -4px;${rs.length?"cursor:pointer;":""}">
          <span style="font-family:var(--mono);font-size:12px;font-weight:600;color:${dark?"#f0824e":"#e05a1f"};width:44px;">${dayLabel}</span>
          <span style="font-size:13px;color:${dark?"#faf5ee":"#16294d"};font-weight:600;">${rs.length?txt:"— frei —"}</span>
          <span style="margin-left:auto;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:1px;color:#faf5ee;background:${dark?"#f0824e":"#e05a1f"};padding:2px 7px;border-radius:4px;">HEUTE</span></div>`;
      } else {
        out+=`<div onclick="${rs.length?`openRun(${w},'${rs[0].slot}')`:""}" style="display:flex;align-items:center;gap:10px;${rs.length?"cursor:pointer;":""}">
          <span style="font-family:var(--mono);font-size:12px;font-weight:500;color:${rs.length?cDay:cDayFree};width:44px;">${dayLabel}</span>
          <span style="font-size:13px;color:${col};font-weight:${weight};">${txt}</span></div>`;
      }
    }
    return `<div style="margin-top:14px;display:flex;flex-direction:column;gap:8px;">${out}</div>`;
  };

  // TEMPO: Bahnennummern-Quadrate statt Spine
  const numSq=(w,mode)=>{ // mode: past|cur|future|race
    const st=mode==="cur"||mode==="race"?"background:#e05a1f;color:#faf5ee;":mode==="past"?"background:#16294d;color:#faf5ee;":"background:#e8e1d2;color:#93917e;";
    return `<div style="width:36px;height:36px;border-radius:8px;flex:none;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:15px;font-weight:600;${st}">${w}</div>`;
  };
  let rows="";
  for(let w=1; w<=21; w++){
    const W=WEEKS[w-1];
    const done=runDoneKm(w);
    const pct=Math.round(Math.min(100, W.km?done/W.km*100:0));
    let pl=0, dn=0; RUNS.forEach(R=>{ if(runIsRest(w,R.slot)) return; pl++; if(DB.logs[runId(w,R.slot)]) dn++; });
    const isCur=w===curW, isPast=w<curW, isRace=w===21, open=(w===wocheOpen);
    const chev=`<span style="color:#b6b4a4;font-size:12px;line-height:1;flex:none;">${open?"▾":"▸"}</span>`;

    if(isCur){
      rows += `<div id="wk${w}" style="margin:14px 0;">
        <div style="background:#16294d;border-radius:18px;padding:18px;">
          <div onclick="wocheToggle(${w})" style="cursor:pointer;">
            <div style="display:flex;align-items:center;gap:12px;">${numSq(w,"cur")}
              <span style="font-family:var(--display);font-size:15px;font-weight:600;letter-spacing:.5px;color:#faf5ee;text-transform:uppercase;">${W.ph}</span>
              <span style="font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:1.5px;color:#faf5ee;background:#e05a1f;padding:3px 8px;border-radius:4px;">AKTUELL</span>
              <span style="margin-left:auto;color:#7d90b3;font-size:12px;">${open?"▾":"▸"}</span></div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;">
              <span style="font-size:12px;color:#a8b3c7;">${weekRange(w)} · ${Math.round(done)}/${W.km} km · LR ${W.lr}</span>
              <span style="font-family:var(--display);font-size:13px;font-weight:600;color:#f0824e;">${pct}%</span>
            </div>
            <div style="height:6px;border-radius:99px;background:#233a63;overflow:hidden;margin-top:10px;"><div style="width:${pct}%;height:100%;background:#e05a1f;border-radius:99px;"></div></div>
          </div>
          ${open?dayList(w,true):""}
        </div>
        ${open?actPanelLine(w):""}</div>`;
    } else if(isRace&&!isPast){
      rows += `<div id="wk${w}">
        <div onclick="wocheToggle(${w})" style="cursor:pointer;display:flex;align-items:center;gap:12px;padding:12px 2px;border-bottom:2px solid #e8e1d2;">
          ${numSq(w,"race")}
          <div style="min-width:0;"><div style="font-family:var(--display);font-size:15px;font-weight:600;letter-spacing:.5px;color:#16294d;text-transform:uppercase;">Renntag · ${raceCity()}</div>
          <div style="font-size:11px;color:#b6b4a4;margin-top:1px;">${weekRange(w)}</div></div>
          <div style="margin-left:auto;display:flex;align-items:center;gap:9px;"><span style="font-size:12px;font-weight:600;color:#16294d;">42,195 km</span>${chev}</div>
        </div>
        ${open?`<div style="background:#ffffff;border:1px solid #e8e1d2;border-radius:14px;padding:6px 16px 14px;margin:10px 0;">${dayList(w,false)}</div>`:""}</div>`;
    } else {
      const pctCol = isPast ? (pct>=100?"#e05a1f":"#c98f14") : "#b6b4a4";
      rows += `<div id="wk${w}" style="${isPast&&!open?"opacity:.65;":""}">
        <div onclick="wocheToggle(${w})" style="cursor:pointer;display:flex;align-items:center;gap:12px;padding:12px 2px;border-bottom:2px solid #e8e1d2;">
          ${numSq(w,isPast?"past":"future")}
          <div style="min-width:0;"><div style="font-family:var(--display);font-size:15px;font-weight:600;letter-spacing:.5px;color:${isPast?"#16294d":"#93917e"};text-transform:uppercase;">${W.ph}</div>
          <div style="font-size:11px;color:#b6b4a4;margin-top:1px;">${weekRange(w)} · ${isPast?dn+"/"+pl+" Läufe · ":""}LR ${W.lr} km</div></div>
          <div style="margin-left:auto;display:flex;align-items:center;gap:9px;"><span style="font-family:var(--display);font-size:13px;font-weight:600;color:${pctCol};">${isPast?pct+"%":W.km+" km"}</span>${chev}</div>
        </div>
        ${open?`<div style="background:#ffffff;border:1px solid #e8e1d2;border-radius:14px;padding:6px 16px 14px;margin:10px 0;">${dayList(w,false)}${actPanelLine(w)}</div>`:""}</div>`;
    }
  }

  setTimeout(()=>{
    const el=document.getElementById("wk"+curW); if(el && !viewWoche._scrolled){ el.scrollIntoView({block:"center"}); viewWoche._scrolled=true; }
  },40);

  const doneWeeks=curW-1;
  return `<div class="wrap">
    <div class="ln-title"><b>Wochen</b><span class="ln-line"></span></div>
    <div style="font-size:12px;font-weight:600;color:#93917e;margin-bottom:14px;">21 RUNDEN · ${doneWeeks} GELAUFEN · ${raceCity().toUpperCase()} ${String(raceDate().getDate()).padStart(2,"0")}.${String(raceDate().getMonth()+1).padStart(2,"0")}.</div>
    ${rows}
  </div>`;
}

/* ============ VIEW: TRACK ============ */
function viewTrack(){
  const loc=locate(today()), cur=loc.week||1;
  let open=[];
  for(let w=1; w<=Math.min(21,cur); w++){
    RUNS.forEach(R=>{
      if(runIsRest(w,R.slot))return;
      const dt=dateOf(w,effDay(w,R.slot)); if(dt>today())return;
      const id=runId(w,R.slot), L=DB.logs[id];
      if(!L && !isSkipped(id)) open.push({w,slot:R.slot,dt,c:runContent(w,R.slot)});

  open.sort((a,b)=>b.dt-a.dt);

/* ============ GYM / KRAFTTRAINING ============ */
const GYM_DAYS=["push","pull","legs"];
function gymDB(){
  if(!DB.gym) DB.gym={templates:JSON.parse(JSON.stringify(DEFAULT_GYM)), sessions:[]};
  if(!DB.gym.templates) DB.gym.templates=JSON.parse(JSON.stringify(DEFAULT_GYM));
  if(!DB.gym.sessions) DB.gym.sessions=[];
  return DB.gym;
}
function gymTpl(day){ const t=gymDB().templates[day]; return t||DEFAULT_GYM[day]; }
function gymSessions(){ return gymDB().sessions; }
function gymSession(id){ return gymSessions().find(s=>s.id===id); }
function gymLast(day, exceptId){
  return gymSessions().filter(s=>s.day===day && s.id!==exceptId)
    .sort((a,b)=>String(b.date).localeCompare(String(a.date)))[0]||null;
}
// Sätze einer Übung aus der letzten früheren Einheit desselben Tages (Vorwochen-Referenz)
function gymPrevEx(day, exName, exceptId){
  const list=gymSessions().filter(s=>s.day===day && s.id!==exceptId).sort((a,b)=>String(b.date).localeCompare(String(a.date)));
  for(const s of list){ const e=(s.ex||[]).find(x=>x.name===exName); if(e&&e.sets&&e.sets.length) return e.sets; }
  return null;
}
function gymNewSession(day){
  const tpl=gymTpl(day);
  const ex=(tpl.ex||[]).map(t=>{
    const prev=gymPrevEx(day, t.name);
    const n=t.sets||3, sets=[];
    for(let i=0;i<n;i++){ const p=prev&&prev[i]; sets.push({kg:p?p.kg:null, reps:p?p.reps:null, done:false}); }
    return {name:t.name, target:t.reps||"", sets};
  });
  return {id:"G"+Date.now()+Math.random().toString(36).slice(2,5), date:dkey(today()),
    w:(locate(today()).week||0), day, label:tpl.label, ex, note:""};
}
function startGym(day){
  const td=dkey(today());
  let s=gymSessions().find(x=>x.day===day && x.date===td);  // heutige Einheit fortsetzen
  if(!s){ s=gymNewSession(day); gymSessions().push(s); save(); }
  buildGymView(s.id);
}
function gymBodyHtml(s){
  const meta=(s.hr||s.kcal)?`<div style="border:1px solid var(--line);border-radius:14px;padding:11px 13px;margin-bottom:14px;background:var(--card2)">
    <div style="display:flex;align-items:center;gap:7px;font-size:.8rem;color:var(--mut);margin-bottom:3px">${ic("heart",14)} Aus Strava verknüpft</div>
    <div style="font-size:.9rem">${s.sec?hms(s.sec):""}${s.hr?(s.sec?" · ":"")+s.hr+" bpm Ø":""}${s.maxHr?" · max "+s.maxHr:""}${s.kcal?" · "+s.kcal+" kcal":""}</div></div>`:"";
  const body=s.ex.map((e,exi)=>{
    const prev=gymPrevEx(s.day, e.name, s.id);
    const rows=e.sets.map((set,si)=>{
      const p=prev&&prev[si];
      const hint=p&&(p.kg||p.reps)?`${p.kg??"–"}×${p.reps??"–"}`:"–";
      return `<div class="gset ${set.done?'done':''}">
        <span class="gsi">${si+1}</span>
        <input type="number" inputmode="decimal" step="0.5" value="${set.kg??""}" placeholder="kg" onchange="gymSet('${s.id}',${exi},${si},'kg',this.value)">
        <span class="gx">×</span>
        <input type="number" inputmode="numeric" value="${set.reps??""}" placeholder="Wdh" onchange="gymSet('${s.id}',${exi},${si},'reps',this.value)">
        <span class="gprev" title="letztes Mal">${hint}</span>
        <button class="gdone ${set.done?'on':''}" onclick="gymToggle('${s.id}',${exi},${si})" aria-label="Satz erledigt">${set.done?ic("check-circle",18):"○"}</button>
        <button class="gdel" onclick="gymDelSet('${s.id}',${exi},${si})" aria-label="Satz löschen">×</button>
      </div>`;
    }).join("");
    const n=s.ex.length;
    return `<div class="gex">
      <div class="gex-h"><b>${e.name}</b><div style="display:flex;align-items:center;gap:6px">${e.target?`<span class="tiny muted" style="margin-right:4px">Ziel ${e.target}</span>`:""}
        <button class="gex-mv" ${exi===0?"disabled":""} onclick="gymMoveEx('${s.id}',${exi},-1)" aria-label="nach oben">↑</button>
        <button class="gex-mv" ${exi===n-1?"disabled":""} onclick="gymMoveEx('${s.id}',${exi},1)" aria-label="nach unten">↓</button>
        <button class="gex-del" onclick="gymDelEx('${s.id}',${exi})" aria-label="Übung entfernen">×</button></div></div>
      ${rows}
      <button class="gaddset" onclick="gymAddSet('${s.id}',${exi})">+ Satz</button>
    </div>`;
  }).join("");
  return meta+body+`<button class="btn-sm" style="width:100%;margin:2px 0 4px" onclick="gymAddEx('${s.id}')">+ Übung hinzufügen</button>`;
}
function buildGymView(id){
  const s=gymSession(id); if(!s) return;

  lockBody();
  const root=document.getElementById("gymRoot");
  root.innerHTML=`<div class="cv" id="gymWin">
    <div class="cv-head">
      <button class="cv-back" onclick="closeGym()" aria-label="Zurück (pausieren)">‹</button>
      <div class="cv-av">${ic("dumbbell",19)}</div>
      <div class="cv-ti"><b>${s.label.split("·")[0].trim()}</b><span style="color:var(--mut)">${fmtD(new Date(s.date+"T00:00:00"))} · live</span></div>
      <button class="cv-back" style="font-size:1.4rem" onclick="gymMinimize()" aria-label="Verkleinern (in der App nachschauen)">▾</button>
    </div>

    <div class="cv-foot">
      <button class="btn-gh" style="flex:0 0 auto" onclick="gymCancel('${s.id}')">Abbrechen</button>
      <button class="btn-p" style="flex:1" onclick="gymFinish('${s.id}')">Training beenden</button>
    </div>
  </div>`;

}
function gymRefresh(id){ const s=gymSession(id), b=document.getElementById("gymBody"); if(s&&b) b.innerHTML=gymBodyHtml(s); }
function gymIsEmpty(s){ return s && !s.stravaId && !s.counted && !s.ex.some(e=>e.sets.some(x=>x.kg||x.reps||x.done)); }
// Verkleinern: Overlay weg, kleine schwebende Pille bleibt — App ist nutzbar, Training läuft weiter
function gymMinimize(){
  const id=window._gymOpen; if(!id){ closeGym(); return; }
  const s=gymSession(id);
  const w=document.getElementById("gymWin"); if(w) w.classList.remove("show"); unlockBody();
  setTimeout(()=>{
    const r=document.getElementById("gymRoot");
    if(r) r.innerHTML=`<button class="gym-mini" onclick="buildGymView('${id}')" aria-label="Training fortsetzen">
      ${ic("dumbbell",16)}<span>${s?s.label.split("·")[0].trim():"Training"} läuft</span><b>fortsetzen</b></button>`;
  },280);
  render();
}
function closeGym(){
  // Versehentlich geöffnete, komplett leere Einheit nicht als Müll behalten
  const id=window._gymOpen; window._gymOpen=null;
  const s=id&&gymSession(id);
  if(s && gymIsEmpty(s)){ gymDB().sessions=gymSessions().filter(x=>x.id!==id); save(); }
  const w=document.getElementById("gymWin"); if(w) w.classList.remove("show"); unlockBody();
  setTimeout(()=>{ const r=document.getElementById("gymRoot"); if(r) r.innerHTML=""; },280); render();
}
function gymCancel(id){
  const s=gymSession(id);
  if(s && !gymIsEmpty(s) && !confirm("Dieses Training verwerfen? Eingetragene Sätze gehen verloren.")) return;
  if(s){
    if(s.counted){ const tpl=gymTpl(s.day); if(tpl&&tpl.actId) actInc(s.w,tpl.actId,-1); }
    gymDB().sessions=gymSessions().filter(x=>x.id!==id); save();
  }
  window._gymOpen=null; closeGym(); toast("Verworfen");
}
function gymSet(id,exi,si,field,val){
  const s=gymSession(id); if(!s) return;
  const set=s.ex[exi].sets[si]; if(!set) return;
  set[field]= val===""?null:(field==="reps"?parseInt(val,10):parseFloat(val));
  save();  // kein Re-Render — Tastatur-Fokus bleibt erhalten
}
function gymToggle(id,exi,si){ const s=gymSession(id); if(!s)return; const set=s.ex[exi].sets[si]; set.done=!set.done; save(); gymRefresh(id); }
function gymAddSet(id,exi){ const s=gymSession(id); if(!s)return; const sets=s.ex[exi].sets, last=sets[sets.length-1]; sets.push({kg:last?last.kg:null, reps:last?last.reps:null, done:false}); save(); gymRefresh(id); }
function gymDelSet(id,exi,si){ const s=gymSession(id); if(!s)return; s.ex[exi].sets.splice(si,1); save(); gymRefresh(id); }
function gymDelEx(id,exi){ const s=gymSession(id); if(!s)return; if(!confirm("Übung „"+s.ex[exi].name+"\" aus dieser Einheit entfernen?"))return; s.ex.splice(exi,1); save(); gymRefresh(id); }
function gymMoveEx(id,exi,dir){ const s=gymSession(id); if(!s)return; const j=exi+dir; if(j<0||j>=s.ex.length)return; const a=s.ex; [a[exi],a[j]]=[a[j],a[exi]]; save(); gymRefresh(id); }
function gymAddEx(id){ const s=gymSession(id); if(!s)return; const name=prompt("Name der Übung:"); if(!name)return; s.ex.push({name:name.trim(), target:"", sets:[{kg:null,reps:null,done:false}]}); save(); gymRefresh(id); }
function gymFinish(id){
  const s=gymSession(id); if(!s) return;
  const tpl=gymTpl(s.day);
  if(tpl&&tpl.actId&&!s.counted){ s.counted=true; actInc(s.w, tpl.actId, 1); }  // actInc speichert
  save(); closeGym(); toast("Training gespeichert ✓");
}
function delGymSession(id){
  const s=gymSession(id); if(!s) return;
  if(!confirm("Krafttraining vom "+s.date+" löschen?")) return;
  const tpl=gymTpl(s.day);
  if(s.counted && tpl&&tpl.actId) actInc(s.w, tpl.actId, -1);
  gymDB().sessions=gymSessions().filter(x=>x.id!==id);
  save(); render(); toast("Gelöscht");
}

function gymTplSet(day,i,field,val){

// Marathon-Äquivalent pro Lauf via Riegel — ABER nur aus renn-repräsentativen
// Einheiten: harte Quality-Efforts (bester 5k) und lange Läufe. Easy-/Recovery-
// Läufe sind sub-maximal; ihr Riegel-Wert ist sinnlos langsam und wird ignoriert,
// damit ein einzelner lockerer Lauf die Vorhersage nicht verzerrt.
function predictionSeries(runs){
  const out=[];
  runs.forEach(r=>{
    let dist=null,t=null,src=null,rel=1;
    // Verlässlichkeit FÜR DEN MARATHON: Long Runs am höchsten (Ausdauer = der
    // limitierende Faktor), 5k-Efforts am niedrigsten (zeigen Speed, überschätzen
    // den Marathon per Riegel deutlich). So bleibt die Prognose ehrlich/konservativ.
    if(r.kind==="quality" && r.details?.best5k?.sec){ dist=5; t=r.details.best5k.sec; src="5k-Effort"; rel=.6; }
    else if(r.kind==="quality" && r.dist>=5){ dist=r.dist; t=r.sec; src="Tempo"; rel=.9; }
    else if(r.kind==="long" && r.dist>=15){ dist=r.dist; t=r.sec; src="Long Run"; rel=1.6; }
    else return; // easy/recovery & kurze Läufe ignorieren
    out.push({ date:r.date, dist, pred: t*Math.pow(42.195/dist,1.06), src, rel });
  });
  return out;
}
// Ehrlicher Schätzwert: verlässlichkeits- und recency-gewichteter Schnitt ALLER
// renn-tauglichen Efforts im 6-Wochen-Fenster (Long Runs dominieren). Kein Rosinen-
// picken der schnellsten Werte mehr → die Endurance-Realität der Long Runs verankert
// die Zahl. Stabil: lockere Läufe sind ausgeschlossen, ein Einzel-Lauf bewegt nur graduell.
function marathonEstimate(series, asOf){
  if(!series||!series.length) return null;
  const now=asOf||today();
  const ageD=s=>(now-s.date)/86400000;
  let win=series.filter(s=>ageD(s)>=0 && ageD(s)<=42);
  if(win.length<3) win=series.filter(s=>ageD(s)>=0).slice(-6);
  if(!win.length) return null;
  let wsum=0,psum=0;
  win.forEach(s=>{ const w=s.rel*Math.pow(0.5, ageD(s)/28); wsum+=w; psum+=s.pred*w; });
  return wsum? psum/wsum : null;
}
function cardPrognose(runs){
  const series=predictionSeries(runs);
  const pred=marathonEstimate(series);
  if(!pred) return `<div class="card"><h2>Marathon-Vorhersage</h2><div class="sub">Noch keine renn-tauglichen Einheiten erfasst. Die Vorhersage entsteht aus <b>Quality-Läufen</b> (harte Intervalle/Tempo) und <b>Long Runs ≥ 15 km</b> — lockere Dauerläufe fließen bewusst nicht ein.</div></div>`;
  const diff=pred-GOAL_SEC, onTrack=diff<=0;
  // Trend: aktueller Schätzwert vs. Stand vor 21 Tagen (stabil, nicht pro Einzel-Lauf)
  let deltaHtml='<span class="tiny muted">—</span>';
  const prev=marathonEstimate(series, new Date(today()-21*86400000));
  if(prev){
    const d=Math.round(pred-prev), better=d<0;
    if(Math.abs(d)>=5) deltaHtml=`<div style="display:inline-flex;align-items:center;gap:5px;background:${better?'rgba(57,182,122,.15)':'rgba(224,168,59,.15)'};color:${better?'var(--good)':'var(--warn)'};padding:5px 12px;border-radius:8px;font-weight:800;font-size:.95rem">
      ${better?"▼":"▲"} ${hms(Math.abs(d))}</div>`;
    else deltaHtml=`<span class="tiny muted">stabil</span>`;
  }
  // Sparkline: gleitender Schätzwert über die Zeit (glatt) statt roher Einzelwerte
  let spark="";
  const dates=[...new Set(series.map(s=>+s.date))].sort((a,b)=>a-b);
  const pts=dates.map(t=>({t, v:marathonEstimate(series, new Date(t))})).filter(p=>p.v);
  if(pts.length>=2){
    const W=340,H=90,p=8;
    const vals=pts.map(p=>p.v);
    const mn=Math.min(...vals,GOAL_SEC)-180, mx=Math.max(...vals,GOAL_SEC)+180, rg=mx-mn||1;
    const X=i=>p+i*((W-2*p)/(pts.length-1));
    const Yi=v=>p+((v-mn)/rg)*(H-2*p);
    const line=vals.map((v,i)=>(i?"L":"M")+X(i).toFixed(1)+" "+Yi(v).toFixed(1)).join(" ");
    const area=line+` L${X(pts.length-1).toFixed(1)} ${H-p} L${X(0).toFixed(1)} ${H-p} Z`;
    const gy=Yi(GOAL_SEC), gid="sp"+(window._gid=(window._gid||0)+1);
    spark=`<svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="margin:10px 0 4px">
      <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--accent)" stop-opacity="0.32"/><stop offset="1" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs>
      <line x1="0" y1="${gy.toFixed(1)}" x2="${W}" y2="${gy.toFixed(1)}" stroke="var(--good)" stroke-width="1.2" stroke-dasharray="5 4"/>
      <text x="${W-4}" y="${(gy-4).toFixed(1)}" font-size="9" fill="var(--good)" text-anchor="end">Ziel 4:00</text>
      <path d="${area}" fill="url(#${gid})"/>
      <path d="${line}" fill="none" stroke="var(--accent)" stroke-width="2.4" stroke-linejoin="round"/>
      ${vals.map((v,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Yi(v).toFixed(1)}" r="3" fill="var(--accent)"/>`).join("")}
    </svg>`;
  }
  const winN=series.filter(s=>(today()-s.date)/86400000<=42).length;
  const lq=[...series].reverse().find(s=>s.src.includes("5k")||s.src==="Tempo");
  const ll=[...series].reverse().find(s=>s.src==="Long Run");
  return `<div class="card"><h2>Marathon-Vorhersage</h2>
    <div style="display:flex;align-items:center;gap:16px;margin:10px 0 4px">
      <div style="width:62px;height:62px;border:3px solid var(--accent);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex:0 0 auto">
        <b style="font-size:.95rem;color:var(--accent)">42,2</b><span class="tiny" style="color:var(--accent);font-weight:700">KM</span></div>
      <div style="flex:1">
        <div class="tiny muted">Zeit</div>
        <b style="font-size:1.7rem;letter-spacing:-.5px">${hms(Math.round(pred))}</b>
        <div class="tiny" style="color:${onTrack?'var(--good)':'var(--warn)'};font-weight:700;margin-top:2px">${onTrack?hms(Math.round(-diff))+" unter Ziel ✓":hms(Math.round(diff))+" über Ziel"}</div>
      </div>
      <div style="flex:0 0 auto"><div class="tiny muted" style="text-align:right;margin-bottom:3px">Trend 3 Wo</div>${deltaHtml}</div>
    </div>
    ${spark}
    ${intelBox(onTrack
      ? `Gewichteter Schnitt deiner renn-tauglichen Efforts der letzten 6 Wochen (Riegel-Formel) — <b>Long Runs zählen am stärksten</b>, weil Ausdauer den Marathon limitiert; reine 5k-Speed-Efforts werden bewusst niedrig gewichtet (sie überschätzen sonst). Bewusst konservativ und endurance-verankert. Sinkt weiter mit längeren/schnelleren Long Runs und MP-Blöcken.`
      : `Schätzwert ${hms(Math.round(diff))} über Ziel. In der Base-Phase normal: er ist endurance-verankert (Long Runs dominieren) und sinkt mit Long-Run-Volumen und MP-Blöcken. Reine 5k-Speed zählt bewusst wenig — sonst wäre die Zahl zu optimistisch.`)}
    <div class="tiny muted">Basis: ${winN} Effort${winN===1?"":"s"} in 6 Wochen${lq?` · Tempo zuletzt ${fmtD(lq.date)}`:""}${ll?` · Long Run zuletzt ${ll.dist} km`:""}</div>
  </div>`;
}

/* ============ GARMIN RECOVERY (Schlaf/HRV via Wellness-Gist) ============ */
function garminCfg(){ if(!DB.garmin) DB.garmin={}; return DB.garmin; }
async function fetchWellness(){
  const c=garminCfg();
  if(!c.gistId || !CLOUD.token) return;
  try{
    const r=await fetch("https://api.github.com/gists/"+c.gistId,{headers:{Authorization:"token "+CLOUD.token,Accept:"application/vnd.github+json"}});
    if(!r.ok) return;
    const g=await r.json();
    const f=g.files&&g.files["garmin-wellness.json"];
    if(!f) return;
    const data=JSON.parse(f.content);
    DB.wellness=data; c.lastFetch=Date.now(); save(); render();
  }catch(e){ console.warn("wellness fetch", e.message); }
}
function latestWellness(){
  const w=DB.wellness; if(!w||!w.days) return null;
  // jüngster Tag mit Schlaf- oder HRV-Daten
  for(const d of w.days){ if(d.sleepSeconds||d.hrvLastNight||d.restingHr) return d; }
  return null;
}
function fmtH(sec){ if(!sec) return "–"; const h=Math.floor(sec/3600), m=Math.round((sec%3600)/60); return h+"h"+String(m).padStart(2,"0"); }
function hrvTrend(){
  const w=DB.wellness; if(!w||!w.days) return null;
  const vals=w.days.map(d=>d.hrvLastNight).filter(v=>v);
  if(vals.length<3) return null;
  const recent=vals.slice(0,3).reduce((a,b)=>a+b,0)/3;
  const base=vals.slice(0,7).reduce((a,b)=>a+b,0)/Math.min(7,vals.length);
  return {recent:Math.round(recent), base:Math.round(base), diff:recent-base};
}
// Composite-Recovery 0–100 aus Schlaf-Score, HRV (Lage im Balanced-Bereich bzw. vs.
// Wochenschnitt) und Body Battery — WHOOP-Logik nachempfunden.
function recoveryScore(d){
  if(!d) return null;
  const cl=(v,a,b)=>Math.max(a,Math.min(b,v));
  const parts=[];
  if(d.sleepScore) parts.push([d.sleepScore,1]);
  if(d.hrvLastNight){
    let hv;
    if(d.hrvBalancedLow && d.hrvBalancedHigh && d.hrvBalancedHigh>d.hrvBalancedLow){
      const f=(d.hrvLastNight-d.hrvBalancedLow)/(d.hrvBalancedHigh-d.hrvBalancedLow);
      hv=cl(45+f*48,10,100);
    } else if(d.hrvWeeklyAvg){ hv=cl(65+(d.hrvLastNight-d.hrvWeeklyAvg)/d.hrvWeeklyAvg*120,10,100); }
    else hv=65;
    parts.push([hv,1.3]);
  }
  if(d.bodyBatteryLast!=null) parts.push([d.bodyBatteryLast,0.7]);
  if(!parts.length) return null;
  const w=parts.reduce((a,p)=>a+p[1],0);
  return Math.round(parts.reduce((a,p)=>a+p[0]*p[1],0)/w);
}
function recoveryColor(s){ return s==null?"var(--mut)":s>=67?"var(--good)":s>=34?"var(--gold)":"var(--bad)"; }
function recoveryLabel(s){ return s==null?"—":s>=67?"Erholt":s>=34?"Moderat":"Beansprucht"; }
// Farbcodierter Ring (WHOOP-Signatur), wiederverwendbar
function scoreRing(score,col,sub){
  const r=46, circ=2*Math.PI*r, off=circ*(1-(score||0)/100), gid="rg"+Math.round((score||0)*7+(sub?sub.length:0));
  return `<div class="ring-wrap hero-ring" style="filter:drop-shadow(0 0 14px ${col==='var(--mut)'?'transparent':col});opacity:${col==='var(--mut)'?.6:1}">
    <svg viewBox="0 0 110 110">
      <circle cx="55" cy="55" r="${r}" fill="none" stroke="rgba(40,30,20,.1)" stroke-width="9"/>
      <circle cx="55" cy="55" r="${r}" fill="none" stroke="${col}" stroke-width="9" stroke-linecap="round"
        stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/>
    </svg>
    <div class="rv"><b style="color:${col}">${score==null?"–":score}<span style="font-size:.9rem;font-weight:700">${score==null?"":"%"}</span></b><span>${sub||"Recovery"}</span></div>
  </div>`;
}
function cardRecovery(){
  const url=(garminCfg().gistId&&CLOUD.token);

      </div>
    </div>
    <div class="grid2" style="margin-top:18px">

      <div class="stat"><div class="v">${d.hrvLastNight||"–"}<span class="tiny"> ms</span></div><div class="l">HRV${hv?` · ${hv.diff>=0?"+":""}${Math.round(hv.diff)} vs Ø`:""}</div></div>
      <div class="stat"><div class="v">${d.restingHr||"–"}<span class="tiny"> bpm</span></div><div class="l">Ruhepuls</div></div>

    </div>

}
function recoveryInsight(d,hv){
  const msgs=[];
  if(d.sleepSeconds && d.sleepSeconds<6.5*3600) msgs.push("Wenig Schlaf — heute eher locker, Regeneration priorisieren.");
  if(hv && hv.diff < -5) msgs.push("HRV unter deinem Schnitt — erhöhte Belastung/Stress, harte Einheit ggf. verschieben.");
  if(d.sleepScore && d.sleepScore>=85 && (!hv||hv.diff>=0)) msgs.push("Gut erholt — grünes Licht für Qualität/Long Run.");
  if(!msgs.length) return "";
  return intelBox(msgs.join(" "));
}

/* ============ KALORIENVERBRAUCH (TDEE aus Garmin) ============ */
function calorieStats(){
  const w=DB.wellness; if(!w||!w.days) return null;
  const all=w.days.filter(d=>d.totalKcal);
  if(!all.length) return null;
  const todayStr=new Date().toISOString().slice(0,10);
  const today=all[0];
  // Laufenden Tag aus den Durchschnitten ausschließen — sein Verbrauch ist erst
  // teilweise gezählt und würde den TDEE-Schnitt sonst nach unten verzerren.
  const full=all.filter(d=>d.date!==todayStr);
  const base=full.length?full:all;
  const lastFull=full[0]||all[0];   // jüngster vollständiger Tag für die Aufschlüsselung
  const avg=Math.round(base.reduce((a,d)=>a+d.totalKcal,0)/base.length);
  const bmrDays=base.filter(d=>d.bmrKcal);
  const avgBmr=bmrDays.length?Math.round(bmrDays.reduce((a,d)=>a+d.bmrKcal,0)/bmrDays.length):null;
  const stepDays=base.filter(d=>d.steps);
  const avgSteps=stepDays.length?Math.round(stepDays.reduce((a,d)=>a+d.steps,0)/stepDays.length):null;
  return {avg, today, lastFull, todayStr, avgBmr, avgSteps, n:base.length};
}
function bodyWeightKg(){ const ws=[...(DB.weights||[])].sort((a,b)=>new Date(b.d)-new Date(a.d)); return ws[0]?ws[0].kg:85; }
// Heute LIVE: voller Tages-Grundumsatz + heute erfasste Aktivitäten (echte Strava-kcal
// bevorzugt, sonst geschätzt). Nötig, weil der Garmin-Tagestotal erst beim Morgen-Sync
// kommt und den heutigen Lauf/das Studio noch nicht enthält.
function todayBurn(){
  const cs=calorieStats();
  const bmrFull = (cs&&cs.avgBmr) || (cs&&cs.lastFull&&cs.lastFull.bmrKcal) || 1900;
  const td=dkey(today()), w=bodyWeightKg(), items=[];
  runLogs().forEach(r=>{ if(dkey(r.date)!==td) return; const k=r.kcal||Math.round(r.dist*w*1.036); items.push({label:"Lauf "+r.dist+" km", k}); });
  (DB.rides||[]).forEach(r=>{ if(r.date!==td) return; const k=r.kcal||Math.round((r.sec/60)*8); items.push({label:"Rad "+r.dist+" km", k}); });
  gymSessions().forEach(s=>{ if(s.date!==td) return; const k=s.kcal||(s.sec?Math.round(s.sec/60*6):300); items.push({label:s.label.split("·")[0].trim(), k}); });
  (DB.workouts||[]).forEach(x=>{ if(x.date!==td) return; const k=x.kcal||(x.sec?Math.round(x.sec/60*6):0); if(k) items.push({label:x.label||x.type, k}); });
  const active=items.reduce((a,i)=>a+i.k,0);
  return {bmr:Math.round(bmrFull), active, total:Math.round(bmrFull)+active, items};
}

/* ============ KRAFTTRAINING-ANALYSE ============ */
function sessVolume(s){ return s.ex.reduce((v,e)=>v+e.sets.reduce((vv,x)=>vv+((+x.kg||0)*(+x.reps||0)),0),0); }
function strengthStats(){
  const sessions=[...gymSessions()].filter(s=>s.ex&&s.ex.length).sort((a,b)=>String(a.date).localeCompare(String(b.date)));
  if(!sessions.length) return null;
  const now=today();
  const ageD=s=>(now-new Date(s.date+"T00:00:00"))/86400000;
  const recent=sessions.filter(s=>ageD(s)<=42);
  const totalVol=recent.reduce((a,s)=>a+sessVolume(s),0);
  // Pro Übung: Top-Satz-Verlauf
  const byEx={};
  sessions.forEach(s=>s.ex.forEach(e=>{
    const top=e.sets.reduce((m,x)=>(+x.kg||0)>(m?+m.kg||0:0)?x:m,null);
    if(top&&top.kg) (byEx[e.name]=byEx[e.name]||[]).push({date:s.date, kg:+top.kg, reps:+top.reps||0});
  }));
  const lifts=Object.entries(byEx).map(([name,arr])=>{
    arr.sort((a,b)=>String(a.date).localeCompare(String(b.date)));
    const best=arr.reduce((m,x)=>x.kg>m.kg?x:m,arr[0]);
    return {name, last:arr[arr.length-1], best, delta:arr[arr.length-1].kg-arr[0].kg, n:arr.length};
  }).sort((a,b)=>b.n-a.n||b.last.kg-a.last.kg);
  return {sessions, recent, totalVol, lifts, n:recent.length};
}

/* ============ RED FLAGS ============ */
function computeFlags(){
  const F=[], runs=runLogs();
  const easy=runs.filter(r=>r.kind==="easy"&&r.hr);
  if(easy.length>=4){ const b=easy.slice(0,3).reduce((a,c)=>a+c.hr,0)/3, rec=easy.slice(-2).reduce((a,c)=>a+c.hr,0)/2;
    if(rec>b+5) F.push(["b","HF im lockeren DL erhöht",`Ø zuletzt ${Math.round(rec)} vs. Baseline ${Math.round(b)} bpm. Mehr Schlaf, evtl. Defizit pausieren.`]); }
  const lo=runs.filter(r=>r.kind==="long");
  if(lo.length>=2 && lo.slice(-2).filter(r=>r.rpe&&r.rpe>=8).length>=2)
    F.push(["w","Long Runs zwei Wochen zäh","RPE ≥ 8 in beiden letzten Long Runs. Pace 10s/km drosseln, ggf. Defizit raus."]);
  const loc=locate(today());
  if(loc.week) for(let w=2;w<loc.week;w++){ const id=runId(w,"so"); if(!DB.logs[id]&&!DB.skips[id]){
    F.push(["w","Long Run W"+w+" nicht erfasst","Wichtigste Einheit der Woche fehlt. Nachtragen oder bewusst überspringen."]); break; } }
  if(runs.some(r=>r.pain)) F.push(["b","Schmerz markiert","Bei einer Einheit Schmerz vermerkt. >2 Tage anhaltend → Pause, nicht durchbeißen."]);
  if(!F.length) F.push(["ok","Keine Red Flags","Alles im grünen Bereich — Plan halten."]);
  return F;
}
function redFlagsBlock(compact){
  const F=computeFlags();
  if(compact && F.length===1 && F[0][0]==="ok") return "";
  return `<h2 style="margin-top:18px">Red Flags</h2>${F.map(f=>`<div class="flag ${f[0]}">
    <span class="fi">${ic(f[0]==='ok'?'check-circle':f[0]==='w'?'alert-triangle':'alert-octagon',18)}</span><div><b>${f[1]}</b>${f[2]}</div></div>`).join("")}`;
}

    const stCol = syncState==='ok'?'var(--good)':syncState==='err'?'var(--bad)':syncState==='syncing'?'var(--blue)':'var(--mut)';
    const stTxt = syncState==='ok'?'✓ synchronisiert':syncState==='syncing'?'⟳ syncing…':syncState==='err'?'⚠ Fehler':'…';
    return `<div class="card"><h2>Cloud-Sync</h2>
      <div class="between"><span class="sub">Status</span><b style="color:${stCol}">${stTxt}</b></div>
      ${ago!=null?`<div class="between" style="margin-top:6px"><span class="sub">Letzte Sync</span><span class="tiny">vor ${ago} min</span></div>`:""}
      ${syncMsg&&syncState==='err'?`<div class="tiny" style="color:var(--bad);margin-top:6px">${syncMsg}</div>`:""}
      <div class="between" style="margin-top:6px"><span class="sub">Gist</span>
        <a class="lnk tiny" href="https://gist.github.com/${CLOUD.gistId}" target="_blank">${CLOUD.gistId.slice(0,12)}…</a></div>
      ${CLOUD.user?`<div class="between"><span class="sub">Account</span><span class="tiny">${CLOUD.user}</span></div>`:""}
      <div class="acts" style="margin-top:14px">
        <button class="btn-sm btn-p" onclick="cloudPull()">Sync jetzt</button>
        <button class="btn-sm btn-gh" onclick="cloudDisconnect()">Trennen</button></div>
      <div class="tiny muted" style="margin-top:10px">Auf einem neuen Gerät: gleichen Token + diese Gist-ID eintragen → Daten erscheinen automatisch.</div>
    </div>`;
  }
  return `<div class="card"><h2>Cloud-Sync einrichten</h2>
    <p class="sub" style="margin-bottom:10px">Auto-Sync deiner Daten über einen <b>privaten</b> GitHub-Gist (nur du siehst ihn). Funktioniert auf allen Geräten. Daten landen weder in deinem Marathon-Repo noch öffentlich — eigener privater Gist.</p>
    <ol class="sub" style="margin-left:18px;margin-bottom:12px;line-height:1.7">
      <li>Token erstellen: <a class="lnk" href="https://github.com/settings/tokens/new?scopes=gist&description=Marathon%20Sync" target="_blank">github.com/settings/tokens/new</a><br><span class="tiny muted">Scope „gist" ist vorausgewählt — bitte <b>nur</b> diesen einen. Expiration: „No expiration" oder lang.</span></li>
      <li>Generate token → kopieren (<code>ghp_…</code> oder <code>github_pat_…</code>)</li>
      <li>Hier einfügen → „Sync einrichten"</li></ol>
    <label>Personal Access Token (Scope: gist)</label>
    <input id="c_tok" type="password" placeholder="ghp_… oder github_pat_…" autocomplete="off">
    <label>Vorhandene Gist-ID <span class="muted tiny">(leer = neuen Gist anlegen)</span></label>
    <input id="c_gid" type="text" placeholder="leer lassen beim ersten Gerät" autocomplete="off">
    <div class="acts" style="margin-top:14px"><button class="btn-p" style="flex:1" onclick="doCloudSetup()">Sync einrichten</button></div>
    <div class="tiny muted" style="margin-top:12px">Achtung: Der Token liegt lokal im Browser dieses Geräts. Wenn das Gerät verloren geht, Token auf github.com widerrufen.</div>
  </div>`;
}

      <li>Müde trotz HF &lt;150 → Plan halten, mehr Schlaf</li>

    <details><summary>Wettkampf-Strategie München 11.10.</summary><div class="dc">

/* ============ MODALS ============ */
let _scrollY=0;
function lockBody(){
  if(document.body.classList.contains("locked")) return;
  _scrollY = window.scrollY || document.documentElement.scrollTop || 0;
  document.body.style.top = "-"+_scrollY+"px";
  document.body.classList.add("locked");
}
function unlockBody(){
  if(!document.body.classList.contains("locked")) return;
  document.body.classList.remove("locked");
  document.body.style.top = "";
  window.scrollTo(0, _scrollY);
}
function closeModal(){ document.getElementById("modalRoot").innerHTML=""; unlockBody(); }
function openSettings(){ go('mehr'); setTimeout(()=>{ const d=document.getElementById('mehrSettings'); if(d){ d.open=true; d.scrollIntoView({block:'start',behavior:'smooth'}); } },60); }
function hasRaceOverride(){ const c=DB.cfg; return !!(c && (c.raceDate||c.planStart||c.raceCity||c.goalSec)); }
function resetRaceConfig(){
  if(!hasRaceOverride()){ toast("Schon im Original"); return; }
  if(!confirm("Eckdaten auf den Original-Plan zurücksetzen (München · 11.10.2026 · Sub 4:00)? Deine eingetragenen/absolvierten Läufe bleiben erhalten.")) return;
  DB.cfg={}; save(); render(); toast("Auf Original-Plan zurückgesetzt ✓");
}
function syncNow(btn){
  const tasks=[];
  try{ if(stravaConnected()) tasks.push(stravaFetchActivities()); }catch(e){}
  try{ if(garminCfg().gistId && CLOUD.token) tasks.push(fetchWellness()); }catch(e){}
  try{ if(CLOUD.token && CLOUD.gistId) tasks.push(cloudPull()); }catch(e){}
  if(!tasks.length){ toast("Verbinde Strava/Garmin zuerst unter „Mehr“."); return; }
  if(btn) btn.classList.add("spin");
  toast("Synchronisiere …");
  Promise.allSettled(tasks).then(()=>{ render(); toast("Sync aktualisiert ✓"); });
}
function sheet(h){
  lockBody();
  document.getElementById("modalRoot").innerHTML=`<div class="modal" onclick="if(event.target===this)closeModal()"><div class="sheet"><button class="sheet-close" onclick="closeModal()" aria-label="Schließen">×</button><div class="grab"></div>${h}</div></div>`;
  attachSheetGestures();
}
function attachSheetGestures(){
  const s=document.querySelector(".sheet"); if(!s) return;
  let startY=0, dy=0, dragging=false;
  const start=e=>{ if(s.scrollTop>2) return;
    const t=e.touches?e.touches[0]:e; startY=t.clientY; dy=0; dragging=true; s.style.transition="none"; };
  const move=e=>{ if(!dragging) return;
    const t=e.touches?e.touches[0]:e; const d=t.clientY-startY;
    if(d<0){ dy=0; s.style.transform=""; return; }
    dy=d; s.style.transform=`translateY(${d}px)`; };
  const end=()=>{ if(!dragging) return; dragging=false; s.style.transition="transform .22s ease-out";
    if(dy>110){ s.style.transform="translateY(100%)"; setTimeout(closeModal,220); }

/* ============ PER-RUN ANALYSE (Strava-Style) ============ */
function runVerdict(w,slot,L){
  const c=runContent(w,slot), R=RUNS.find(r=>r.slot===slot), kind=R.kind;
  const det=L.details, id=runId(w,slot);
  const pace=L.sec/L.dist;
  const KW={quality:"Tempo",easy:"GA1",recovery:"Recovery",long:"Long-Run"}, kw=KW[kind]||"Lauf";
  const hist=runLogs().filter(r=>r.id!==id && r.dist>0 && r.sec>0);
  const sameKind=hist.filter(r=>r.kind===kind);
  const lines=[];

  // ---- GPX/Stream-basiert (wenn vorhanden) ----
  if(det?.hr1 && det?.hr2){ const drift=driftFor(L);
    if(drift!=null){
      if(drift<3) lines.push("Sehr stabil aerob — kaum Decoupling über die Distanz.");
      else if(drift<6) lines.push(`Leichtes Decoupling (+${drift.toFixed(1)}%) — aerob solide im Rahmen.`);
      else lines.push(`Decoupling +${drift.toFixed(1)}% — die HF kroch hoch, aerobe Substanz noch ausbaufähig.`);
    }
  }
  if(det?.pace1 && det?.pace2){ const diff=det.pace2-det.pace1;
    if(Math.abs(diff)<8) lines.push("Gleichmäßig gepaced — erste und zweite Hälfte fast identisch.");
    else if(diff>0) lines.push(`Zweite Hälfte ${diff}s/km langsamer — der Start war einen Tick zu schnell.`);
    else lines.push(`Negativer Split: zweite Hälfte ${-diff}s/km schneller — sauber verteilt.`);
  }
  if(det?.zones){ const z=det.zones, tot=Object.values(z).reduce((a,b)=>a+(b||0),0);
    if(tot>0){ const easyP=(z.z1+z.z2)/tot*100, hardP=(z.z4+z.z5)/tot*100, grayP=z.z3/tot*100;
      if(kind==="easy"||kind==="long"||kind==="recovery"){
        if(easyP<70) lines.push(`Nur ${easyP.toFixed(0)}% in Z1+Z2 — für locker/Long Run zu intensiv.`);
        else lines.push(`${easyP.toFixed(0)}% sauber in Z1+Z2 — genau die richtige Intensität.`);
        if(grayP>25) lines.push(`${grayP.toFixed(0)}% in der Z3-Grauzone — bewusster im echten Z2 bleiben.`);
      }
      if(kind==="quality") lines.push(hardP<20?`Nur ${hardP.toFixed(0)}% in Z4+Z5 — der Quality-Reiz war eher mild.`:`${hardP.toFixed(0)}% in Z4+Z5 — knackiger Schwellen-/VO2-Reiz gesetzt.`);
    }
  }

  // ---- Daten-getrieben, auch ohne GPX ----
  if(sameKind.length>=2){
    const recent=sameKind.slice(-5), avg=recent.reduce((a,r)=>a+r.sec/r.dist,0)/recent.length, d=Math.round(pace-avg);
    if(d<=-4) lines.push(`${-d}s/km schneller als dein ${kw}-Schnitt der letzten ${recent.length} Läufe.`);
    else if(d>=4) lines.push(`${d}s/km langsamer als zuletzt — ${kind==="recovery"||kind==="easy"?"für locker okay":"war das bewusst ruhig?"}.`);
    else lines.push(`Tempo genau auf deinem aktuellen ${kw}-Niveau.`);
    const bestPace=Math.min(...sameKind.map(r=>r.sec/r.dist));
    if(pace<bestPace && L.dist>=3) lines.push(`Schnellster ${kw}-Lauf deiner erfassten Historie.`);
  } else {
    lines.push(`Erster erfasster ${kw}-Lauf — ab jetzt vergleicht der Coach jeden weiteren damit.`);
  }
  if(kind==="long"){ const maxPrev=Math.max(0,...hist.filter(r=>r.kind==="long").map(r=>r.dist));
    if(maxPrev && L.dist>maxPrev) lines.push(`Neue längste Distanz: ${L.dist} km (bisher ${maxPrev}).`);
  }

  const tp=parsePaceFromText(c.det);
  if(tp){ const d=Math.round(pace-tp);
    if(Math.abs(d)<=8) lines.push(`Pace im Plan-Soll (${paceFmt(tp)}/km ±8s).`);
    else if(d<0 && (kind==="easy"||kind==="long"||kind==="recovery")) lines.push(`${-d}s/km schneller als Soll — in der lockeren Zone bewusst rausnehmen.`);
    else if(d<0) lines.push(`${-d}s/km schneller als das Soll-Tempo durchgezogen.`);
    else lines.push(`${d}s/km über Soll — okay, solange die HF im Zielbereich blieb.`);
  }

  if(L.hr){ const withHr=sameKind.filter(r=>r.hr && r.dist>0);
    if(withHr.length>=2){ const eff=r=>(1000/(r.sec/r.dist))/r.hr, effNow=(1000/pace)/L.hr, effAvg=withHr.reduce((a,r)=>a+eff(r),0)/withHr.length;
      if(effNow>=effAvg*1.03) lines.push(`Bei Ø ${L.hr} bpm effizienter als zuletzt — gleiche HF, mehr Tempo.`);
      else if(effNow<=effAvg*0.96) lines.push(`Bei Ø ${L.hr} bpm teurer erkauft — Müdigkeit, Hitze oder harter Untergrund?`);
    }
  }

  const km=(c.det||"").match(/(\d+(?:[.,]\d+)?)\s*km/), planKm=km?parseFloat(km[1].replace(",",".")):null;
  if(planKm && Math.abs(L.dist-planKm)>1.5) lines.push(`${L.dist} km gelaufen, ${planKm} km geplant${L.dist>planKm?" — Bonus-Kilometer.":"."}`);
  if(L.elev && L.elev>=120) lines.push(`${L.elev} hm Anstieg — hügeliges Profil, das drückt die Pace.`);
  if(L.cadence && L.cadence>=170) lines.push(`Schrittfrequenz Ø ${L.cadence}/min — schön hoch, gut für die Laufökonomie.`);

  if(L.rpe!=null){
    if(L.rpe<=4 && kind==="quality") lines.push("RPE niedrig für Quality — beim nächsten Mal ruhig mehr riskieren.");
    if(L.rpe>=8 && kind!=="quality") lines.push("RPE hoch für eine lockere Einheit — auf Erholung achten.");
    if(L.rpe>=9 && kind==="quality") lines.push("Voll ausgepowert — danach bewusst regenerieren.");
  }
  if(L.pain) lines.push("Schmerz markiert — Trend beobachten, bei Wiederholung lieber pausieren.");

  if(!lines.length) lines.push("Lauf erledigt — für Splits, Decoupling und Zonen die Aktivität aus Strava übernehmen oder GPX/TCX importieren.");
  return [...new Set(lines)].slice(0,6);
}
// Kurze Insight-Sätze (Strava "Athlete Intelligence"-Stil)
function paceInsight(L, det, kind){
  const pace=L.sec/L.dist;
  if(kind==="quality" && det?.splits?.length>=4){
    // Intervall-Struktur erkennen: schnelle Splits vs Rest
    const sorted=[...det.splits].sort((a,b)=>a.pace-b.pace);
    const fastN=Math.max(2, Math.floor(det.splits.length/3));
    const fastAvg=sorted.slice(0,fastN).reduce((a,s)=>a+s.pace,0)/fastN;
    // Vergleich mit früheren Quality-Läufen
    const prev=runLogs().filter(r=>r.kind==="quality" && r.id!==L.id && r.details?.splits?.length>=4);
    let claim="";
    if(prev.length){
      const prevBest=Math.min(...prev.map(r=>{
        const so=[...r.details.splits].sort((a,b)=>a.pace-b.pace);
        const n=Math.max(2,Math.floor(r.details.splits.length/3));
        return so.slice(0,n).reduce((a,s)=>a+s.pace,0)/n;
      }));
      if(fastAvg<prevBest) claim=" — deine schnellste Quality-Einheit bisher!";
    }
    return `Schnelle Abschnitte mit Ø ${paceFmt(Math.round(fastAvg))}/km${claim}`;
  }
  if(det?.best1k) return `Ø ${paceFmt(Math.round(pace))}/km — schnellster Kilometer ${paceFmt(det.best1k.pace)}/km`;
  return `Ø ${paceFmt(Math.round(pace))}/km über ${L.dist} km`;
}
function hrInsight(L, det){
  if(!L.hr) return null;
  if(det?.zones){
    const z=det.zones, tot=Object.values(z).reduce((a,b)=>a+(b||0),0);
    if(tot>0){
      const entries=["z1","z2","z3","z4","z5"].map(k=>({k,p:(z[k]||0)/tot*100})).sort((a,b)=>b.p-a.p);
      const top=entries.slice(0,2).filter(e=>e.p>=15);
      const maxHr=det.splits?.length?Math.max(...det.splits.map(s=>s.hr||0)):null;
      const zoneTxt=top.map(e=>e.k.toUpperCase()).join("–")+" ("+top.map(e=>e.p.toFixed(0)+"%").join(" + ")+")";
      return `Ø ${L.hr} bpm${maxHr?`, Max ${maxHr} bpm`:""} — überwiegend in ${zoneTxt}`;
    }
  }
  return `Ø ${L.hr} bpm`;
}
function planInsight(L, c, kind){
  const targetPace=parsePaceFromText(c.det);
  const pace=L.sec/L.dist;
  const kmMatch=c.det.match(/^(\d+(?:[.,]\d+)?)\s*km\b/i);
  const planKm=kmMatch?parseFloat(kmMatch[1].replace(",",".")):null;
  const parts=[];
  if(targetPace){
    const diff=Math.round(pace-targetPace);
    if(Math.abs(diff)<=8) parts.push(`Pace im Plan-Soll (${paceFmt(targetPace)} ±8s) ✓`);
    else if(diff<0) parts.push(`${-diff}s/km schneller als Plan-Soll — ${kind==="easy"||kind==="long"||kind==="recovery"?"zu schnell für die Zone, bewusst rausnehmen":"stark"}`);
    else parts.push(`${diff}s/km langsamer als Soll — okay wenn HF im Zielbereich war`);
  }
  if(planKm && Math.abs(L.dist-planKm)>1) parts.push(`Distanz ${L.dist} statt ${planKm} km geplant`);
  else if(planKm) parts.push(`Distanz wie geplant ✓`);
  return parts.join(" · ");
}

function openRunAnalysis(w,slot){
  const id=runId(w,slot), L=DB.logs[id]; if(!L) return;
  const c=runContent(w,slot), R=RUNS.find(r=>r.slot===slot);
  const dt=dateOf(w,effDay(w,slot));
  const det=L.details;
  const verdict=runVerdict(w,slot,L);
  const pace=L.sec/L.dist;

  const secTitle=(t)=>`<h3 style="font-size:1.05rem;font-weight:800;margin:22px 0 10px">${t}</h3>`;

  // ---- Tempo-Sektion ----
  let tempoHtml="";
  if(det?.curve?.length){
    tempoHtml=`${secTitle("Tempo")}
      ${svgAreaChart(det.curve,"pace",{color:"var(--accent)"})}
      ${intelBox(paceInsight(L,det,R.kind))}
      ${statRow("Durchschn. Tempo", paceFmt(Math.round(pace))+" /km")}
      ${det.best1k?statRow("Schnellster Kilometer", paceFmt(det.best1k.pace)+" /km"):""}
      ${det.best5k?statRow("Beste 5 km", paceFmt(det.best5k.pace)+" /km"):""}
      ${statRow("Bewegungszeit", hms(L.sec))}`;
  } else {
    tempoHtml=`${secTitle("Tempo")}
      ${intelBox(paceInsight(L,det,R.kind))}
      ${statRow("Durchschn. Tempo", paceFmt(Math.round(pace))+" /km")}
      ${statRow("Bewegungszeit", hms(L.sec))}
      ${statRow("Distanz", L.dist+" km")}`;
  }

  // ---- Herzfrequenz-Sektion ----
  let hrHtml="";
  if(L.hr){
    const maxHr=det?.splits?.length?Math.max(...det.splits.map(s=>s.hr||0)):null;
    hrHtml=`${secTitle("Herzfrequenz")}
      ${det?.curve?.length?svgAreaChart(det.curve,"hr",{color:"#ff4d5e"}):""}
      ${intelBox(hrInsight(L,det))}
      ${statRow("Durchschn. Herzfrequenz", L.hr+" bpm")}
      ${maxHr?statRow("Max. Herzfrequenz", maxHr+" bpm"):""}`;
    if(det?.zones && Object.values(det.zones).some(v=>v>0)){
      hrHtml+=`<div style="margin-top:16px"><b style="font-size:.9rem">Herzfrequenz-Zonen</b>
        <div class="tiny muted" style="margin:2px 0 10px">Basierend auf den Plan-Zonen (Z2 = 140–150 bpm GA1)</div>
        ${zoneBarsHtml(det.zones)}</div>`;
    }
  }

  // ---- Plan-Abgleich (unser USP) ----
  const targetPace=parsePaceFromText(c.det);
  let planHtml=`${secTitle("Plan-Abgleich")}
    ${intelBox(planInsight(L,c,R.kind)||"Kein Pace-Soll im Plan hinterlegt.")}
    ${statRow("Geplante Einheit", c.det.length>26?c.det.slice(0,26)+"…":c.det)}
    ${targetPace?statRow("Soll-Pace", paceFmt(targetPace)+" /km"):""}
    ${targetPace?statRow("Differenz", (pace-targetPace>=0?"+":"")+Math.round(pace-targetPace)+" s/km"):""}`;

  // ---- Pacing (Hälften + Decoupling) ----
  let pacingHtml="";
  if(det?.pace1 && det?.pace2){
    const diff=det.pace2-det.pace1;
    const drift=driftFor(L);
    pacingHtml=`${secTitle("Pacing")}
      ${intelBox(diff<=0?`Negativer Split (${-diff}s/km schneller hinten) — sauber aufgebaut`:Math.abs(diff)<8?"Gleichmäßiges Pacing über beide Hälften":`Zweite Hälfte ${diff}s/km langsamer — Start war zu forsch`)}
      ${statRow("1. Hälfte", paceFmt(det.pace1)+" /km · "+(det.hr1||"–")+" bpm")}
      ${statRow("2. Hälfte", paceFmt(det.pace2)+" /km · "+(det.hr2||"–")+" bpm")}
      ${drift!=null?statRow("Aerobes Decoupling", (drift>=0?"+":"")+drift.toFixed(1)+" %"):""}`;
  }

  // ---- Splits ----
  let splitsHtml="";
  if(det?.splits?.length){
    const maxPace=Math.max(...det.splits.map(s=>s.pace));
    const minPace=Math.min(...det.splits.map(s=>s.pace));
    const rng=maxPace-minPace||1;
    splitsHtml=`${secTitle("Splits")}
      <div style="max-height:280px;overflow-y:auto;border:1px solid var(--line);border-radius:12px">
      <table style="margin:0"><thead><tr><th style="padding-left:12px">km</th><th>Pace</th><th>HF</th><th style="width:46%"></th></tr></thead><tbody>
      ${det.splits.map(s=>{
        const bw=((maxPace-s.pace)/rng)*100;
        return `<tr><td style="padding-left:12px">${s.km}</td><td><b>${paceFmt(s.pace)}</b></td><td>${s.hr||"–"}</td>
          <td><div style="height:14px;background:var(--card2);border-radius:4px"><div style="height:100%;width:${Math.max(3,bw).toFixed(0)}%;background:var(--accent);border-radius:4px;opacity:.85"></div></div></td></tr>`;
      }).join("")}</tbody></table></div>`;
  }

  sheet(`<h2>${c.title}</h2>
    <div class="sub" style="margin:-6px 0 14px">${fmtD(dt)} · W${w} · ${c.det}</div>
    <div class="card" style="background:var(--accent);color:#fff;margin:0 0 6px">
      <h3 style="font-size:.78rem;margin:0 0 6px;color:rgba(255,255,255,.85);text-transform:uppercase;letter-spacing:1px">Coach-Verdict</h3>
      ${verdict.map(l=>`<div style="font-size:.88rem;margin:4px 0;line-height:1.4">• ${l}</div>`).join("")}
    </div>
    ${tempoHtml}
    ${hrHtml}
    ${planHtml}
    ${pacingHtml}
    ${splitsHtml}
    ${!det?`<div class="card" style="margin-top:16px;background:var(--card2)"><div class="sub">Charts, Zonen und Splits erscheinen automatisch, wenn der Lauf über Strava („Übernehmen") oder eine GPX/TCX-Datei importiert wurde.</div></div>`:""}
    <div class="acts" style="margin-top:20px"><button class="btn-p" style="flex:1" onclick="closeModal()">Schließen</button></div>`);
}
function parsePaceFromText(txt){
  if(!txt) return null;
  const m=txt.match(/\((\d+):(\d{2})\)/);
  if(m) return +m[1]*60 + +m[2];
  return null;
}
function paceFmt(s){ if(!s||!isFinite(s)) return "–"; const m=Math.floor(s/60), x=Math.round(s%60); return m+":"+String(x).padStart(2,"0"); }

    </div>
    <button class="btn-sm" style="width:100%;margin:12px 0 2px" onclick="document.getElementById('f_file').click()">Aus Strava/Garmin-Datei füllen (GPX/TCX)</button>
    <input id="f_file" type="file" accept=".gpx,.tcx,.xml" style="display:none" onchange="runImportFile(event)">
    <label>Distanz (km)</label><input id="f_dist" type="number" inputmode="decimal" step="0.1" value="${L.dist||""}" placeholder="z.B. 12.0">
    <label>Zeit (h : min : s)</label><div class="row">
      <input id="f_h" type="number" inputmode="numeric" value="${h||""}" placeholder="h">
      <input id="f_m" type="number" inputmode="numeric" value="${m||""}" placeholder="min">
      <input id="f_s" type="number" inputmode="numeric" value="${s||""}" placeholder="s"></div>
    <label>Ø Herzfrequenz (bpm)</label><input id="f_hr" type="number" inputmode="numeric" value="${L.hr||""}" placeholder="z.B. 150">
    <label>Anstrengung (RPE 1–10)</label><div class="seg" id="f_rpe">${[2,4,6,8,10].map(v=>`<button onclick="selSeg('f_rpe',this,${v})" class="${L.rpe===v?'on':''}">${v}</button>`).join("")}</div>
    <label>Gefühl</label><div class="seg" id="f_feel">${[["gut","😀"],["ok","😐"],["mies","😣"]].map(o=>`<button onclick="selSeg('f_feel',this,'${o[0]}')" class="${L.feel===o[0]?'on':''}">${o[1]} ${o[0]}</button>`).join("")}</div>
    <label><input type="checkbox" id="f_pain" ${L.pain?"checked":""} style="width:auto;display:inline;margin-right:8px;vertical-align:-2px">Schmerz / Auffälligkeit</label>
    <label>Notiz</label><textarea id="f_note" placeholder="Wetter, Strecke, Beine, Verpflegung…">${L.note||""}</textarea>
    <div class="acts" style="margin-top:18px"><button class="btn-p" style="flex:1" onclick="saveRun(${w},'${slot}')">Speichern</button>
      ${DB.logs[id]?`<button class="btn-gh" onclick="closeModal();openRunAnalysis(${w},'${slot}')">Analyse</button>`:""}
      ${DB.logs[id]?`<button class="btn-gh" onclick="delRun(${w},'${slot}')">Löschen</button>`:""}</div>`);
}
function saveRun(w,slot){
  const id=runId(w,slot), L=DB.logs[id]||{};
  const dist=parseFloat(document.getElementById("f_dist").value)||0;
  const sec=(+document.getElementById("f_h").value||0)*3600+(+document.getElementById("f_m").value||0)*60+(+document.getElementById("f_s").value||0);
  if(!dist||!sec){ toast("Distanz & Zeit nötig"); return; }
  L.dist=dist; L.sec=sec; L.hr=+document.getElementById("f_hr").value||null;
  L.rpe=window._seg.f_rpe??L.rpe??null; L.feel=window._seg.f_feel??L.feel??null;
  L.pain=document.getElementById("f_pain").checked; L.note=document.getElementById("f_note").value.trim();
  // Falls aus GPX/TCX importiert: detaillierte Analyse-Daten übernehmen
  if(window._parsedDetails){ L.details=window._parsedDetails; window._parsedDetails=null; }
  DB.logs[id]=L; delete DB.skips[id]; window._seg={}; save(); closeModal(); render(); toast("Gespeichert ✓");
}
function runImportFile(ev){
  const f=ev.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    const a=parseActivity(r.result);
    if(!a){ toast("Datei nicht lesbar (GPX/TCX?)"); return; }
    const D=document.getElementById("f_dist"), H=document.getElementById("f_h"),
          M=document.getElementById("f_m"), S=document.getElementById("f_s"), HR=document.getElementById("f_hr");
    if(D)D.value=a.dist;
    if(H)H.value=Math.floor(a.sec/3600)||""; if(M)M.value=Math.floor((a.sec%3600)/60); if(S)S.value=a.sec%60;
    if(HR&&a.hr)HR.value=a.hr;
    window._parsedDetails = a.details || null;
    const extra = a.details ? ` · ${a.details.splits.length} Splits` : "";
    toast(`Übernommen: ${a.dist} km · ${hms(a.sec)}${a.hr?" · "+a.hr+" bpm":""}${extra}`);
  };
  r.readAsText(f); ev.target.value="";
}
function delRun(w,slot){ delete DB.logs[runId(w,slot)]; save(); closeModal(); render(); toast("Eintrag gelöscht"); }
function toggleSkip(id){ if(DB.skips[id])delete DB.skips[id]; else DB.skips[id]=true; save(); render(); }

/* plan editor */
function openPlanEdit(w,slot){
  const W=WEEKS[w-1], R=RUNS.find(r=>r.slot===slot), c=runContent(w,slot);
  sheet(`<h2>Plan ändern · W${w} ${R.label}</h2>
    <div class="sub" style="margin:-6px 0 4px">Original: ${W[slot]}</div>
    <label>Titel</label><input id="p_title" value="${c.title.replace(/"/g,'&quot;')}">
    <label>Beschreibung / Einheit</label><textarea id="p_det">${c.det}</textarea>
    <div class="acts" style="margin-top:18px"><button class="btn-p" style="flex:1" onclick="savePlan(${w},'${slot}')">Speichern</button>
      ${DB.planEdits[runId(w,slot)]?`<button class="btn-gh" onclick="resetPlanOne(${w},'${slot}')">Original</button>`:""}</div>`);
}
function savePlan(w,slot){
  const t=document.getElementById("p_title").value.trim(), d=document.getElementById("p_det").value.trim();
  DB.planEdits[runId(w,slot)]={title:t,det:d}; save(); closeModal(); render(); toast("Plan angepasst ✓");
}
function resetPlanOne(w,slot){ delete DB.planEdits[runId(w,slot)]; save(); closeModal(); render(); toast("Original wiederhergestellt"); }
function resetPlan(){ if(confirm("Alle Plan-Anpassungen & Verschiebungen zurücksetzen?")){ DB.planEdits={}; DB.moves={}; save(); render(); toast("Plan zurückgesetzt"); } }

function openMove(w,slot){
  const id=runId(w,slot), cur=effDay(w,slot);
  sheet(`<h2>Lauf verschieben</h2><div class="sub">${runContent(w,slot).title} · W${w}</div>
    <label>Auf welchen Wochentag?</label>
    <div class="seg" style="flex-wrap:wrap">${DOW.map((d,i)=>`<button class="${i===cur?'on':''}" style="flex:0 0 30%" onclick="doMove(${w},'${slot}',${i})">${d}</button>`).join("")}</div>
    ${DB.moves[id]!=null?`<button class="btn-sm btn-gh" style="width:100%;margin-top:14px" onclick="doMove(${w},'${slot}',-1)">Auf Standardtag zurück</button>`:""}</div>`);
}
function doMove(w,slot,day){
  const id=runId(w,slot), R=RUNS.find(r=>r.slot===slot);
  if(day<0||day===R.day) delete DB.moves[id]; else DB.moves[id]=day;
  save(); closeModal(); render(); toast("Verschoben");
}

/* ride logging */
function openRide(w,actId){
  sheet(`<h2>Rad-Fahrt</h2>
    <label>Datum</label><input id="r_date" type="date" value="${dkey(today())}">
    <label>Distanz (km)</label><input id="r_dist" type="number" inputmode="decimal" step="0.1" placeholder="z.B. 55">
    <label>Zeit (h : min : s)</label><div class="row">
      <input id="r_h" type="number" inputmode="numeric" placeholder="h"><input id="r_m" type="number" inputmode="numeric" placeholder="min"><input id="r_s" type="number" inputmode="numeric" placeholder="s"></div>
    <label>Ø Herzfrequenz (bpm)</label><input id="r_hr" type="number" inputmode="numeric" placeholder="z.B. 135">
    <label>Anstrengung (RPE 1–10)</label><div class="seg" id="r_rpe">${[2,4,6,8,10].map(v=>`<button onclick="selSeg('r_rpe',this,${v})">${v}</button>`).join("")}</div>
    <label>Notiz</label><textarea id="r_note" placeholder="Tour, Wetter, Höhenmeter…"></textarea>
    <div class="acts" style="margin-top:18px"><button class="btn-p" style="flex:1" onclick="saveRide()">Speichern</button></div>`);
}
function saveRide(){
  const date=document.getElementById("r_date").value;
  const dist=parseFloat(document.getElementById("r_dist").value)||0;
  const sec=(+document.getElementById("r_h").value||0)*3600+(+document.getElementById("r_m").value||0)*60+(+document.getElementById("r_s").value||0);
  if(!date||!dist||!sec){ toast("Datum, Distanz & Zeit nötig"); return; }
  const loc=locate(new Date(date));
  DB.rides.push({id:"R"+Date.now(), date, w:loc.week||0, dist, sec,
    hr:+document.getElementById("r_hr").value||null, rpe:window._seg.r_rpe||null,
    note:document.getElementById("r_note").value.trim()});
  window._seg={}; save(); closeModal(); render(); toast("Fahrt gespeichert ✓");
}
function openRideEdit(rid){
  const r=DB.rides.find(x=>x.id===rid); if(!r)return;
  sheet(`<h2>Fahrt bearbeiten</h2><div class="sub">${r.date}</div>
    <div class="cd" style="margin:12px 0"><div><b>${r.dist}</b><span>km</span></div>
      <div><b>${hms(r.sec)}</b><span>Zeit</span></div><div><b>${pace(r.sec/r.dist)}</b><span>/km</span></div>
      <div><b>${r.hr||"–"}</b><span>HF</span></div></div>
    ${r.note?`<p class="sub">${r.note}</p>`:""}
    <div class="acts" style="margin-top:18px"><button class="btn-gh" onclick="delRide('${rid}')">Löschen</button>
      <button class="btn-p" style="flex:1" onclick="closeModal()">OK</button></div>`);
}
function delRide(rid){ DB.rides=DB.rides.filter(x=>x.id!==rid); save(); closeModal(); render(); toast("Fahrt gelöscht"); }

/* activity management */
function openActEdit(idx){
  const a=idx>=0?DB.activities[idx]:{name:"",type:"counter",target:1,optional:false};
  sheet(`<h2>${idx>=0?"Einheit bearbeiten":"Neue Einheit"}</h2>
    <label>Name</label><input id="a_name" value="${(a.name||'').replace(/"/g,'&quot;')}" placeholder="z.B. Schwimmen">
    <label>Typ</label><select id="a_type">
      <option value="counter" ${a.type==='counter'?'selected':''}>Zähler (abhaken pro Woche)</option>
      <option value="ride" ${a.type==='ride'?'selected':''}>Mit Werten (Distanz/Zeit/HF)</option></select>
    <label>Soll pro Woche (0 = kein Ziel)</label><input id="a_tgt" type="number" inputmode="numeric" value="${a.target||0}">
    <label><input type="checkbox" id="a_opt" ${a.optional?'checked':''} style="width:auto;display:inline;margin-right:8px;vertical-align:-2px">optional (zählt nicht ins Soll)</label>
    <div class="acts" style="margin-top:18px"><button class="btn-p" style="flex:1" onclick="saveAct(${idx})">Speichern</button></div>`);
}
function saveAct(idx){
  const name=document.getElementById("a_name").value.trim(); if(!name){ toast("Name nötig"); return; }
  const o={ id:(idx>=0?DB.activities[idx].id:"a"+Date.now()), name,
    type:document.getElementById("a_type").value,
    target:+document.getElementById("a_tgt").value||0,
    optional:document.getElementById("a_opt").checked };
  if(idx>=0) DB.activities[idx]=o; else DB.activities.push(o);
  save(); closeModal(); render(); toast("Gespeichert ✓");
}
function delAct(idx){ if(confirm("Einheit „"+DB.activities[idx].name+"\" löschen? Erfasste Zähler bleiben in Daten.")){ DB.activities.splice(idx,1); save(); render(); toast("Gelöscht"); } }
function moveAct(idx,d){ const j=idx+d; if(j<0||j>=DB.activities.length)return; const a=DB.activities; [a[idx],a[j]]=[a[j],a[idx]]; save(); render(); }

/* weight */
function openWeight(){
  sheet(`<h2>Gewicht eintragen</h2>
    <label>Datum</label><input id="w_date" type="date" value="${dkey(today())}">
    <label>Gewicht (kg)</label><input id="w_kg" type="number" inputmode="decimal" step="0.1" placeholder="z.B. 84.5">
    <div class="acts" style="margin-top:18px"><button class="btn-p" style="flex:1" onclick="addWeight()">Speichern</button></div>
    ${DB.weights.length?`<div style="margin-top:18px"><h2>Verlauf</h2>${[...DB.weights].sort((a,b)=>new Date(b.d)-new Date(a.d)).slice(0,8).map(w=>`<div class="between" style="padding:7px 0;border-bottom:1px solid var(--line)"><span class="sub">${w.d}</span><span><b>${w.kg} kg</b><button class="btn-sm btn-gh" style="margin-left:8px;padding:3px 8px" onclick="delWeight('${w.d}')">✕</button></span></div>`).join("")}</div>`:""}`);
}
function addWeight(){
  const d=document.getElementById("w_date").value, kg=parseFloat(document.getElementById("w_kg").value);
  if(!d||!kg){ toast("Datum & Gewicht nötig"); return; }
  DB.weights=DB.weights.filter(w=>w.d!==d); DB.weights.push({d,kg}); save(); closeModal(); render(); toast("Gewicht gespeichert ✓");
}
function delWeight(d){ DB.weights=DB.weights.filter(w=>w.d!==d); save(); openWeight(); }

/* data io */
function exportData(){
  const b=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(b); a.download="marathon-koeln-backup-"+dkey(today())+".json"; a.click(); toast("Backup erstellt");
}
function importData(ev){
  const f=ev.target.files[0]; if(!f)return; const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); if(d&&d.v){ if(!d.activities)d.activities=JSON.parse(JSON.stringify(DEFAULT_ACTS)); if(!d.acts)d.acts={}; if(!d.rides)d.rides=[]; if(!d.planEdits)d.planEdits={}; DB=d; DB.v=2; save(); render(); toast("Import erfolgreich ✓"); } else toast("Ungültige Datei"); }catch(e){ toast("Import fehlgeschlagen"); } };
  r.readAsText(f);
}
function bulkImport(ev){
  const files=[...ev.target.files]; if(!files.length) return;
  let runs=0, rides=0, skip=0, fail=0, pending=files.length;
  const finish=()=>{ if(--pending>0) return;
    save(); render(); ev.target.value="";
    toast(`${runs} Läufe · ${rides} Fahrten importiert${skip?` · ${skip} schon erfasst`:""}${fail?` · ${fail} unlesbar`:""}`);
  };
  const addActivity=a=>{
    if(!a||!a.dist||!a.sec){ fail++; return; }
    if(a.kind==="ride"){
      const key=a.date?dkey(a.date):"";
      if(DB.rides.some(x=>x.date===key && Math.abs(x.dist-a.dist)<0.3)){ skip++; return; }
      const loc=a.date?locate(a.date):{};
      DB.rides.push({id:"R"+Date.now()+Math.random().toString(36).slice(2,6), date:key||dkey(today()),
        w:loc.week||0, dist:a.dist, sec:a.sec, hr:a.hr||null, rpe:null, note:"Import"});
      rides++; return;
    }
    if(!a.date){ fail++; return; }
    const m=matchRunSlot(a.date);
    if(!m){ skip++; return; }
    const id=runId(m.w,m.slot);
    if(DB.logs[id]){ skip++; return; }
    DB.logs[id]={dist:a.dist, sec:a.sec, hr:a.hr||null, rpe:null, feel:null, pain:false, note:"Import (Strava/Garmin)", details:a.details||null};
    delete DB.skips[id]; runs++;
  };
  files.forEach(f=>{
    const r=new FileReader();
    r.onload=()=>{ try{
      if(/\.csv$/i.test(f.name)) parseStravaCSV(r.result).forEach(addActivity);
      else addActivity(parseActivity(r.result));
    }catch(e){ fail++; } finish(); };
    r.onerror=()=>{ fail++; finish(); };
    r.readAsText(f);
  });
}
function resetData(){ if(confirm("Wirklich ALLE Daten löschen? Vorher exportieren!")){ localStorage.removeItem(LS); DB=load(); save(); render(); toast("Zurückgesetzt"); } }

/* ============ RENDER ============ */
let _renderDay=null;
function render(){
  const v={heute:viewHeute,woche:viewWoche,track:viewTrack,stats:viewStats,mehr:viewMehr}[route]||viewHeute;
  document.body.dataset.route=route;   // pro Seite eigener durchscheinender Hintergrund
  document.getElementById("app").innerHTML=v(); renderNav(); updateBadge();
  _renderDay=dkey(today());
}
// Wenn die App nach Mitternacht wieder in den Vordergrund kommt: auf den neuen Tag aktualisieren
function refreshIfNewDay(){
  if(_renderDay && _renderDay!==dkey(today())){
    const busy=(document.getElementById("coachRoot")||{}).innerHTML || (document.getElementById("gymRoot")||{}).innerHTML;
    if(!busy){ wocheOpen=undefined; viewWoche._scrolled=false; render(); }
  }
}
document.addEventListener("visibilitychange", ()=>{ if(!document.hidden) refreshIfNewDay(); });
window.addEventListener("focus", refreshIfNewDay);
window.addEventListener("pageshow", refreshIfNewDay);
render();
// auto-pull on app start if configured
if(CLOUD.token && CLOUD.gistId){ cloudPull(); }
// Strava OAuth callback + initial fetch
checkStravaCallback();
if(stravaConnected()){ stravaFetchActivities(); }
// Garmin-Wellness laden (Schlaf/HRV via Gist)
if(DB.garmin && DB.garmin.gistId && CLOUD.token){ fetchWellness(); }
// Service Worker still registrieren (für Push) — schadet auch ohne Worker-URL nicht
if('serviceWorker' in navigator){ navigator.serviceWorker.register("./sw.js").catch(()=>{}); }
</script>
