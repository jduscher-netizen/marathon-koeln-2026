let openWeek=-2;
function wkToggle(i){openWeek=(openWeek===i?-2:i);render();}
function weekRow(wk,i,cur){
  const cls=i<cur?"past":(i===cur?"cur":"");
  const start=parseISO(wk.start);const end=addDays(start,6);
  const runs=wk.sessions.filter(s=>s.kind!=="rest"&&s.kind!=="cross").length;
  const done=wk.sessions.filter(s=>DB.logs[logKey(i,s.day)]).length;
  const isOpen=(openWeek===-2?i===cur:openWeek===i);
  const pct=runs?Math.round(done/runs*100):0;
  return `<div class="wk ${cls}"><div class="node"></div>
    <div class="wk-card" onclick="wkToggle(${i})">
      <div class="wk-head"><b>W${String(wk.w).padStart(2,"0")} · ${esc(wk.phase)}</b>
        ${i===cur?`<span class="chip">Aktuell</span>`:`<span class="ph">${i<cur?pct+"%":"—"}</span>`}</div>
      <div class="wk-meta">${fmtDate(start)}–${fmtDate(end)} · ${wk.km} km${wk.longKm?" · LR "+wk.longKm:""}${wk.down?" · Erholungswoche":""}</div>
      ${isOpen?`<div class="wk-days">${weekDays(wk,i)}</div>`:""}
    </div></div>`;
}
function weekDays(wk,wi){
  const start=parseISO(wk.start);
  const rows=[];
  for(let dd=0;dd<7;dd++){
    const date=addDays(start,dd);
    let s=wk.sessions.find(x=>x.day===dd);
    const ov=DB.planEdits[logKey(wi,dd)];
    if(ov)s={...(s||{day:dd,kind:"rest"}),title:ov.title,detail:ov.detail,kind:ov.kind||(s?s.kind:"easy"),adjusted:true};
    const isToday=toISO(date)===isoToday();
    if(!s||s.kind==="rest"){rows.push(`<div class="wk-day rest ${isToday?"is-today":""}"><div class="dd">${WD_SHORT[dd]} ${date.getDate()}.</div><div class="dc">— frei —${s&&s.adjusted?` <span class="chip" style="font-size:7px;padding:1px 5px;vertical-align:1px">Angepasst</span>`:""}</div></div>`);continue;}
    const l=DB.logs[logKey(wi,dd)];
    const sk=DB.skips[logKey(wi,dd)];
    if(sk){rows.push(`<div class="wk-day rest ${isToday?"is-today":""}"><div class="dd">${WD_SHORT[dd]} ${date.getDate()}.</div><div class="dc" style="text-decoration:line-through;opacity:.7">${esc(s.title)}<small style="text-decoration:none">${sk.reason==="moved"?"verschoben":"ausgelassen"}</small></div></div>`);continue;}
    rows.push(`<div class="wk-day ${isToday?"is-today":""}" onclick="event.stopPropagation();${l?"openRunAnalysis":"openLog"}('${toISO(date)}')">
      <div class="dd">${WD_SHORT[dd]} ${date.getDate()}.</div>
      <div class="dc">${esc(s.title)}${s.adjusted?` <span class="chip" style="font-size:7px;padding:1px 5px;vertical-align:1px">Angepasst</span>`:""}${l?" "+ic("check",13):""}<small>${esc(s.detail)}</small></div></div>`);
  }
  return rows.join("");
}

/* ---- Form-Modell (CTL/ATL/TSB) + Zonenverteilung (A2) ---- */
function sessionLoadFactor(kind){return {recovery:.6,easy:1,long:1.15,quality:1.6,race:1.9,cross:.7}[kind]||1;}
function logKind(k){
  const m=k.match(/^W(\d+)-(\d)$/);if(!m)return "easy";
  const wi=+m[1]-1,day=+m[2];
  const ov=DB.planEdits[k];if(ov&&ov.kind)return ov.kind;
  const s=DB.plan.weeks[wi]&&DB.plan.weeks[wi].sessions.find(x=>x.day===day);
  return (s&&s.kind)||"easy";
}
function dailyLoads(){
  const map={};
  Object.keys(DB.logs).forEach(k=>{
    const l=DB.logs[k];if(!l||!l.date)return;
    const min=(l.time||((l.dist||0)*((DB.plan.paces&&DB.plan.paces.easy)||360)))/60;
    map[l.date]=(map[l.date]||0)+min*sessionLoadFactor(logKind(k));
  });
  (DB.activities||[]).forEach(a=>{const min=(a.sec||0)/60;if(!a.date||!min)return;map[a.date]=(map[a.date]||0)+min*.8;});
  return map;
}
function formNow(){
  const loads=dailyLoads();
  const start=parseISO(DB.plan.startDate||DB.plan.weeks[0].start);
  let ctl=0,atl=0;const t=today();
  for(let d=start;d<=t;d=addDays(d,1)){const L=loads[toISO(d)]||0;ctl+=(L-ctl)/42;atl+=(L-atl)/7;}
  return {ctl:Math.round(ctl),atl:Math.round(atl),tsb:Math.round(ctl-atl)};
}
function tsbLabel(t){return t>5?"frisch":t>=-10?"im Rhythmus":t>=-25?"müde":"überlastet";}
function tsbColor(t){return t>5?"var(--accent)":t>=-10?"var(--text-2)":t>=-25?"var(--warn)":"var(--bad)";}
function zoneSplit(){
  const cutoff=addDays(today(),-28);let easy=0,hard=0;
  Object.keys(DB.logs).forEach(k=>{
    const l=DB.logs[k];if(!l||!l.date||parseISO(l.date)<cutoff)return;
    const min=(l.time||0)/60;if(!min)return;
    const kind=logKind(k);
    if(kind==="quality"||kind==="race")hard+=min;else easy+=min;
  });
  const tot=easy+hard;
  return tot?{easyPct:Math.round(easy/tot*100),tot:Math.round(tot)}:null;
}
function prognosisSvg(){
  const p=DB.profile;if(p.goalMode!=="time"||!p.targetSec)return "";
  const goal=p.targetSec;
  const pts=DB.prognosis.slice(-3);
  const est=pts.length?pts[pts.length-1].sec:goal;
  const scale=16/300; // ±5 min → ±16 px; schneller als Ziel = UNTER der Linie
  const y=s=>Math.max(6,Math.min(48,27-(s-goal)*scale));
  const xs=[0.16,0.5,0.84].slice(3-Math.max(1,pts.length));
  const dots=(pts.length?pts:[{sec:goal}]).map((pt,i,arr)=>{
    const last=i===arr.length-1;
    return `<circle cx="${(xs[i]*100).toFixed(1)}%" cy="${y(pt.sec).toFixed(1)}" r="${last?5:3.5}" fill="${last?"var(--accent)":"var(--dim)"}" ${last?'style="filter:drop-shadow(0 0 6px rgba(78,224,199,.8))"':""}/>`;
  }).join("");
  return `<svg width="100%" height="54" style="display:block;margin:12px 0 2px">
    <line x1="0" y1="27" x2="100%" y2="27" stroke="var(--line-strong)" stroke-width="1.5" stroke-dasharray="5 5"/>
    ${dots}</svg>
  <div class="between"><span class="mono" style="font-size:9px;color:var(--dim);letter-spacing:1px">FRÜHER → HEUTE</span><span class="mono" style="font-size:9px;color:var(--mut);letter-spacing:1px">ZIEL ${fmtDur(goal)}</span></div>`;
}
function viewAnalyse(){

  const compliance=planned?Math.round(doneRuns/planned*100):0;

      <div class="card" style="margin:0"><div class="eyebrow">Form · TSB</div>
        <div style="font-size:26px;font-weight:700;letter-spacing:-1px;margin:8px 0 2px;color:${tsbColor(form.tsb)}">${form.tsb>0?"+":""}${form.tsb}</div>

        ${zs?`<div style="font-size:26px;font-weight:700;letter-spacing:-1px;margin:8px 0 2px;color:${zs.easyPct>=75?"var(--accent)":"var(--warn)"}">${zs.easyPct}<span style="font-size:14px;color:var(--mut)"> %</span></div>

      <div style="font-size:12px;color:var(--mut)">${doneRuns}/${planned} geplante Einheiten absolviert</div>
    </div>
    <div class="two" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="card" style="margin:0"><div class="eyebrow">Gesamt</div><div style="font-size:26px;font-weight:700;letter-spacing:-1px;margin-top:8px">${Math.round(totalKm)}<span style="font-size:14px;color:var(--mut)"> km</span></div></div>
      <div class="card" style="margin:0"><div class="eyebrow">Einheiten</div><div style="font-size:26px;font-weight:700;letter-spacing:-1px;margin-top:8px">${totalRuns}</div></div>
    </div>
    ${reportListBlock()}
  `;
}

/* =========================================================================
   EINZEL-LAUF-ANALYSE — lokales Verdict + KI-Verdict (A2)
   ========================================================================= */
function hrZones(){
  const h=DB.profile&&DB.profile.hr;if(!h||!(h.maxhr||h.yob))return null;
  const max=h.maxhr||(220-(today().getFullYear()-h.yob));
  const rest=h.rhr||null;
  const pct=p=>rest?Math.round(rest+(max-rest)*p):Math.round(max*p); // Karvonen, wenn Ruhe-HF bekannt
  return [null,{lo:0,hi:pct(.6)},{lo:pct(.6),hi:pct(.7)},{lo:pct(.7),hi:pct(.8)},{lo:pct(.8),hi:pct(.9)},{lo:pct(.9),hi:max}];
}
function hrZoneOf(hr){const z=hrZones();if(!z)return null;for(let i=5;i>=2;i--){if(hr>=z[i].lo)return i;}return 1;}
function runVerdictLocal(s,l,pace,planPace){
  const out=[];
  const d=pace&&planPace?Math.round(pace-planPace):null; // + = langsamer als Soll
  const isEasyKind=s.kind==="easy"||s.kind==="recovery"||s.kind==="long";
  if(d!=null){
    if(isEasyKind){
      if(d<-20)out.push("Du warst "+Math.abs(d)+" s/km schneller als geplant — für eine lockere Einheit zu flott. Locker heißt locker: Genau dort entsteht deine aerobe Basis.");
      else if(d<=15)out.push("Sauber im Zielbereich gelaufen ("+fmtPace(pace)+" statt "+fmtPace(planPace)+" /km) — genau so soll sich Grundlage anfühlen.");
      else if(l.feel==="Hart")out.push("Langsamer als geplant und es fühlte sich hart an — dein Körper meldet Ermüdung. Behalte die nächsten Tage im Blick.");
      else out.push("Etwas langsamer als geplant, aber locker geblieben — völlig in Ordnung. Der Reiz zählt, nicht die Zahl.");
    } else {
      if(d<=-10&&l.feel!=="Hart")out.push("Stark: schneller als die Vorgabe ("+fmtPace(pace)+" /km) und trotzdem kontrolliert — deine Form entwickelt sich.");
      else if(d<=10)out.push("Vorgabe getroffen ("+fmtPace(pace)+" /km) — genau die Qualität, die dich zum Ziel bringt.");
      else if(l.feel==="Hart")out.push("Heute war nicht dein Tag — passiert. Eine harte Einheit unter Plan sagt nichts über deine Form, wenn die Erholung stimmt.");
      else out.push("Unter der Vorgabe, aber nicht am Limit — beim nächsten Mal etwas mutiger anlaufen.");
    }
  } else if(pace){out.push("Pace "+fmtPace(pace)+" /km über "+l.dist+" km.");}
  if(l.hr){
    const z=hrZones();
    if(z){const zi=hrZoneOf(l.hr);
      if(isEasyKind&&zi>=3)out.push("Puls "+l.hr+" liegt in Zone "+zi+" — für lockere Einheiten zu hoch. Tempo raus, HF unter "+z[1].hi+" halten.");
      else if(isEasyKind)out.push("Puls "+l.hr+" — sauber in der Grundlagenzone.");
      else out.push("Puls Ø "+l.hr+" bpm.");
    } else out.push("Puls Ø "+l.hr+" bpm.");
  }
  if(s.adjusted)out.push("Diese Einheit war vorab angepasst — gut, dass du auf die Signale gehört hast.");
  return out.join(" ");
}
function openRunAnalysis(dateISO){
  const date=parseISO(dateISO);const s=sessionOn(date);if(!s)return;
  const k=logKey(s.wi,s.day);const l=DB.logs[k];if(!l){openLog(dateISO);return;}
  const pace=l.pace||(l.time&&l.dist?l.time/l.dist:null);
  const planPace=s.pace||null;
  const d=pace&&planPace?Math.round(pace-planPace):null;
  const verdict=runVerdictLocal(s,l,pace,planPace);
  const tiles=[[l.dist!=null?l.dist:"—","KM"],[l.time?fmtDur(l.time):"—","ZEIT"],[pace?fmtPace(pace):"—","PACE /KM"],[l.hr||"—","PULS Ø"]];
  document.getElementById("sheet").innerHTML=`
    <div class="grab"></div>
    <div class="eyebrow" style="color:var(--accent);margin-bottom:6px">Analyse · ${WD_SHORT[wdIndex(date)]} ${fmtDate(date)} · W${s.week}</div>
    <div style="font-size:19px;font-weight:700;letter-spacing:-.3px;margin-bottom:2px">${esc(s.title)}${s.adjusted?` <span class="chip" style="vertical-align:3px">Angepasst</span>`:""}</div>
    ${s.detail?`<div class="mono" style="font-size:11px;color:var(--mut);margin-bottom:16px">Soll: ${esc(s.detail)}</div>`:`<div style="margin-bottom:16px"></div>`}
    <div class="stats4" style="margin-bottom:14px">${tiles.map(([v,lb])=>`<div class="stat"><b style="font-size:17px;color:var(--txt)">${v}</b><span>${lb}</span></div>`).join("")}</div>
    ${d!=null?`<div class="pace-strip" style="margin-bottom:14px"><span class="pl">vs. Plan</span><span class="pv" style="color:${d<=5?"var(--accent)":"var(--warn)"}">${d>0?"+":"−"}${Math.abs(d)} s/km</span></div>`:""}
    <div style="background:var(--surface-2);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:12px">
      <div class="eyebrow" style="margin-bottom:8px">Einordnung</div>
      <div style="font-size:13px;color:var(--text-2);line-height:1.55">${esc(verdict)}${l.feel?` <span style="color:var(--mut)">(Empfinden: ${esc(l.feel)})</span>`:""}</div>
    </div>
    <div id="ai-verdict">${l.aiVerdict?aiVerdictCard(l.aiVerdict):((DB.coach&&DB.coach.workerUrl)?`<div style="background:var(--surface-2);border:1px solid var(--accent-soft-bd);border-radius:14px;padding:14px 16px;margin-bottom:12px"><div class="eyebrow" style="color:var(--accent);margin-bottom:8px">Coach</div><div style="font-size:13px;color:var(--mut)"><span class="typing">•••</span> analysiert deinen Lauf…</div></div>`:"")}</div>
    <div style="display:flex;gap:10px;margin-top:4px">
      <button class="btn ghost" style="flex:1" onclick="openLog('${dateISO}')">Bearbeiten</button>
      <button class="btn" style="flex:1" onclick="closeSheet()">Fertig</button>
    </div>`;
  document.getElementById("sheetRoot").classList.add("open");
  if(!l.aiVerdict&&DB.coach&&DB.coach.workerUrl)fetchRunVerdict(dateISO,s,l,pace,planPace);
}
function aiVerdictCard(text){
  return `<div style="background:var(--surface-2);border:1px solid var(--accent-soft-bd);border-radius:14px;padding:14px 16px;margin-bottom:12px">
    <div class="eyebrow" style="color:var(--accent);margin-bottom:8px">Coach</div>
    <div style="font-size:13px;color:var(--text-2);line-height:1.55">${fmtCoach(text)}</div></div>`;
}
async function fetchRunVerdict(dateISO,s,l,pace,planPace){
  try{
    const q="Analysiere kurz diese absolvierte Einheit (3-4 Sätze, sprich mich direkt an, keine Aufzählung): "+
      s.title+" am "+dateISO+". Soll: "+(s.detail||"—")+". Ist: "+(l.dist||"?")+" km in "+(l.time?fmtDur(l.time):"?")+
      (pace?" ("+fmtPace(pace)+" /km)":"")+(planPace?", Plan-Pace "+fmtPace(planPace)+" /km":"")+
      (l.hr?", Puls Ø "+l.hr:"")+(l.feel?", Empfinden: "+l.feel:"")+(s.adjusted?", Einheit war vorab angepasst":"")+".";
    const url=DB.coach.workerUrl.replace(/\/$/,"")+"/coach";
    const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({mode:"v2",messages:[{role:"user",content:q}],context:buildCoachContext()})});
    const j=await r.json();
    if(j.text){
      const k=logKey(s.wi,s.day);
      if(DB.logs[k]){DB.logs[k].aiVerdict=j.text;save();}
      const el=document.getElementById("ai-verdict");if(el)el.innerHTML=aiVerdictCard(j.text);
    } else {const el=document.getElementById("ai-verdict");if(el)el.innerHTML="";}
  }catch(e){const el=document.getElementById("ai-verdict");if(el)el.innerHTML="";}
}

function ghToken(){return (DB.github&&DB.github.token)||null;}
function garminConnected(){return !!(DB.garmin&&DB.garmin.gistId&&ghToken());}
async function ghConnect(){
  const tok=prompt("GitHub Personal Access Token (Scope: gist) — liest deine Garmin-Recovery aus dem Sync-Gist:",ghToken()||"");
  if(tok===null)return;
  if(!tok.trim()){DB.github={};DB.garmin={};DB.wellness=null;save();toast("Garmin getrennt");render();return;}
  try{
    const r=await fetch("https://api.github.com/user",{headers:{Authorization:"token "+tok.trim()}});
    if(!r.ok)throw new Error("Token ungültig ("+r.status+")");
    DB.github={token:tok.trim(),user:(await r.json()).login};save();
    const gid=prompt("Garmin-Wellness Gist-ID (aus deinem garmin-sync-Setup):",(DB.garmin&&DB.garmin.gistId)||"");
    if(gid&&gid.trim()){DB.garmin={gistId:gid.trim()};save();await fetchWellness();toast("Garmin verbunden ✓");}
    else{toast("GitHub verbunden — Gist-ID fehlt noch");}
    render();
  }catch(e){toast("Fehler: "+e.message);}
}
async function fetchWellness(){
  if(!garminConnected())return;
  try{
    const r=await fetch("https://api.github.com/gists/"+DB.garmin.gistId,{headers:{Authorization:"token "+ghToken(),Accept:"application/vnd.github+json"}});
    if(!r.ok)return;
    const g=await r.json();const f=g.files&&g.files["garmin-wellness.json"];if(!f)return;
    DB.wellness=JSON.parse(f.content);DB.garmin.lastFetch=Date.now();save();
  }catch(e){console.warn("wellness",e.message);}
}
function latestWellness(){const w=DB.wellness;if(!w||!w.days)return null;for(const d of w.days){if(d.sleepSeconds||d.hrvLastNight||d.restingHr)return d;}return null;}
function recoveryScore(d){
  if(!d)return null;const cl=(v,a,b)=>Math.max(a,Math.min(b,v));const parts=[];
  if(d.sleepScore)parts.push([d.sleepScore,1]);
  if(d.hrvLastNight){let hv;
    if(d.hrvBalancedLow&&d.hrvBalancedHigh&&d.hrvBalancedHigh>d.hrvBalancedLow){const f=(d.hrvLastNight-d.hrvBalancedLow)/(d.hrvBalancedHigh-d.hrvBalancedLow);hv=cl(45+f*48,10,100);}
    else if(d.hrvWeeklyAvg){hv=cl(65+(d.hrvLastNight-d.hrvWeeklyAvg)/d.hrvWeeklyAvg*120,10,100);}else hv=65;
    parts.push([hv,1.3]);}
  if(d.bodyBatteryLast!=null)parts.push([d.bodyBatteryLast,0.7]);
  if(!parts.length)return null;const w=parts.reduce((a,p)=>a+p[1],0);
  return Math.round(parts.reduce((a,p)=>a+p[0]*p[1],0)/w);
}
function recoveryColor(s){return s==null?"var(--mut)":s>=67?"var(--good)":s>=34?"var(--warn)":"var(--bad)";}
function recoveryLabel(s){return s==null?"—":s>=67?"Grünes Licht":s>=34?"Moderat":"Beansprucht";}
function fmtH(sec){if(!sec)return "–";const h=Math.floor(sec/3600),m=Math.round(sec%3600/60);return h+":"+String(m).padStart(2,"0");}
function openRecovery(){
  const d=latestWellness();if(!d){toast("Noch keine Garmin-Daten");return;}
  const s=recoveryScore(d),col=recoveryColor(s),lab=recoveryLabel(s);
  const bars=[["Schlaf-Score",d.sleepScore,100,"var(--accent)"],["Body Battery",d.bodyBatteryLast,100,"var(--mut)"]].filter(b=>b[1]!=null);
  document.getElementById("sheet").innerHTML=`
    <div class="grab"></div>
    <div class="eyebrow" style="color:var(--accent);margin-bottom:6px">Recovery · Garmin · Stand ${esc(d.date||"")}</div>
    <div style="display:flex;align-items:flex-end;gap:12px;margin-bottom:16px"><div style="font-size:56px;font-weight:700;letter-spacing:-2px;color:${col};line-height:.9">${s==null?"–":s}</div><div style="padding-bottom:8px"><div style="font-size:15px;font-weight:600">${lab}</div><div class="mono" style="font-size:11px;color:var(--mut)">${s!=null?"von 100":""}</div></div></div>
    ${bars.map(([l,v,mx,c])=>`<div style="margin-bottom:12px"><div class="between" style="margin-bottom:6px"><span class="mono" style="font-size:10px;letter-spacing:1px;color:var(--mut);text-transform:uppercase">${l}</span><b style="font-size:13px">${v}</b></div><div class="bl-track" style="background:var(--surface-2)"><div class="bl-fill" style="width:${Math.min(100,v/mx*100)}%;background:${c};box-shadow:none"></div></div></div>`).join("")}
    <div class="two" style="margin-top:16px">
      ${[["Schlaf",fmtH(d.sleepSeconds)],["HRV",d.hrvLastNight?d.hrvLastNight+" ms":"–"],["Ruhe-HF",d.restingHr?d.restingHr+" bpm":"–"],["Battery",d.bodyBatteryLast!=null?d.bodyBatteryLast:"–"]].map(([l,v])=>`<div class="stat" style="margin:0"><b style="font-size:17px;color:var(--txt)">${v}</b><span>${l}</span></div>`).join("")}
    </div>
    <button class="btn ghost" style="margin-top:16px" onclick="closeSheet()">Schließen</button>`;
  document.getElementById("sheetRoot").classList.add("open");
}

/* ---- Strava ---- */
function stravaConnected(){return !!(DB.strava&&DB.strava.refreshToken);}
async function stravaTokenExchange(body){
  const r=await fetch("https://www.strava.com/oauth/token",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!r.ok)throw new Error("Strava /oauth/token "+r.status);return r.json();
}
async function checkStravaCallback(){
  const u=new URL(location.href);const code=u.searchParams.get("code");if(!code)return;
  const c=DB.strava||{};
  if(!c.clientId||!c.clientSecret){history.replaceState({},"",u.pathname);return;}
  try{
    const d=await stravaTokenExchange({client_id:c.clientId,client_secret:c.clientSecret,code,grant_type:"authorization_code"});
    if(!d.access_token)throw new Error(d.message||"keine Tokens");
    c.accessToken=d.access_token;c.refreshToken=d.refresh_token;c.expiresAt=d.expires_at*1000;
    c.athlete=d.athlete?(d.athlete.firstname+" "+d.athlete.lastname).trim():null;
    DB.strava=c;save();history.replaceState({},"",u.pathname);toast("Strava verknüpft ✓");
    await stravaFetchActivities();render();
  }catch(e){history.replaceState({},"",u.pathname);toast("Strava-Auth: "+e.message);}
}
function stravaConnect(){
  if(stravaConnected()){if(confirm("Strava trennen?")){delete DB.strava;save();render();toast("Strava getrennt");}return;}
  const cid=prompt("Strava Client-ID (aus deiner Strava-API-App):",(DB.strava&&DB.strava.clientId)||"");if(!cid)return;
  const cs=prompt("Strava Client-Secret:",(DB.strava&&DB.strava.clientSecret)||"");if(!cs)return;
  DB.strava=Object.assign(DB.strava||{},{clientId:cid.trim(),clientSecret:cs.trim()});save();
  const redirect=location.origin+location.pathname;
  location.href="https://www.strava.com/oauth/authorize?client_id="+encodeURIComponent(cid.trim())+"&response_type=code&redirect_uri="+encodeURIComponent(redirect)+"&approval_prompt=auto&scope=activity:read_all";
}
async function ensureStravaToken(){
  const c=DB.strava;if(!c||!c.refreshToken)return false;
  if(c.expiresAt&&c.expiresAt-Date.now()>60000&&c.accessToken)return true;
  try{const d=await stravaTokenExchange({client_id:c.clientId,client_secret:c.clientSecret,refresh_token:c.refreshToken,grant_type:"refresh_token"});
    if(!d.access_token)return false;c.accessToken=d.access_token;c.refreshToken=d.refresh_token||c.refreshToken;c.expiresAt=d.expires_at*1000;save();return true;
  }catch(e){console.warn("strava refresh",e);return false;}
}
async function stravaFetchActivities(){
  if(!await ensureStravaToken())return;const c=DB.strava;
  const after=Math.floor((Date.now()-4*86400000)/1000);
  try{
    const r=await fetch("https://www.strava.com/api/v3/athlete/activities?after="+after+"&per_page=30",{headers:{Authorization:"Bearer "+c.accessToken}});
    if(!r.ok){toast("Strava-Abruf "+r.status);return;}
    const acts=await r.json();const ignored=new Set(c.importedIds||[]);
    c.pending=acts.filter(a=>!ignored.has(a.id)).map(a=>({id:a.id,type:a.type,name:a.name,distance:a.distance,moving_time:a.moving_time,elapsed_time:a.elapsed_time,average_heartrate:a.average_heartrate,total_elevation_gain:a.total_elevation_gain,start_date:a.start_date}));
    c.lastFetch=Date.now();save();
    if(c.pending.length)toast(c.pending.length+" neue Strava-Aktivität(en)");
  }catch(e){toast("Strava-Abruf: "+e.message);}
}
function stravaKind(t){t=t||"";if(/Run/i.test(t))return "run";if(/Ride|Cycl/i.test(t))return "ride";if(/Swim/i.test(t))return "swim";return "other";}
function actLabel(t){const m={Run:"Lauf",TrailRun:"Trail-Lauf",Ride:"Radfahren",VirtualRide:"Rad (virtuell)",Swim:"Schwimmen",WeightTraining:"Krafttraining",Workout:"Workout",Crossfit:"Crossfit",Hike:"Wandern",Walk:"Gehen",Yoga:"Yoga"};return m[t]||t;}
function actIcon(t){const k=stravaKind(t);return k==="run"?"run":k==="ride"?"bike":k==="swim"?"swim":"activity";}
function pushActivity(a,dist,sec,hr){if(!DB.activities)DB.activities=[];DB.activities.unshift({id:"A"+a.id,type:a.type,label:actLabel(a.type),date:toISO(new Date(a.start_date)),dist,sec,hr,note:a.name||""});}
async function stravaImport(id){
  const c=DB.strava;const a=(c.pending||[]).find(x=>x.id===id);if(!a){toast("nicht mehr in Liste");return;}
  const kind=stravaKind(a.type);const dt=new Date(a.start_date);const d0=new Date(dt.getFullYear(),dt.getMonth(),dt.getDate());
  const dist=+((a.distance||0)/1000).toFixed(2);const sec=a.moving_time||a.elapsed_time;const hr=a.average_heartrate?Math.round(a.average_heartrate):null;
  let msg="";
  if(kind==="run"){
    const s=sessionOn(d0);
    if(s&&s.kind!=="rest"&&(!s.sport||s.sport==="run")&&!DB.logs[logKey(s.wi,s.day)]){
      DB.logs[logKey(s.wi,s.day)]={dist,time:sec,timeStr:fmtDur(sec),feel:null,hr,date:toISO(d0),pace:sec&&dist?sec/dist:null,note:"Strava: "+(a.name||"")};
      msg="Lauf übernommen ✓";
    }else{pushActivity(a,dist,sec,hr);msg="Als Aktivität gespeichert ✓";}
  }else{pushActivity(a,dist,sec,hr);msg=actLabel(a.type)+" gespeichert ✓";}
  c.importedIds=(c.importedIds||[]).concat([a.id]);c.pending=(c.pending||[]).filter(x=>x.id!==a.id);save();render();toast(msg);
}
function stravaDismiss(id){const c=DB.strava;c.importedIds=(c.importedIds||[]).concat([id]);c.pending=(c.pending||[]).filter(x=>x.id!==id);save();render();}
async function stravaImportAll(){const list=((DB.strava||{}).pending||[]).slice();for(const a of list)await stravaImport(a.id);toast("Alle übernommen ✓");}
function stravaPendingBlock(){
  if(!stravaConnected())return "";const p=(DB.strava.pending||[]);if(!p.length)return "";
  const rows=p.map(a=>{const k=stravaKind(a.type);const dist=(a.distance||0)/1000;const head=k==="other"?actLabel(a.type):dist.toFixed(1)+" km";const dt=new Date(a.start_date);
    return `<div class="li" style="padding:12px 0">
      <div class="ii">${ic(actIcon(a.type),18)}</div>
      <div class="lt"><b>${esc(head)}</b><span>${WD_SHORT[wdIndex(dt)]} ${fmtDate(dt)} · ${fmtDur(a.moving_time||a.elapsed_time)}${a.average_heartrate?" · "+Math.round(a.average_heartrate)+" bpm":""}</span></div>
      <button class="btn sm" onclick="stravaImport(${a.id})">Übernehmen</button>
      <button style="background:none;border:none;color:var(--dim);padding:4px 6px;font-size:15px" onclick="stravaDismiss(${a.id})">✕</button></div>`;}).join("");
  return `<div class="list" style="border-color:var(--accent-soft-bd)">
    <div style="padding:14px 18px 4px;display:flex;align-items:center;gap:8px"><span class="dot"></span><span class="eyebrow" style="color:var(--accent)">Neue Strava-Aktivitäten · ${p.length}</span></div>
    ${rows}${p.length>1?`<div style="padding:12px 18px"><button class="btn ghost sm" style="width:100%" onclick="stravaImportAll()">Alle übernehmen</button></div>`:""}</div>`;
}
async function syncNow(){toast("Synchronisiere…");await Promise.all([fetchWellness(),stravaFetchActivities()]);render();toast("Aktualisiert ✓");}

/* =========================================================================
   KI-COACH — Chat (Worker /coach)
   ========================================================================= */
function coachHistory(){if(!DB.coach)DB.coach={};if(!DB.coach.history)DB.coach.history=[];return DB.coach.history;}
function coachWeekLines(){
  // kompakter Wochenplan (aktuelle + 2 Folgewochen) — Basis für Planänderungen des Coachs
  const plan=DB.plan,cur=planWeekIndex();const out=[];
  for(let i=cur;i<Math.min(cur+3,plan.weeks.length);i++){
    const wk=plan.weeks[i];const start=parseISO(wk.start);
    const days=[];
    for(let dd=0;dd<7;dd++){
      const s=sessionOn(addDays(start,dd));
      const k=logKey(i,dd);
      let txt=s&&s.kind!=="rest"?s.title:"frei";
      if(DB.logs[k])txt+=" [erledigt]";else if(DB.skips[k])txt+=" [ausgelassen]";else if(s&&s.adjusted)txt+=" [angepasst]";
      days.push(WD_SHORT[dd]+" "+txt);
    }
    out.push("W"+wk.w+" ("+wk.phase+", ab "+wk.start+"): "+days.join(" · "));
  }
  return out.join("\n");
}
function buildCoachContext(){
  const p=DB.profile,plan=DB.plan,wi=planWeekIndex(),wk=plan.weeks[wi],s=sessionOn(today());
  const rec=latestWellness(),rs=rec?recoveryScore(rec):null;const unit=SPORTS[p.sport].unit;
  return [
    "Sportart: "+p.sportLabel+(p.goalMode==="time"?" · Ziel "+p.targetStr:" · Ziel: ankommen/finishen"),
    "Wettkampf: "+p.raceName+" am "+fmtDateFull(raceDateObj())+" ("+daysToRace()+" Tage entfernt)",
    "Aktuelle Woche: W"+wk.w+"/"+plan.weeks.length+" · Phase "+wk.phase+" · "+wk.km+(unit==="tri"?" h":" km")+(wk.longKm?" · lange Einheit "+wk.longKm:""),
    "Heute: "+WD_LONG[wdIndex(today())]+" ("+isoToday()+") · geplant: "+(s&&s.kind!=="rest"?s.title+" — "+s.detail:"Ruhetag"),
    "Erfahrung: "+EXP[p.experience].label+" · "+p.daysPerWeek+" Trainingstage/Woche",
    plan.paces?"Kalibrierte Paces (min/km): easy "+fmtPace(plan.paces.easy)+", long "+fmtPace(plan.paces.long)+", tempo "+fmtPace(plan.paces.tempo)+", Intervall "+fmtPace(plan.paces.interval)+(plan.paces.goal?", Ziel "+fmtPace(plan.paces.goal):""):null,
    rs!=null?"Recovery heute (Garmin): "+rs+"/100 ("+recoveryLabel(rs)+")":null,
    (function(){const z=hrZones();return z?"HF-Zonen (bpm): Z1 <"+z[1].hi+" · Z2 "+z[2].lo+"–"+z[2].hi+" · Z3 "+z[3].lo+"–"+z[3].hi+" (meiden) · Z4 "+z[4].lo+"–"+z[4].hi+" · Z5 >"+z[5].lo:null;})(),
    p.constraints?"Persönliche Constraints: "+p.constraints:null,
    "Plan der nächsten Wochen:\n"+coachWeekLines()
  ].filter(Boolean).join("\n");
}
// Planänderungen aus der Coach-Antwort anwenden (json-Block wie im V1-Plan-Editor)
function applyCoachChanges(text){
  const m=text.match(/```json([\s\S]*?)```/i)||text.match(/\{\s*"changes"[\s\S]*\}/);
  if(!m)return {clean:text,applied:[]};
  let obj;try{obj=JSON.parse(m[1]||m[0]);}catch(e){return {clean:text.replace(/```json[\s\S]*?```/i,"").trim(),applied:[]};}
  const changes=Array.isArray(obj.changes)?obj.changes:[];
  const applied=[];
  for(const c of changes.slice(0,14)){
    const wi=(c.week|0)-1;if(wi<0||!DB.plan.weeks[wi])continue;
    const day=c.day|0;if(day<0||day>6)continue;
    const slotDate=addDays(parseISO(DB.plan.weeks[wi].start),day);
    if(slotDate<today())continue;                     // Vergangenheit ist tabu
    const k=logKey(wi,day);
    if(DB.logs[k])continue;                            // Erledigtes ist tabu
    const orig=(DB.plan.weeks[wi].sessions.find(x=>x.day===day)||{}).title||"frei";
    DB.planEdits[k]={title:c.title||(c.kind==="rest"?"Ruhetag":"Einheit"),detail:c.detail||"",kind:c.kind||"easy",zone:c.zone||"",
      dist:(typeof c.dist==="number"?c.dist:undefined),reason:c.reason||"Vom Coach angepasst.",origTitle:orig,date:isoToday(),src:"coach"};
    delete DB.skips[k];
    applied.push("W"+(wi+1)+" "+WD_SHORT[day]+" → "+(c.kind==="rest"?"frei":(c.title||c.kind)));
  }
  if(applied.length)save();
  return {clean:text.replace(/```json[\s\S]*?```/i,"").trim(),applied};
}
function openCoach(){
  if(!DB.coach||!DB.coach.workerUrl){openCoachSetup();return;}
  document.getElementById("coachRoot").classList.add("open");renderCoach();
}
function closeCoach(){document.getElementById("coachRoot").classList.remove("open");}
function fmtCoach(text){
  // Emojis raus (App-Regel: keine Emojis) + Light-Markdown → HTML
  const noEmoji=String(text).replace(/[\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}\u{2B00}-\u{2BFF}\u{FE00}-\u{FE0F}\u{200D}\u{2190}-\u{21FF}\u{2300}-\u{23FF}]/gu,"").replace(/[ \t]{2,}/g," ");
  return esc(noEmoji)
    .replace(/^#{1,6}\s*/gm,"")            // Überschriften-Marker entfernen
    .replace(/\*\*(.+?)\*\*/g,"<b>$1</b>") // **fett** → <b>
    .replace(/\n{3,}/g,"\n\n")
    .replace(/\n/g,"<br>");
}
function renderCoach(){
  const h=coachHistory();
  const msgs=h.length?h.map(m=>`<div class="cmsg ${m.role}"><div class="cbubble">${m.role==="assistant"?fmtCoach(m.content):esc(m.content).replace(/\n/g,"<br>")}${m.applied&&m.applied.length?`<div class="capplied">${m.applied.map(a=>"✓ "+esc(a)).join("<br>")}</div>`:""}</div></div>`).join(""):
    `<div class="cempty">${ic("zap",26)}<div style="margin-top:12px;font-size:14px;color:var(--text-2)">Dein persönlicher KI-Coach</div><div style="font-size:12px;color:var(--mut);margin-top:6px;line-height:1.5">Frag mich zu deinem Training, deiner Form, einzelnen Einheiten oder wie du dich heute fühlst. Ich kenne deinen Plan und deine Daten.</div></div>`;
  document.getElementById("coachRoot").innerHTML=`
    <div class="cv-top"><button class="cv-back" onclick="closeCoach()">${ic("menu",18)}</button><div class="cv-title"><b>Coach</b><span class="ln-line"></span></div><button class="cv-back" onclick="if(confirm('Verlauf löschen?')){DB.coach.history=[];save();renderCoach();}" style="font-size:12px;font-family:var(--mono);color:var(--mut)">↺</button></div>
    <div class="cv-body" id="cvBody">${msgs}</div>
    <div class="cv-input"><input id="cvIn" placeholder="Frag deinen Coach…" onkeydown="if(event.key==='Enter')coachSend()"><button onclick="coachSend()">${ic("zap",18)}</button></div>`;
  const b=document.getElementById("cvBody");if(b)b.scrollTop=b.scrollHeight;
}
async function coachSend(){
  const inp=document.getElementById("cvIn");const text=(inp.value||"").trim();if(!text)return;
  const h=coachHistory();h.push({role:"user",content:text});save();inp.value="";renderCoach();
  const b=document.getElementById("cvBody");
  b.insertAdjacentHTML("beforeend",`<div class="cmsg assistant" id="cvTyping"><div class="cbubble"><span class="typing">•••</span></div></div>`);b.scrollTop=b.scrollHeight;
  try{
    const url=DB.coach.workerUrl.replace(/\/$/,"")+"/coach";
    const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({mode:"v2",messages:h.slice(-20),context:buildCoachContext()})});
    const j=await r.json();
    const t=document.getElementById("cvTyping");if(t)t.remove();
    if(j.text){
      const {clean,applied}=applyCoachChanges(j.text);
      h.push({role:"assistant",content:clean||"Plan angepasst.",applied});save();
      if(applied.length)toast("Plan angepasst ✓");
    }
    else{h.push({role:"assistant",content:"Fehler: "+(j.error||"keine Antwort")});save();}
  }catch(e){const t=document.getElementById("cvTyping");if(t)t.remove();h.push({role:"assistant",content:"Verbindungsfehler: "+e.message});save();}
  renderCoach();
}

/* ---- day refresh ---- */
let _renderDay=null;
function refreshIfNewDay(){if(DB.onboarded&&_renderDay&&_renderDay!==isoToday()&&!document.getElementById("sheetRoot").classList.contains("open"))render();}
["visibilitychange","focus","pageshow"].forEach(ev=>window.addEventListener(ev,refreshIfNewDay));

/* ---- init ---- */
function init(){
  if(!DB.onboarded){document.getElementById("app").style.display="none";document.getElementById("onboard").style.display="flex";startOnboarding();}
  else{render();}
  // Strava-OAuth-Redirect abfangen; bei bestehender Verbindung im Hintergrund syncen
  checkStravaCallback();
  if(DB.onboarded){if(garminConnected())fetchWellness().then(()=>{if(route==="heute"||route==="analyse")render();});
    if(stravaConnected())stravaFetchActivities().then(()=>{if(route==="heute")render();});}
}
init();
</script>
