<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08080c"/>
      <stop offset="55%" stop-color="#15151c"/>
      <stop offset="100%" stop-color="#2a0d10"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="78%" r="58%">
      <stop offset="0%" stop-color="#ff5e3e" stop-opacity="0.42"/>
      <stop offset="60%" stop-color="#ff5e3e" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ff5e3e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="0%" y2="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>
  <rect width="512" height="512" fill="url(#sheen)"/>

  <!-- Speed-Akzent: schräge Linie unten links -->
  <g opacity="0.18">
    <rect x="-20" y="430" width="200" height="6" fill="#ff5e3e" transform="rotate(-12 80 433)"/>
    <rect x="-10" y="450" width="120" height="4" fill="#ff5e3e" transform="rotate(-12 50 452)"/>
  </g>

  <!-- SUB4 — italic bold -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-style="italic" text-anchor="middle">
    <text x="256" y="320" font-size="180" fill="#ffffff" letter-spacing="-10">
      <tspan>SUB</tspan><tspan fill="#ff5e3e">4</tspan>
    </text>
    <text x="256" y="380" font-size="32" fill="#ffffff" fill-opacity="0.55" font-style="normal" font-weight="700" letter-spacing="10">MARATHON</text>
  </g>
</svg>
