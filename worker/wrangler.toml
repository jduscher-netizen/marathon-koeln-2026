name = "marathon-koeln-push"
main = "src/index.js"
compatibility_date = "2024-11-01"

# KV-Namespace: NACH `wrangler kv namespace create SUBS` die ID hier eintragen
[[kv_namespaces]]
binding = "SUBS"
id = "58d56ea346184a80ae466a84509eefc8"

# Öffentliche Variablen (Public-Key darf rein, Private NICHT — der kommt via `wrangler secret put VAPID_PRIVATE`)
[vars]
VAPID_PUBLIC = "BOxhwsmGSntoJZ5sR0NNjjePiVFAAYyxfZHAEouIQI94p1NlkvS3dQWqJy-ok14BKLPohOkUS5IhKTE0kkNVPJo"
VAPID_SUBJECT = "https://jduscher-netizen.github.io/marathon-koeln-2026/"

# Cron: täglich 5:00 UTC = 7:00 MESZ Trainings-Reminder
[triggers]
crons = ["0 5 * * *"]
